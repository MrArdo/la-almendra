        { id: "cal-latte", name: "Latte caliente", price: 45, milk: true },

        { id: "jocoque", name: "Jocoque (450 ml)", price: 45 },
        { id: "queso-panela", name: "Panela (500 gr)", price: 83 },

        { id: "requeson", name: "Requesón (250 gr)", price: 31 },
        { id: "yoghurt-1l", name: "Yoghurt 1L", price: 60, options: [{ key: "sabor", label: "Elige el sabor", type: "single", required: true, choices: ["Frambuesa", "Manzana/Nuez", "Mango", "Fresa", "Natural", "Durazno", "Nuez"] }] },
      ]},
    ];

    function complementos() {
      return { key: "complementos", label: "Complementos (opcional)", type: "multi", required: false, choices: ["Jalapeños", "Salsa habanera", "Salsa frambuesa chipotle"] };
    }

    const ITEM_LOOKUP = {};
    const CAT_OF = {};
    MENU.forEach(g => g.items.forEach(it => { ITEM_LOOKUP[it.id] = it; CAT_OF[it.id] = g.cat; }));

    let _seq = 0;
    const nextSeq = () => ++_seq;

    const EGG_NAMES = ["diego","maria","marifer","maria fernanda","fer","fernanda"];
    function normalizeName(s){ return (s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
    function isEggName(name){ return EGG_NAMES.includes(normalizeName(name)); }

    const fmt = n => "$" + Number(n).toFixed(2);
    const MONTHS = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const DAYS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const DAYS_SHORT = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

    function fmtTime(ts){ const d=new Date(ts); let h=d.getHours(); const m=d.getMinutes().toString().padStart(2,"0"); const ap=h>=12?"pm":"am"; h=h%12; if(!h)h=12; return `${h}:${m} ${ap}`; }
    function fmtFullDate(ts){ const d=new Date(ts); return `${DAYS_FULL[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`; }
    function fmtShortDate(ts){ const d=new Date(ts); return `${DAYS_SHORT[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]}`; }
    function dayKey(ts){ const d=new Date(ts); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
    function weekStart(ts){ const d=new Date(ts); d.setHours(0,0,0,0); const day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return d.getTime(); }

    function linePrice(line){ const item=ITEM_LOOKUP[line.itemId]; let base=item.price; if(item.sizes) base=item.sizes[line.opts.size||"chico"]; if(item.refillPrice&&line.opts.refill==="Con refill") base=item.refillPrice; return base; }
    function lineSubtotal(line){ return linePrice(line)*line.qty; }
    function orderTotal(order){ return order.lines.reduce((s,l)=>s+lineSubtotal(l),0); }
    function orderItemCount(order){ return order.lines.reduce((s,l)=>s+l.qty,0); }
    function resolveTip(total,payment){ if(!payment||!payment.tipMode||payment.tipMode==="none") return 0; if(payment.tipMode==="percent") return total*(Number(payment.tipValue)||0)/100; if(payment.tipMode==="fixed") return Number(payment.tipValue)||0; return 0; }

    function lineDisplayName(line){
      const item=ITEM_LOOKUP[line.itemId]; let name=item.name; const parts=[];
      if(line.opts.size) parts.push(line.opts.size==="chico"?"Chico":"Grande");
      if(line.opts.salsa) parts.push(line.opts.salsa);
      if(line.opts.tipo) parts.push(line.opts.tipo);
      if(line.opts.proteina) parts.push(line.opts.proteina);
      if(line.opts.sabor) parts.push(line.opts.sabor);
      if(line.opts.milk) parts.push(line.opts.milk==="entera"?"Leche entera":"Deslactosada");
      if(line.opts.refill==="Con refill") parts.push("Con refill");
      if(line.opts.guisado) parts.push(line.opts.guisado.join(" + "));
      if(line.opts.complementos&&line.opts.complementos.length) parts.push(line.opts.complementos.join(", "));
      if(parts.length) name+=` (${parts.join(" · ")})`;
      return name;
    }

    function loadState(key, fallback){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch{ return fallback; } }
    function saveState(key, value){ try{ localStorage.setItem(key,JSON.stringify(value)); }catch{} }

    const GLOBAL_CSS = `
      .la-app *{box-sizing:border-box;}
      @keyframes laFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      @keyframes laFadeSoft{from{opacity:0}to{opacity:1}}
      @keyframes laModalIn{from{opacity:0}to{opacity:1}}
      @keyframes laSheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
      @keyframes laPopIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
      @keyframes laToastUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      @keyframes laProgress{from{width:100%}to{width:0%}}
      @keyframes laRowIn{from{opacity:0;transform:translateY(6px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
      @keyframes laChipPop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
      @keyframes laBadgePop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
      @keyframes laEggFade{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
      @keyframes laEggRise{0%{transform:translate(0,0) rotate(0deg) scale(0.5);opacity:0}12%{opacity:1;transform:translate(0,-10vh) rotate(0deg) scale(1)}100%{transform:translate(var(--drift),-115vh) rotate(var(--rot)) scale(1);opacity:0}}
      .la-tab-content{animation:laFadeIn 0.28s ease;}
      .la-tap{transition:transform 0.08s ease,background 0.18s ease,color 0.18s ease,border-color 0.18s ease;}
      .la-tap:active{transform:scale(0.97);}
      .la-card-tap{transition:transform 0.14s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.18s ease;}
      .la-card-tap:hover{box-shadow:0 4px 16px rgba(30,58,52,0.1);}
      .la-card-tap:active{transform:scale(0.98);}
      .la-row{animation:laRowIn 0.26s ease backwards;}
      .la-menu-row{transition:background 0.22s ease,border-color 0.22s ease;}
      .la-circle-btn{transition:transform 0.1s ease,background 0.15s ease;}
      .la-circle-btn:active{transform:scale(0.85);}
      .la-chip{transition:background 0.16s ease,border-color 0.16s ease,color 0.16s ease;}
      .la-chip-active{animation:laChipPop 0.26s ease;}
      .la-stat{animation:laRowIn 0.3s ease backwards;}
      .la-badge{animation:laBadgePop 0.3s cubic-bezier(0.34,1.56,0.64,1);display:inline-block;}
      .la-empty{animation:laFadeSoft 0.4s ease;}
      .la-app button{font-family:Georgia,'Times New Roman',serif;}
      .la-header{background:#1E3A34;padding:16px 18px 15px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center;}
      .la-header-tabs{display:none;}
      .la-bottom-nav{position:fixed;bottom:16px;left:0;right:0;margin:0 auto;width:fit-content;max-width:calc(100% - 32px);background:#fff;border:1px solid #e8e0d8;border-radius:28px;display:flex;gap:6px;z-index:20;padding:7px 9px;box-shadow:0 6px 24px rgba(30,58,52,0.16);}
      .la-content-wrap{max-width:560px;margin:0 auto;width:100%;}
      .la-content-pad{padding-bottom:96px;}
      .la-grid-cards{display:flex;flex-direction:column;}
      .la-grid-2{display:block;}
      .la-pay-grid{display:block;}
      .la-actions-row{display:flex;flex-direction:column;}
      .la-tabpad{padding:16px;}
      @media(min-width:900px){
        .la-header{padding:14px 32px;justify-content:space-between;}
        .la-header-tabs{display:flex;gap:6px;}
        .la-bottom-nav{display:none;}
        .la-content-wrap{max-width:1100px;}
        .la-content-pad{padding-bottom:24px;}
        .la-tabpad{padding:24px 32px;}
        .la-grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;align-items:start;}
        .la-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
        .la-pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch;}
        .la-actions-row{flex-direction:row;gap:12px;}
        .la-completed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;align-items:start;}
        .la-span-2{grid-column:1/-1;}
      }
    `;

    const TABS = [
      {k:"activos",label:"Pedidos",icon:"📋"},
      {k:"dia",label:"Día",icon:"📅"},
      {k:"semana",label:"Semana",icon:"📆"},
      {k:"mes",label:"Mes",icon:"🗓️"},
    ];

    function EasterEgg({onDone}){
      useEffect(()=>{ const t=setTimeout(onDone,2800); return ()=>clearTimeout(t); },[onDone]);
      const emojis=useMemo(()=>{ const arr=[]; for(let i=0;i<36;i++) arr.push({id:i,left:Math.random()*100,delay:Math.random()*0.6,duration:3.6+Math.random()*1.8,size:34+Math.random()*48,drift:(Math.random()-0.5)*120,rot:(Math.random()-0.5)*80}); return arr; },[]);
      return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",overflow:"hidden",animation:"laEggFade 2.8s ease forwards"}}>
        {emojis.map(e=><span key={e.id} style={{position:"absolute",left:`${e.left}%`,bottom:-80,fontSize:e.size,animation:`laEggRise ${e.duration}s cubic-bezier(0.22,0.61,0.36,1) ${e.delay}s forwards`,"--drift":`${e.drift}px`,"--rot":`${e.rot}deg`}}>🖕</span>)}
      </div>;
    }

    function App(){
      const [tab,setTab]=useState("activos");
      const [orders,setOrders]=useState(()=>loadState("la_orders",[]));
      const [completed,setCompleted]=useState(()=>loadState("la_completed",[]));
      const [dayRecords,setDayRecords]=useState(()=>loadState("la_dayRecords",[]));
      const [newAccountModal,setNewAccountModal]=useState(false);
      const [takeoutModal,setTakeoutModal]=useState(false);
      const [activeOrderId,setActiveOrderId]=useState(null);
      const [editingCompletedId,setEditingCompletedId]=useState(null);
      const [confirmModal,setConfirmModal]=useState(null);
      const [chargeModal,setChargeModal]=useState(null);
      const [reportModal,setReportModal]=useState(null);
      const [weekDetail,setWeekDetail]=useState(null);
      const [dayDetail,setDayDetail]=useState(null);
      const [toast,setToast]=useState(null);
      const [eggActive,setEggActive]=useState(false);
      const toastTimer=useRef(null);

      useEffect(()=>saveState("la_orders",orders),[orders]);
      useEffect(()=>saveState("la_completed",completed),[completed]);
      useEffect(()=>saveState("la_dayRecords",dayRecords),[dayRecords]);

      function showToast(msg,undoFn){ if(toastTimer.current) clearTimeout(toastTimer.current); setToast({msg,undoFn,id:Date.now()}); toastTimer.current=setTimeout(()=>setToast(null),4000); }
      function doUndo(){ if(toast&&toast.undoFn) toast.undoFn(); if(toastTimer.current) clearTimeout(toastTimer.current); setToast(null); }

      const activeOrder=orders.find(o=>o.id===activeOrderId);

      function createAccount(name,mesa){ const o={id:"o"+Date.now()+"-"+nextSeq(),seq:nextSeq(),name,mesa:mesa||null,type:"mesa",lines:[],note:"",createdAt:Date.now()}; setOrders(p=>[o,...p]); setNewAccountModal(false); setActiveOrderId(o.id); if(isEggName(name)) setEggActive(true); }
      function createTakeout(name,pickup){ const o={id:"o"+Date.now()+"-"+nextSeq(),seq:nextSeq(),name,mesa:null,type:"llevar",pickup:pickup||null,lines:[],note:"",createdAt:Date.now()}; setOrders(p=>[o,...p]); setTakeoutModal(false); setActiveOrderId(o.id); if(isEggName(name)) setEggActive(true); }
      function updateOrder(id,fn){ setOrders(p=>p.map(o=>o.id===id?fn(o):o)); }
      function deleteOrder(id){ const s=orders.find(o=>o.id===id); setOrders(p=>p.filter(o=>o.id!==id)); showToast("Cuenta eliminada",()=>setOrders(p=>[s,...p])); }
      function chargeOrder(id,payment){ const o=orders.find(x=>x.id===id); if(!o) return; const comp={...o,completedAt:Date.now(),payment}; setCompleted(p=>[comp,...p]); setOrders(p=>p.filter(x=>x.id!==id)); setActiveOrderId(null); const tip=resolveTip(orderTotal(o),payment); showToast(`Cobrado ${fmt(orderTotal(o))}${tip>0?` (+ ${fmt(tip)} propina)`:""} · ${o.name}`,()=>{ setCompleted(p=>p.filter(c=>c.id!==comp.id)); setOrders(p=>[o,...p]); }); }
      function closeOrderNoCharge(id){ const s=orders.find(o=>o.id===id); setOrders(p=>p.filter(o=>o.id!==id)); setActiveOrderId(null); showToast("Cuenta cerrada sin cobrar",()=>setOrders(p=>[s,...p])); }
      function closeAllAccounts(){ const s=orders; const comps=orders.map(o=>({...o,completedAt:Date.now(),payment:{method:"efectivo",tipMode:"none",tipValue:0}})); setCompleted(p=>[...comps,...p]); setOrders([]); showToast(`${s.length} cuentas cerradas`,()=>{ setOrders(s); setCompleted(p=>p.filter(c=>!comps.find(x=>x.id===c.id))); }); }
      function deleteCompleted(id){ const s=completed.find(c=>c.id===id); setCompleted(p=>p.filter(c=>c.id!==id)); showToast("Orden eliminada",()=>setCompleted(p=>[s,...p])); }
      function updateCompleted(id,fn){ setCompleted(p=>p.map(c=>c.id===id?fn(c):c)); }
      function reopenCompleted(id){ const c=completed.find(x=>x.id===id); if(!c) return; const {completedAt,payment,...rest}=c; const r={...rest,seq:nextSeq()}; setCompleted(p=>p.filter(x=>x.id!==id)); setOrders(p=>[r,...p]); showToast(`${c.name} regresó a cuentas abiertas`,()=>{ setOrders(p=>p.filter(o=>o.id!==r.id)); setCompleted(p=>[c,...p]); }); }
      function terminarDia(){ const all=[...orders.map(o=>({...o,completedAt:Date.now(),payment:{method:"efectivo",tipMode:"none",tipValue:0}})),...completed]; if(all.length){ const total=all.reduce((s,o)=>s+orderTotal(o),0); setDayRecords(p=>[...p,{key:dayKey(Date.now()),date:Date.now(),total,count:all.length,orders:all}]); } setOrders([]); setCompleted([]); showToast("Día terminado y archivado"); }

      const dayTotal=completed.reduce((s,o)=>s+orderTotal(o),0);
      const openTotal=orders.reduce((s,o)=>s+orderTotal(o),0);
      const catBreakdown=useMemo(()=>{ const m={}; completed.forEach(o=>o.lines.forEach(l=>{ const c=CAT_OF[l.itemId]; if(!m[c]) m[c]={cat:c,qty:0,total:0}; m[c].qty+=l.qty; m[c].total+=lineSubtotal(l); })); return Object.values(m).sort((a,b)=>b.total-a.total); },[completed]);
      const topItems=useMemo(()=>{ const m={}; completed.forEach(o=>o.lines.forEach(l=>{ const k=lineDisplayName(l); if(!m[k]) m[k]={name:k,cat:CAT_OF[l.itemId],qty:0,total:0}; m[k].qty+=l.qty; m[k].total+=lineSubtotal(l); })); return Object.values(m).sort((a,b)=>b.qty-a.qty); },[completed]);
      const payBreakdown=useMemo(()=>{ let ef=0,ta=0,pr=0,pe=0,pt=0; completed.forEach(o=>{ const t=orderTotal(o); const tip=resolveTip(t,o.payment); const m=o.payment?.method||"efectivo"; if(m==="tarjeta"){ta+=t;pt+=tip;}else{ef+=t;pe+=tip;} pr+=tip; }); return {efectivo:ef,tarjeta:ta,propinas:pr,propEfectivo:pe,propTarjeta:pt}; },[completed]);
      const curWeekStart=weekStart(Date.now());
      const weekDays=dayRecords.filter(r=>weekStart(r.date)===curWeekStart).sort((a,b)=>a.date-b.date);
      const weekTotal=weekDays.reduce((s,d)=>s+d.total,0);
      const weekCount=weekDays.reduce((s,d)=>s+d.count,0);
      const now2=new Date(); const curMonth=now2.getMonth(),curYear=now2.getFullYear();
      const monthDays=dayRecords.filter(r=>{ const d=new Date(r.date); return d.getMonth()===curMonth&&d.getFullYear()===curYear; });
      const monthWeeks=useMemo(()=>{ const m={}; monthDays.forEach(r=>{ const ws=weekStart(r.date); if(!m[ws]) m[ws]={ws,days:[],total:0,count:0}; m[ws].days.push(r); m[ws].total+=r.total; m[ws].count+=r.count; }); return Object.values(m).sort((a,b)=>a.ws-b.ws); },[dayRecords]);
      const monthTotal=monthDays.reduce((s,d)=>s+d.total,0);
      const monthCount=monthDays.reduce((s,d)=>s+d.count,0);

      return <div className="la-app" style={{fontFamily:"Georgia,'Times New Roman',serif",background:C.bg,color:C.text,width:"100%",height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
        <style>{GLOBAL_CSS}</style>
        <div className="la-header">
          <span style={{color:"#fff",fontSize:22,fontStyle:"italic",fontWeight:"normal"}}><strong style={{fontWeight:"bold",fontStyle:"normal"}}>la almendra</strong><span style={{opacity:0.92}}> · gestor de cuentas</span></span>
          <div className="la-header-tabs">
            {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} className="la-tap" style={{border:"none",background:tab===t.k?C.pink:"transparent",padding:"9px 20px",borderRadius:10,cursor:"pointer",color:tab===t.k?C.dark:"rgba(255,255,255,0.75)",fontWeight:"bold",fontSize:14,display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:16}}>{t.icon}</span>{t.label}</button>)}
          </div>
        </div>
        <div className="la-content-pad" style={{flex:1,overflowY:"auto"}}>
          <div key={tab} className="la-tab-content la-content-wrap">
            {tab==="activos"&&<TabActivos orders={orders} onNew={()=>setNewAccountModal(true)} onTakeout={()=>setTakeoutModal(true)} onOpen={id=>setActiveOrderId(id)} onDelete={o=>setConfirmModal({title:"Eliminar cuenta",desc:`¿Eliminar la cuenta de ${o.name}?`,confirmLabel:"Eliminar",danger:true,onConfirm:()=>{deleteOrder(o.id);setConfirmModal(null);}})} />}
            {tab==="dia"&&<TabDia completed={completed} dayTotal={dayTotal} openTotal={openTotal} openCount={orders.length} catBreakdown={catBreakdown} topItems={topItems} payBreakdown={payBreakdown}
              onEditCompleted={c=>setEditingCompletedId(c.id)}
              onReopenCompleted={c=>setConfirmModal({title:"Regresar a cuentas abiertas",desc:`${c.name} volverá a Pedidos como cuenta abierta.`,confirmLabel:"Regresar a abiertas",onConfirm:()=>{reopenCompleted(c.id);setConfirmModal(null);}})}
              onCloseAll={()=>setConfirmModal({title:"Cerrar todas las cuentas",desc:`Se cerrarán ${orders.length} cuentas. Estas cuentas no llevarán propina.`,confirmLabel:"Confirmar",countdown:5,onConfirm:()=>{closeAllAccounts();setConfirmModal(null);}})}
              onDeleteCompleted={c=>setConfirmModal({title:"Eliminar orden",desc:`¿Eliminar la orden de ${c.name}?`,confirmLabel:"Eliminar",danger:true,countdown:3,onConfirm:()=>{deleteCompleted(c.id);setConfirmModal(null);}})}
              onReport={()=>setReportModal("day")}
              onTerminar={()=>setConfirmModal({title:"Terminar día",desc:"Esta acción es irreversible. Se reiniciará el día y los datos se archivarán.",confirmLabel:"Terminar día",danger:true,countdown:5,onConfirm:()=>{terminarDia();setConfirmModal(null);}})}
            />}
            {tab==="semana"&&<TabSemana weekDays={weekDays} weekTotal={weekTotal} weekCount={weekCount} curWeekStart={curWeekStart} onReport={()=>setReportModal("week")} onDayDetail={d=>setDayDetail(d)} />}
            {tab==="mes"&&<TabMes monthWeeks={monthWeeks} monthTotal={monthTotal} monthCount={monthCount} curMonth={curMonth} curYear={curYear} onReport={()=>setReportModal("month")} onWeekDetail={w=>setWeekDetail(w)} />}
          </div>
        </div>
        <div className="la-bottom-nav">
          {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} className="la-tap" style={{border:"none",background:tab===t.k?C.pinkPill:"transparent",padding:"9px 22px",borderRadius:22,cursor:"pointer",color:tab===t.k?C.dark:C.muted,fontWeight:tab===t.k?"bold":"normal",fontSize:11.5,transition:"background 0.2s ease,color 0.2s ease",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:17}}>{t.icon}</span>{t.label}</button>)}
        </div>
        {newAccountModal&&<NewAccountModal onClose={()=>setNewAccountModal(false)} onSubmit={createAccount} />}
        {takeoutModal&&<TakeoutModal onClose={()=>setTakeoutModal(false)} onSubmit={createTakeout} />}
        {activeOrder&&<OrderModal order={activeOrder} onClose={()=>setActiveOrderId(null)} onUpdate={fn=>updateOrder(activeOrder.id,fn)} onSaveExit={()=>setActiveOrderId(null)} onCloseNoCharge={()=>setConfirmModal({title:"Cerrar cuenta",desc:`¿Cerrar la cuenta de ${activeOrder.name} sin cobrar?`,confirmLabel:"Cerrar sin cobrar",danger:true,onConfirm:()=>{closeOrderNoCharge(activeOrder.id);setConfirmModal(null);}})} onCharge={()=>setChargeModal(activeOrder)} />}
        {confirmModal&&<ConfirmModal {...confirmModal} onCancel={()=>setConfirmModal(null)} />}
        {chargeModal&&<ChargeModal order={chargeModal} onCancel={()=>setChargeModal(null)} onConfirm={payment=>{chargeOrder(chargeModal.id,payment);setChargeModal(null);}} />}
        {editingCompletedId&&(()=>{ const ec=completed.find(c=>c.id===editingCompletedId); if(!ec) return null; return <EditCompletedModal order={ec} onClose={()=>setEditingCompletedId(null)} onUpdate={fn=>updateCompleted(ec.id,fn)} />; })()}
        {reportModal==="day"&&<DayReport completed={completed} onClose={()=>setReportModal(null)} />}
        {reportModal==="week"&&<WeekReport weekDays={weekDays} curWeekStart={curWeekStart} onClose={()=>setReportModal(null)} />}
        {reportModal==="month"&&<MonthReport monthWeeks={monthWeeks} curMonth={curMonth} curYear={curYear} onClose={()=>setReportModal(null)} />}
        {weekDetail&&<WeekDetailModal week={weekDetail} onClose={()=>setWeekDetail(null)} />}
        {dayDetail&&<DayDetailModal day={dayDetail} onClose={()=>setDayDetail(null)} />}
        {toast&&<div key={toast.id} style={{position:"fixed",bottom:92,left:16,right:16,maxWidth:528,margin:"0 auto",background:C.dark,color:"#fff",borderRadius:12,zIndex:50,fontSize:14,boxShadow:"0 4px 16px rgba(0,0,0,0.25)",overflow:"hidden",animation:"laToastUp 0.3s ease"}}>
          {toast.undoFn&&<div style={{position:"absolute",top:0,left:0,bottom:0,background:"rgba(232,145,138,0.32)",animation:"laProgress 4s linear forwards"}} />}
          <div style={{position:"relative",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>{toast.msg}</span>
            {toast.undoFn&&<button onClick={doUndo} className="la-tap" style={{background:"rgba(255,255,255,0.12)",border:"none",color:C.pink,fontWeight:"bold",cursor:"pointer",fontSize:14,marginLeft:12,padding:"6px 14px",borderRadius:8}}>Deshacer</button>}
          </div>
        </div>}
        {eggActive&&<EasterEgg onDone={()=>setEggActive(false)} />}
      </div>;
    }

    const plusBtnStyle={width:34,height:34,borderRadius:"50%",background:C.dark,color:"#fff",border:"none",fontSize:20,fontWeight:"bold",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1};
    function QtyControl({qty,onMinus,onPlus}){ const btn={width:28,height:28,borderRadius:"50%",background:C.dark,color:"#fff",border:"none",fontSize:16,fontWeight:"bold",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}; return <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}><button onClick={onMinus} className="la-circle-btn" style={btn}>–</button><span key={qty} style={{fontSize:15,fontWeight:"bold",minWidth:16,textAlign:"center",display:"inline-block",animation:"laBadgePop 0.22s ease"}}>{qty}</span><button onClick={onPlus} className="la-circle-btn" style={btn}>+</button></div>; }
    function SectionLabel({children}){ return <div style={{fontSize:12,fontWeight:"bold",color:C.muted,textTransform:"uppercase",letterSpacing:0.6,margin:"16px 0 8px"}}>{children}</div>; }
    function StatCard({label,value,pink,index=0}){ return <div className="la-stat" style={{background:pink?C.pinkPill:C.dark,borderRadius:12,padding:"14px 12px",flex:1,textAlign:"center",animationDelay:`${index*0.06}s`}}><div style={{fontSize:11,fontWeight:"bold",letterSpacing:0.4,textTransform:"uppercase",color:pink?C.dark:"#fff",opacity:0.8}}>{label}</div><div style={{fontSize:30,fontWeight:"bold",color:pink?C.dark:"#fff",marginTop:4}}>{value}</div></div>; }
    const sectionH={fontSize:17,fontWeight:"bold",color:C.dark,margin:"20px 0 10px"};
    function DataTable({headers,rows,aligns,small}){ return <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #e5ddd5"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:small?12:13}}><thead><tr style={{background:C.dark}}>{headers.map((h,i)=><th key={i} style={{color:"#fff",textAlign:aligns[i],padding:"8px 10px",fontSize:10.5,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}</tr></thead><tbody>{rows.map((r,ri)=><tr key={ri} style={{background:"#fff",borderTop:"1px solid #f0e8e0"}}>{r.map((cell,ci)=><td key={ci} style={{textAlign:aligns[ci],padding:"8px 10px",color:C.dark,fontWeight:aligns[ci]==="right"?"bold":"normal"}}>{cell}</td>)}</tr>)}</tbody></table></div>; }

    function ModalShell({children,onClose,title}){ return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:40,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:16,width:"100%",maxWidth:380,overflow:"hidden",animation:"laPopIn 0.24s ease"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`}}><span style={{fontSize:19,fontWeight:"bold"}}>{title}</span><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button></div>{children}</div></div>; }
    function fieldLabel(t){ return <div style={{fontSize:11,fontWeight:"bold",color:C.dark,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>{t}</div>; }
    const inputStyle={width:"100%",padding:"11px 12px",borderRadius:10,border:"1.5px solid #d8cfc6",fontSize:15,background:"#fff",color:C.dark,fontFamily:"Georgia,serif"};

    function NewAccountModal({onClose,onSubmit}){ const [name,setName]=useState(""); const [mesa,setMesa]=useState(""); return <ModalShell onClose={onClose} title="Abrir nueva cuenta"><div style={{padding:18}}>{fieldLabel("Nombre del cliente")}<input style={{...inputStyle,borderColor:C.pink,marginBottom:14}} value={name} onChange={e=>setName(e.target.value)} placeholder="Ej. María" autoFocus />{fieldLabel("Mesa")}<input style={{...inputStyle,marginBottom:18}} value={mesa} onChange={e=>setMesa(e.target.value)} placeholder="Ej. 3" /><button disabled={!name.trim()} onClick={()=>onSubmit(name.trim(),mesa.trim())} className="la-tap" style={{width:"100%",background:name.trim()?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:name.trim()?"pointer":"default"}}>Abrir Cuenta</button></div></ModalShell>; }

    function TakeoutModal({onClose,onSubmit}){ const [name,setName]=useState(""); const [pickup,setPickup]=useState(""); return <ModalShell onClose={onClose} title="Pedido para llevar"><div style={{padding:18}}>{fieldLabel("Nombre del cliente")}<input style={{...inputStyle,borderColor:C.pink,marginBottom:14}} value={name} onChange={e=>setName(e.target.value)} placeholder="Ej. Carlos" autoFocus />{fieldLabel("Hora de recogida")}<input type="time" style={{...inputStyle,marginBottom:18}} value={pickup} onChange={e=>setPickup(e.target.value)} /><button disabled={!name.trim()} onClick={()=>{ let p=""; if(pickup){ const [h,m]=pickup.split(":"); let hh=parseInt(h); const ap=hh>=12?"pm":"am"; hh=hh%12; if(!hh)hh=12; p=`${hh}:${m} ${ap}`; } onSubmit(name.trim(),p); }} className="la-tap" style={{width:"100%",background:name.trim()?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:name.trim()?"pointer":"default"}}>Abrir Pedido</button></div></ModalShell>; }

    function MenuLines({lines,onChangeQty,onPlus}){
      return MENU.map(group=><div key={group.cat} style={{marginBottom:8}}>
        <div style={{background:C.dark,color:"#fff",padding:"8px 12px",borderRadius:8,fontSize:13,fontWeight:"bold",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{group.cat}</div>
        {group.items.map(item=>{
          const itemLines=lines.filter(l=>l.itemId===item.id);
          const hasOpts=(item.options&&item.options.length)||item.sizes||item.milk;
          const simpleLine=!hasOpts?itemLines[0]:null;
          const priceLabel=item.sizes?`${fmt(item.sizes.chico)} / ${fmt(item.sizes.grande)}`:fmt(item.price);
          if(hasOpts&&itemLines.length>0){ const tq=itemLines.reduce((s,l)=>s+l.qty,0); return <div key={item.id} style={{marginBottom:6}}><div className="la-menu-row" style={{background:C.selBg,borderRadius:8,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{fontSize:14,fontWeight:"bold"}}>{item.name} <span className="la-badge" style={{background:C.dark,color:"#fff",fontSize:10,fontWeight:"bold",padding:"2px 6px",borderRadius:10}}>x{tq}</span></div><button onClick={()=>onPlus(item)} className="la-circle-btn" style={plusBtnStyle}>+</button></div>{itemLines.map(l=><div key={l.lid} className="la-row" style={{background:"#F9E2DF",borderRadius:8,padding:"8px 10px 8px 18px",margin:"5px 0 0 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{fontSize:12.5,flex:1,paddingRight:8}}><div style={{fontWeight:"bold"}}>{lineDisplayName(l)}</div><div style={{color:C.muted,fontSize:11}}>{fmt(linePrice(l))} c/u · {fmt(lineSubtotal(l))}</div></div><QtyControl qty={l.qty} onMinus={()=>onChangeQty(l.lid,-1)} onPlus={()=>onChangeQty(l.lid,1)} /></div>)}</div>; }
          if(simpleLine){ return <div key={item.id} className="la-menu-row" style={{background:C.selBg,borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{flex:1}}><div style={{fontSize:14,fontWeight:"bold"}}>{item.name}</div><div style={{fontSize:11,color:C.muted}}>{fmt(linePrice(simpleLine))} · subtotal {fmt(lineSubtotal(simpleLine))}</div></div><QtyControl qty={simpleLine.qty} onMinus={()=>onChangeQty(simpleLine.lid,-1)} onPlus={()=>onChangeQty(simpleLine.lid,1)} /></div>; }
          return <div key={item.id} className="la-menu-row" style={{background:C.card,borderRadius:8,padding:"10px 12px",marginBottom:6,border:"1px solid #ece4dc",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:"bold"}}>{item.name}</div><div style={{fontSize:11,color:C.muted}}>{priceLabel}</div></div><button onClick={()=>onPlus(item)} className="la-circle-btn" style={plusBtnStyle}>+</button></div>;
        })}
      </div>);
    }

    function OrderModal({order,onClose,onUpdate,onSaveExit,onCloseNoCharge,onCharge}){
      const [optionsItem,setOptionsItem]=useState(null);
      const total=orderTotal(order);
      function addSimple(item){ onUpdate(o=>{ const idx=o.lines.findIndex(l=>l.itemId===item.id&&Object.keys(l.opts).length===0); if(idx>=0){ const lines=[...o.lines]; lines[idx]={...lines[idx],qty:lines[idx].qty+1}; return {...o,lines}; } return {...o,lines:[...o.lines,{lid:"l"+Date.now()+Math.random(),itemId:item.id,qty:1,opts:{}}]}; }); }
      function addConfigured(item,opts,qty){ onUpdate(o=>{ const key=JSON.stringify(opts); const idx=o.lines.findIndex(l=>l.itemId===item.id&&JSON.stringify(l.opts)===key); if(idx>=0){ const lines=[...o.lines]; lines[idx]={...lines[idx],qty:lines[idx].qty+qty}; return {...o,lines}; } return {...o,lines:[...o.lines,{lid:"l"+Date.now()+Math.random(),itemId:item.id,qty,opts}]}; }); }
      function changeQty(lid,delta){ onUpdate(o=>({...o,lines:o.lines.map(l=>l.lid===lid?{...l,qty:l.qty+delta}:l).filter(l=>l.qty>0)})); }
      function handlePlus(item){ const hasOpts=(item.options&&item.options.length)||item.sizes||item.milk; if(hasOpts) setOptionsItem(item); else addSimple(item); }
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:40,display:"flex",flexDirection:"column",animation:"laModalIn 0.2s ease"}}>
        <div style={{flex:1}} onClick={onClose} />
        <div style={{background:C.bg,borderRadius:"18px 18px 0 0",maxWidth:560,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",maxHeight:"94vh",animation:"laSheetUp 0.32s cubic-bezier(0.32,0.72,0,1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"16px 16px 12px",borderBottom:`1px solid ${C.pink}`}}>
            <div><div style={{fontSize:20,fontWeight:"bold"}}>{order.name}</div><div style={{fontSize:12,opacity:0.6,marginTop:2}}>{order.type==="llevar"?`🛍️ Para llevar${order.pickup?` · Recoge ${order.pickup}`:""}`:order.mesa?`Mesa ${order.mesa}`:"Sin mesa"}</div></div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:C.dark}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 14px 16px"}}>
            <input value={order.note} onChange={e=>onUpdate(o=>({...o,note:e.target.value}))} placeholder="Notas generales del pedido…" style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid #d8cfc6",fontSize:12.5,background:"#fff",color:C.dark,marginBottom:14,fontFamily:"Georgia,serif"}} />
            <MenuLines lines={order.lines} onChangeQty={changeQty} onPlus={handlePlus} />
            {order.lines.length>0&&<div className="la-row" style={{border:`1.5px solid ${C.dark}`,borderRadius:12,padding:"12px 14px",marginTop:14,background:C.card}}><div style={{fontSize:15,fontWeight:"bold",marginBottom:10}}>Pedido</div>{order.lines.map((l,i)=><div key={l.lid} className="la-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f0e8e0",animationDelay:`${i*0.04}s`}}><div style={{flex:1,paddingRight:8}}><div style={{fontSize:13,fontWeight:"bold"}}>{lineDisplayName(l)}</div><div style={{fontSize:11,color:C.muted}}>{fmt(linePrice(l))} c/u · {fmt(lineSubtotal(l))}</div></div><QtyControl qty={l.qty} onMinus={()=>changeQty(l.lid,-1)} onPlus={()=>changeQty(l.lid,1)} /></div>)}{order.note&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic",marginTop:8}}>Nota: {order.note}</div>}</div>}
          </div>
          <div style={{borderTop:"1px solid #e5ddd5",background:C.bg,padding:"12px 14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}><span style={{fontSize:14,opacity:0.6}}>Total</span><span style={{fontSize:26,fontWeight:"bold"}}>{fmt(total)}</span></div>
            <button onClick={onSaveExit} className="la-tap" style={{width:"100%",background:C.card,color:C.dark,border:`1.5px solid ${C.dark}`,padding:"11px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer",marginBottom:8}}>Guardar y Salir</button>
            <div style={{display:"flex",gap:8}}>
              <button onClick={onCloseNoCharge} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Cerrar</button>
              <button onClick={onCharge} disabled={order.lines.length===0} className="la-tap" style={{flex:1.4,background:order.lines.length?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:order.lines.length?"pointer":"default"}}>Cobrar y Cerrar</button>
            </div>
          </div>
        </div>
        {optionsItem&&<OptionsModal item={optionsItem} onClose={()=>setOptionsItem(null)} onAdd={(opts,qty)=>{addConfigured(optionsItem,opts,qty);setOptionsItem(null);}} />}
      </div>;
    }

    function OptionsModal({item,onClose,onAdd}){
      const [sel,setSel]=useState({}); const [qty,setQty]=useState(1); const [size,setSize]=useState(item.sizes?"chico":null); const [milk,setMilk]=useState(item.milk?"entera":null); const [limitHit,setLimitHit]=useState(false);
      const opts=item.options||[];
      function toggleChoice(k,ch,type,max){ setSel(prev=>{ if(type==="single") return {...prev,[k]:ch}; const cur=prev[k]||[]; if(cur.includes(ch)){setLimitHit(false);return {...prev,[k]:cur.filter(c=>c!==ch)};} if(max&&cur.length>=max){setLimitHit(true);return prev;} return {...prev,[k]:[...cur,ch]}; }); }
      const valid=opts.every(o=>{ if(!o.required) return true; const v=sel[o.key]; if(o.type==="single") return !!v; return v&&v.length>0; });
      function submit(){ const f={}; if(size) f.size=size; if(milk) f.milk=milk; opts.forEach(o=>{ if(sel[o.key]!==undefined){ if(o.type==="multi"){if(sel[o.key].length>0) f[o.key]=sel[o.key];}else f[o.key]=sel[o.key]; } }); onAdd(f,qty); }
      const chip=active=>({padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:"bold",cursor:"pointer",border:active?`1.5px solid ${C.pink}`:"1.5px solid #d8cfc6",background:active?C.pink:"#fff",color:C.dark});
      const chipCls=active=>"la-chip"+(active?" la-chip-active":"");
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onClose}>
        <div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:16,width:"100%",maxWidth:360,overflow:"hidden",animation:"laPopIn 0.24s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`}}><span style={{fontSize:18,fontWeight:"bold"}}>{item.name}</span><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button></div>
          <div style={{padding:18}}>
            {item.sizes&&<div style={{marginBottom:16}}><div style={{fontSize:13,marginBottom:8}}>Elige el tamaño:</div><div style={{display:"flex",gap:8}}>{["chico","grande"].map(s=><button key={s} onClick={()=>setSize(s)} className={chipCls(size===s)} style={chip(size===s)}>{s==="chico"?"Chico":"Grande"} · {fmt(item.sizes[s])}</button>)}</div></div>}

    function ConfirmModal({title,desc,confirmLabel,danger,countdown,onConfirm,onCancel}){
      const [count,setCount]=useState(countdown||0);
      useEffect(()=>{ if(!countdown||count<=0) return; const t=setTimeout(()=>setCount(c=>c-1),1000); return ()=>clearTimeout(t); },[count,countdown]);
      const blocked=countdown&&count>0;
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onCancel}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:340,padding:"20px 20px 18px",animation:"laPopIn 0.24s ease"}}>

          <div style={{fontSize:14,color:"#555",lineHeight:1.5,marginBottom:18}}>{desc}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={onCancel} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Cancelar</button>
            <button onClick={onConfirm} disabled={blocked} className="la-tap" style={{flex:1.3,background:blocked?"#d8cfc6":danger?C.danger:C.pink,color:danger||!blocked?"#fff":C.dark,border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:blocked?"default":"pointer"}}>{blocked?`${confirmLabel} (${count})`:confirmLabel}</button>
          </div>
        </div>
      </div>;
    }

    function ChargeModal({order,onCancel,onConfirm}){
      const total=orderTotal(order);

      if(tipChoice===0){tipMode="none";tipValue=0;}else if(typeof tipChoice==="number"){tipMode="percent";tipValue=tipChoice;}else if(tipChoice==="otro"){tipMode=otherMode;tipValue=Number(otherValue)||0;}
      const tipAmount=resolveTip(total,{tipMode,tipValue});
      const grandTotal=total+tipAmount;
      const canConfirm=!!method&&tipChoice!==null&&!(tipChoice==="otro"&&!otherValue);
      const chip=active=>({padding:"9px 0",borderRadius:10,fontSize:13.5,fontWeight:"bold",cursor:"pointer",border:active?`1.5px solid ${C.pink}`:"1.5px solid #d8cfc6",background:active?C.pink:"#fff",color:C.dark,flex:1});
      const chipCls=active=>"la-chip"+(active?" la-chip-active":"");
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onCancel}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:360,overflow:"hidden",animation:"laPopIn 0.24s ease",maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`}}><span style={{fontSize:18,fontWeight:"bold"}}>Cobrar y cerrar</span><button onClick={onCancel} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button></div>
          <div style={{padding:18,overflowY:"auto"}}>
            <div style={{fontSize:13,color:"#555",marginBottom:16}}>{order.name}{order.mesa?` · Mesa ${order.mesa}`:order.type==="llevar"?" · Para llevar":""}</div>
            <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Método de pago</div>
            <div style={{display:"flex",gap:8,marginBottom:18}}><button className={chipCls(method==="efectivo")} style={chip(method==="efectivo")} onClick={()=>setMethod("efectivo")}>💵 Efectivo</button><button className={chipCls(method==="tarjeta")} style={chip(method==="tarjeta")} onClick={()=>setMethod("tarjeta")}>💳 Tarjeta</button></div>
            <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Propina</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>{[0,5,10,15,20].map(p=><button key={p} className={chipCls(tipChoice===p)} style={chip(tipChoice===p)} onClick={()=>setTipChoice(p)}>{p===0?"Sin":`${p}%`}</button>)}</div>
            <button className={chipCls(tipChoice==="otro")} style={{...chip(tipChoice==="otro"),width:"100%",flex:"none",marginBottom:8}} onClick={()=>setTipChoice("otro")}>Otro</button>
            {tipChoice==="otro"&&<div className="la-row" style={{background:C.bg,borderRadius:10,padding:"12px",marginBottom:8}}><div style={{display:"flex",gap:8,marginBottom:10}}><button className={chipCls(otherMode==="percent")} style={chip(otherMode==="percent")} onClick={()=>setOtherMode("percent")}>Porcentaje %</button><button className={chipCls(otherMode==="fixed")} style={chip(otherMode==="fixed")} onClick={()=>setOtherMode("fixed")}>Monto fijo $</button></div><input type="number" inputMode="decimal" autoFocus value={otherValue} onChange={e=>setOtherValue(e.target.value)} placeholder={otherMode==="percent"?"Ej. 12 (%)":"Ej. 30 ($)"} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #d8cfc6",fontSize:15,fontFamily:"Georgia,serif",color:C.dark}} /></div>}
            <div style={{background:C.dark,borderRadius:12,padding:"14px 16px",marginTop:14,color:"#fff"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{opacity:0.8}}>Total cuenta</span><span style={{fontWeight:"bold"}}>{fmt(total)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}><span style={{opacity:0.8}}>Propina</span><span style={{fontWeight:"bold",color:C.pink}}>{fmt(tipAmount)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",borderTop:"1px solid rgba(255,255,255,0.2)",paddingTop:8}}><span style={{fontSize:13,opacity:0.9}}>A cobrar</span><span style={{fontSize:24,fontWeight:"bold"}}>{fmt(grandTotal)}</span></div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,padding:"12px 18px 18px",borderTop:"1px solid #f0e8e0"}}>
            <button onClick={onCancel} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Cancelar</button>
            <button disabled={!canConfirm} className="la-tap" onClick={()=>onConfirm({method,tipMode,tipValue,tipAmount})} style={{flex:1.4,background:canConfirm?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:canConfirm?"pointer":"default"}}>Cobrar {fmt(grandTotal)}</button>
          </div>
        </div>

    function EditCompletedModal({order,onClose,onUpdate}){
      const [optionsItem,setOptionsItem]=useState(null);
      const total=orderTotal(order);
      const payment=order.payment||{method:"efectivo",tipMode:"none",tipValue:0};
      function addSimple(item){ onUpdate(o=>{ const idx=o.lines.findIndex(l=>l.itemId===item.id&&Object.keys(l.opts).length===0); if(idx>=0){const lines=[...o.lines];lines[idx]={...lines[idx],qty:lines[idx].qty+1};return {...o,lines};} return {...o,lines:[...o.lines,{lid:"l"+Date.now()+Math.random(),itemId:item.id,qty:1,opts:{}}]}; }); }
      function addConfigured(item,opts,qty){ onUpdate(o=>{ const key=JSON.stringify(opts); const idx=o.lines.findIndex(l=>l.itemId===item.id&&JSON.stringify(l.opts)===key); if(idx>=0){const lines=[...o.lines];lines[idx]={...lines[idx],qty:lines[idx].qty+qty};return {...o,lines};} return {...o,lines:[...o.lines,{lid:"l"+Date.now()+Math.random(),itemId:item.id,qty,opts}]}; }); }
      function changeQty(lid,delta){ onUpdate(o=>({...o,lines:o.lines.map(l=>l.lid===lid?{...l,qty:l.qty+delta}:l).filter(l=>l.qty>0)})); }
      function handlePlus(item){ const hasOpts=(item.options&&item.options.length)||item.sizes||item.milk; if(hasOpts) setOptionsItem(item); else addSimple(item); }
      function setMethod(method){ onUpdate(o=>({...o,payment:{...(o.payment||{}),method}})); }
      function setTip(tipMode,tipValue){ onUpdate(o=>{ const t=orderTotal(o); const tipAmount=resolveTip(t,{tipMode,tipValue}); return {...o,payment:{...(o.payment||{}),tipMode,tipValue,tipAmount}}; }); }
      const tipAmount=resolveTip(total,payment);
      const [otherMode,setOtherMode]=useState(payment.tipMode==="fixed"?"fixed":"percent");
      const [otherValue,setOtherValue]=useState("");
      const stdTips=[0,5,10,15,20];
      const isStdTip=payment.tipMode==="none"?0:(payment.tipMode==="percent"&&stdTips.includes(Number(payment.tipValue))?Number(payment.tipValue):"otro");
      const chip=active=>({padding:"8px 0",borderRadius:9,fontSize:13,fontWeight:"bold",cursor:"pointer",border:active?`1.5px solid ${C.pink}`:"1.5px solid #d8cfc6",background:active?C.pink:"#fff",color:C.dark,flex:1});
      const chipCls=active=>"la-chip"+(active?" la-chip-active":"");
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:40,display:"flex",flexDirection:"column",animation:"laModalIn 0.2s ease"}}>
        <div style={{flex:1}} onClick={onClose} />
        <div style={{background:C.bg,borderRadius:"18px 18px 0 0",maxWidth:560,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",maxHeight:"94vh",animation:"laSheetUp 0.32s cubic-bezier(0.32,0.72,0,1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"16px 16px 12px",borderBottom:`1px solid ${C.pink}`}}>
            <div><div style={{fontSize:20,fontWeight:"bold"}}>Editar — {order.name}</div><div style={{fontSize:12,opacity:0.6,marginTop:2}}>Orden completada{order.mesa?` · Mesa ${order.mesa}`:order.type==="llevar"?" · Para llevar":""}</div></div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:C.dark}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 14px 16px"}}>
            <input value={order.note} onChange={e=>onUpdate(o=>({...o,note:e.target.value}))} placeholder="Notas generales del pedido…" style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid #d8cfc6",fontSize:12.5,background:"#fff",color:C.dark,marginBottom:14,fontFamily:"Georgia,serif"}} />
            <MenuLines lines={order.lines} onChangeQty={changeQty} onPlus={handlePlus} />
            {order.lines.length>0&&<div className="la-row" style={{border:`1.5px solid ${C.dark}`,borderRadius:12,padding:"12px 14px",marginTop:14,background:C.card}}><div style={{fontSize:15,fontWeight:"bold",marginBottom:10}}>Pedido</div>{order.lines.map((l,i)=><div key={l.lid} className="la-row" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f0e8e0",animationDelay:`${i*0.04}s`}}><div style={{flex:1,paddingRight:8}}><div style={{fontSize:13,fontWeight:"bold"}}>{lineDisplayName(l)}</div><div style={{fontSize:11,color:C.muted}}>{fmt(linePrice(l))} c/u · {fmt(lineSubtotal(l))}</div></div><QtyControl qty={l.qty} onMinus={()=>changeQty(l.lid,-1)} onPlus={()=>changeQty(l.lid,1)} /></div>)}</div>}
            <div style={{border:`1.5px solid ${C.dark}`,borderRadius:12,padding:"12px 14px",marginTop:12,background:C.card}}>
              <div style={{fontSize:15,fontWeight:"bold",marginBottom:10}}>Pago</div>
              <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,opacity:0.7}}>Método</div>
              <div style={{display:"flex",gap:8,marginBottom:14}}><button className={chipCls(payment.method==="efectivo")} style={chip(payment.method==="efectivo")} onClick={()=>setMethod("efectivo")}>💵 Efectivo</button><button className={chipCls(payment.method==="tarjeta")} style={chip(payment.method==="tarjeta")} onClick={()=>setMethod("tarjeta")}>💳 Tarjeta</button></div>
              <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,opacity:0.7}}>Propina</div>
              <div style={{display:"flex",gap:6,marginBottom:8}}>{stdTips.map(p=><button key={p} className={chipCls(isStdTip===p)} style={chip(isStdTip===p)} onClick={()=>p===0?setTip("none",0):setTip("percent",p)}>{p===0?"Sin":`${p}%`}</button>)}</div>
              <button className={chipCls(isStdTip==="otro")} style={{...chip(isStdTip==="otro"),width:"100%",flex:"none",marginBottom:8}} onClick={()=>setTip(otherMode,Number(otherValue)||0)}>Otro</button>
              {isStdTip==="otro"&&<div className="la-row" style={{background:C.bg,borderRadius:10,padding:"12px",marginBottom:8}}><div style={{display:"flex",gap:8,marginBottom:10}}><button className={chipCls(otherMode==="percent")} style={chip(otherMode==="percent")} onClick={()=>{setOtherMode("percent");setTip("percent",Number(otherValue)||0);}}>Porcentaje %</button><button className={chipCls(otherMode==="fixed")} style={chip(otherMode==="fixed")} onClick={()=>{setOtherMode("fixed");setTip("fixed",Number(otherValue)||0);}}>Monto fijo $</button></div><input type="number" inputMode="decimal" value={otherValue} onChange={e=>{setOtherValue(e.target.value);setTip(otherMode,Number(e.target.value)||0);}} placeholder={otherMode==="percent"?"Ej. 12 (%)":"Ej. 30 ($)"} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #d8cfc6",fontSize:15,fontFamily:"Georgia,serif",color:C.dark}} /></div>}
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,paddingTop:8,borderTop:"1px solid #f0e8e0",marginTop:4}}><span style={{opacity:0.7}}>Propina actual</span><span style={{fontWeight:"bold",color:C.pink}}>{fmt(tipAmount)}</span></div>
            </div>
          </div>
          <div style={{borderTop:"1px solid #e5ddd5",background:C.bg,padding:"12px 14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}><span style={{fontSize:14,opacity:0.6}}>Total cuenta</span><span style={{fontSize:26,fontWeight:"bold"}}>{fmt(total)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10,fontSize:12.5,color:C.muted}}><span>+ propina {fmt(tipAmount)}</span><span>Cobrado: <strong style={{color:C.dark}}>{fmt(total+tipAmount)}</strong></span></div>
            <button onClick={onClose} className="la-tap" style={{width:"100%",background:C.pink,color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:"pointer"}}>Guardar cambios</button>
          </div>
        </div>
        {optionsItem&&<OptionsModal item={optionsItem} onClose={()=>setOptionsItem(null)} onAdd={(opts,qty)=>{addConfigured(optionsItem,opts,qty);setOptionsItem(null);}} />}
      </div>;
    }

        <div onClick={onOpen} style={{cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            {takeout?<span style={{background:C.pinkPill,color:C.dark,fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20}}>🛍️ Para llevar</span>:order.mesa?<span style={{background:C.pinkPill,color:C.dark,fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20}}>Mesa {order.mesa}</span>:null}
            <button onClick={e=>{e.stopPropagation();onDelete();}} className="la-tap" style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.muted,padding:2}}>🗑️</button>
          </div>
          <div style={{fontSize:20,fontWeight:"bold"}}>{order.name}</div>
          <div style={{fontSize:12,color:C.muted,margin:"3px 0",display:"flex",flexWrap:"wrap",gap:"2px 10px"}}><span>🕐 {fmtTime(order.createdAt)}</span>{takeout&&(order.pickup?<span style={{color:C.dark,fontWeight:"bold"}}>📦 Recoge: {order.pickup}</span>:<span>sin hora de recogida</span>)}</div>
          <div style={{fontSize:28,fontWeight:"bold",marginTop:2}}>{fmt(total)}</div>
        </div>
        {count>0?<><div onClick={()=>setExpanded(e=>!e)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"1px solid #f0e8e0",cursor:"pointer"}}><span style={{fontSize:13,fontWeight:"bold",opacity:0.7}}>{count} item{count!==1?"s":""}</span><span style={{fontSize:12,color:C.muted,display:"inline-flex",alignItems:"center",gap:4}}>{expanded?"Ocultar":"Ver pedido"}<span style={{display:"inline-block",transition:"transform 0.22s ease",transform:expanded?"rotate(180deg)":"rotate(0deg)"}}>▾</span></span></div>{expanded&&<div className="la-row" style={{marginTop:8,display:"flex",flexDirection:"column",gap:5}}>{order.lines.map(l=><div key={l.lid} style={{display:"flex",justifyContent:"space-between",gap:10,fontSize:12.5,background:C.bg,borderRadius:7,padding:"6px 9px"}}><span style={{flex:1}}><strong>{l.qty}×</strong> {lineDisplayName(l)}</span><span style={{opacity:0.65,whiteSpace:"nowrap"}}>{fmt(lineSubtotal(l))}</span></div>)}{order.note&&<div style={{fontSize:11.5,color:C.muted,fontStyle:"italic",marginTop:2}}>Nota: {order.note}</div>}</div>}</>:<div style={{fontSize:13,color:C.muted,marginTop:8,paddingTop:8,borderTop:"1px solid #f0e8e0"}}>Sin items aún</div>}

        <div style={{fontSize:12,color:"#777",marginTop:6,lineHeight:1.4}}>{summary}</div>
        {order.payment&&<div style={{fontSize:11.5,marginTop:6,display:"flex",gap:8,flexWrap:"wrap"}}><span style={{background:C.bg,border:"1px solid #e5ddd5",borderRadius:6,padding:"2px 8px"}}>{order.payment.method==="tarjeta"?"💳 Tarjeta":"💵 Efectivo"}</span>{resolveTip(orderTotal(order),order.payment)>0&&<span style={{background:C.bg,border:`1px dashed ${C.pink}`,borderRadius:6,padding:"2px 8px"}}>🪙 Propina {fmt(resolveTip(orderTotal(order),order.payment))}</span>}</div>}

          <button onClick={onReopen} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",borderRadius:8,padding:"8px",fontSize:12.5,fontWeight:"bold",cursor:"pointer"}}>↩ Reabrir</button>
