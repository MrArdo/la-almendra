    /* =========================================================
       PERSISTENCE LAYER — Firebase Realtime Database
       loadState / saveState   -> localStorage (initial load + offline fallback)
       useFbKey                -> Firebase (live sync between devices)
       broadcast / useBroadcast-> Firebase "la_events" node (cross-device pings)
       ========================================================= */

    // Local fallback: still used for instant initial render while Firebase loads
    function loadState(key, fallback){
      try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch{ return fallback; }
    }
    function saveState(key, value){
      try{ localStorage.setItem(key,JSON.stringify(value)); }catch{}
    }

    // Firebase singleton
    let _db = null;
    function getDb(){
      if(_db) return _db;
      try{ firebase.initializeApp(FB_CONFIG); }catch(e){}
      _db = firebase.database();
      return _db;
    }

    // Write a value to a Firebase path.
    // Firebase doesn't support undefined values — strip them out first.
    function fbSet(path, value){
      try{
        const clean = JSON.parse(JSON.stringify(value, (k,v) => v===undefined ? null : v));
        getDb().ref(path).set(clean);
      }catch(e){ console.warn("fbSet failed", e); }
    }

    // Firebase strips empty arrays and converts arrays to numeric-keyed objects.
    // This function deep-restores the data to what the app expects:
    //   - Any object whose keys are ALL numeric strings → array
    //   - Known array fields that arrived as null → []
    function fbFixArrays(value){
      if(value === null || value === undefined) return value;
      if(Array.isArray(value)) return value.map(fbFixArrays);
      if(typeof value === "object"){
        const keys = Object.keys(value);
        // Any object with only numeric keys is treated as an array
        const allNumeric = keys.length > 0 && keys.every(k => /^\d+$/.test(k));
        if(allNumeric){
          const maxIdx = Math.max(...keys.map(Number));
          const arr = [];
          for(let i=0; i<=maxIdx; i++) arr.push(fbFixArrays(value[i] ?? null));
          return arr;
        }
        // Recurse into plain objects; fix known array fields that may be null/missing
        const ARRAY_FIELDS = ["lines","options","choices","categories","items","orders","completed","dayRecords"];
        const out = {};
        keys.forEach(k => {
          out[k] = fbFixArrays(value[k]);
        });
        ARRAY_FIELDS.forEach(f => { if(out[f] === null || out[f] === undefined) out[f] = []; });
        return out;
      }
      return value;
    }

    // React hook: syncs a piece of state with Firebase in real time.
    // initialValue comes from localStorage so the UI renders instantly on load.
    // The returned setter writes to both Firebase and localStorage.
    function useFbKey(fbPath, lsKey, initialValue){
      const [val, setVal] = useState(initialValue);
      const skipNext = useRef(false);

      useEffect(()=>{
        let ref;
        try{
          ref = getDb().ref(fbPath);
          ref.on("value", snap => {
            const raw = snap.val();
            if(raw === null) return;
            if(skipNext.current){ skipNext.current=false; return; }
            let remote = fbFixArrays(raw);
            // If this path holds orders (arrays of order objects), normalize each one
            if(Array.isArray(remote)) remote = remote.map(item => item && typeof item==="object" && ("lines" in item || item.id) ? normalizeOrder(item) : item);
            else if(remote && typeof remote==="object" && Object.keys(remote).every(k=>/^\d+$/.test(k))) remote = normalizeOrders(remote);
            setVal(remote);
            saveState(lsKey, remote);
          });
        }catch(e){ console.warn("useFbKey subscribe failed", e); }
        return ()=>{ try{ ref && ref.off(); }catch{} };
      }, [fbPath, lsKey]);

      const setter = useCallback(updater => {
        setVal(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          skipNext.current = true;
          fbSet(fbPath, next);
          saveState(lsKey, next);
          return next;
        });
      }, [fbPath, lsKey]);

      return [val, setter];
    }

    // Cross-device broadcast (used for kitchen-ready ping)
    function broadcast(type, payload){
      const msg = {type, payload, ts:Date.now(), src:Math.random()};
      try{ new BroadcastChannel("la-almendra").postMessage(msg); }catch{}
      try{ getDb().ref("la_events").push(msg); }catch(e){ console.warn("broadcast failed", e); }
    }

    function useBroadcast(handler){
      const ref = useRef(handler); ref.current = handler;
      useEffect(()=>{
        // Same-device tabs via BroadcastChannel
        let bc = null;
        try{ bc = new BroadcastChannel("la-almendra"); bc.onmessage = ev => { try{ if(ev.data?.type) ref.current(ev.data); }catch{} }; }catch{}
        // Other devices via Firebase — only new events after we connect
        let evRef = null;
        try{
          evRef = getDb().ref("la_events");
          evRef.limitToLast(1).on("child_added", snap => {
            try{ const m=snap.val(); if(m?.type) ref.current(m); }catch{}
          });
        }catch(e){ console.warn("useBroadcast firebase failed", e); }
        return ()=>{
          try{ bc?.close(); }catch{}
          try{ evRef && evRef.off(); }catch{}
        };
      },[]);
    }

    /* =========================================================
       SOUND (kitchen → service ping)

    let _audioCtx=null;
    function playPing(){
      try{
        if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        const ctx=_audioCtx;
        const now=ctx.currentTime;
        [880, 1320].forEach((f,i)=>{
          const o=ctx.createOscillator(); const g=ctx.createGain();
          o.type="sine"; o.frequency.value=f;
          g.gain.setValueAtTime(0,now+i*0.12);
          g.gain.linearRampToValueAtTime(0.22,now+i*0.12+0.02);
          g.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.32);
          o.connect(g); g.connect(ctx.destination);
          o.start(now+i*0.12); o.stop(now+i*0.12+0.35);
        });
      }catch{}
    }

    /* ── Ticket storage ──────────────────────────────────────────
       Structure in localStorage "la_tickets":
         { [dayKey]: { date, tickets: [{folio,orderId,name,mesa,type,total,completedAt,orderSnapshot}] } }

    function _ticketStore(){

    function _saveTicketStore(store){ try{ localStorage.setItem("la_tickets",JSON.stringify(store)); }catch{} }
    function _purgeOldDays(store){
      const cutoff=Date.now()-7*24*60*60*1000;
      const pruned={};
      Object.entries(store).forEach(([k,v])=>{ if((v.date||0)>=cutoff) pruned[k]=v; });
      return pruned;
    }
    function generateFolio(orderId){
      // Short sequential folio per day: DDMMYY-NNN
      const now=new Date();
      const dd=String(now.getDate()).padStart(2,"0");
      const mm=String(now.getMonth()+1).padStart(2,"0");
      const yy=String(now.getFullYear()).slice(-2);
      const dk=dayKey(Date.now());
      const store=_ticketStore();
      const dayData=store[dk]||{date:Date.now(),tickets:[]};
      const n=dayData.tickets.length+1;
      return `${dd}${mm}${yy}-${String(n).padStart(3,"0")}`;
    }
    function saveFolioRecord(order, folio){

        // Avoid duplicate if order already saved
        if(store[dk].tickets.find(t=>t.orderId===order.id)) return;
        store[dk].tickets.push({
          folio, orderId:order.id, name:order.name,
          mesa:order.mesa||null, type:order.type,
          completedAt:Date.now()

        _saveTicketStore(store);

    function fmtTime(ts){ const d=new Date(ts); let h=d.getHours(); const m=d.getMinutes().toString().padStart(2,"0"); const ap=h>=12?"pm":"am"; h=h%12; if(!h)h=12; return `${h}:${m} ${ap}`; }

    function hourBucket(ts){ return new Date(ts).getHours(); }

    /* =========================================================
       LINE / ORDER MATH (catalog-aware)
       ========================================================= */
    /* Normalize a choice: can be a plain string or {label, price} object. */
    function choiceLabel(ch){ return typeof ch==="object"&&ch!==null?ch.label:ch; }
    function choicePrice(ch){ return typeof ch==="object"&&ch!==null?Number(ch.price||0):0; }

    /* Sum extra prices from selected option choices. */
    function optionsExtraPrice(item, opts){
      if(!item.options||!opts) return 0;
      let extra=0;
      item.options.forEach(o=>{
        const val=opts[o.key];
        if(val===undefined||val===null) return;
        if(o.type==="single"){
          const ch=(o.choices||[]).find(c=>choiceLabel(c)===val);
          if(ch) extra+=choicePrice(ch);
        } else {
          (Array.isArray(val)?val:[]).forEach(lbl=>{
            const ch=(o.choices||[]).find(c=>choiceLabel(c)===lbl);
            if(ch) extra+=choicePrice(ch);
          });
        }
      });
      return extra;
    }

    function linePriceWith(catalog,line){
      const item=catalog.itemMap[line.itemId]; if(!item) return 0;
      const opts=line.opts||{};
      let base=item.price||0;
      if(item.sizes) base=item.sizes[opts.size||"chico"];
      base+=optionsExtraPrice(item, opts);
      return base;
    }
    function lineSubtotalWith(catalog,line){ return linePriceWith(catalog,line)*(line.qty||0); }
    function orderTotalWith(catalog,order){ return (Array.isArray(order?.lines)?order.lines:[]).reduce((s,l)=>s+lineSubtotalWith(catalog,l),0); }
    function orderItemCountWith(order){ return (Array.isArray(order?.lines)?order.lines:[]).reduce((s,l)=>s+(l.qty||0),0); }

    // Build 24-hour activity buckets from a list of orders
    function hourBucketsFromOrders(catalog, orders){
      const buckets=Array(24).fill(0).map((_,h)=>({h,count:0,total:0}));
      orders.forEach(o=>{
        const h=hourBucket(o.completedAt||o.createdAt);
        buckets[h].count+=1;
        buckets[h].total+=orderTotalWith(catalog,o);
      });
      return buckets;
    }

        if(!m[k]) m[k]={name:k,qty:0,total:0};
        m[k].qty+=l.qty;
        m[k].total+=lineSubtotalWith(catalog,l);
      }));
      return Object.values(m).sort((a,b)=>b.qty-a.qty).slice(0,limit);
    }

    // Aggregates totals split by payment method + tip total
    function paymentTotalsWith(catalog, orders){
      let ef=0, ta=0, tr=0, propinas=0;
      orders.forEach(o=>{
        const total=orderTotalWith(catalog,o);
        const method=o.payment?.method||"efectivo";
        if(method==="tarjeta") ta+=total;
        else if(method==="transferencia") tr+=total;
        else ef+=total;
        propinas+=resolveTip(total,o.payment);
      });
      return {ef, ta, tr, propinas};
    }
    // prepared is now stored as preparedCount (number 0..qty).
    // bool .prepared is still supported for backwards compat (treated as qty).
    function linePreparedCount(l){ if(typeof l.preparedCount==="number") return l.preparedCount; return l.prepared?l.qty:0; }
    function linePreparedFull(l){ return linePreparedCount(l)>=l.qty; }
    function linePreparedAny(l){ return linePreparedCount(l)>0; }
    function orderRootItemCount(order){ return order.lines.filter(l=>!l.opts?.parentLid).reduce((s,l)=>s+l.qty,0); }
    // Count only root lines (no extras/children linked to a parent)
    function resolveTip(total,payment){ if(!payment||!payment.tipMode||payment.tipMode==="none") return 0; if(payment.tipMode==="percent") return total*(Number(payment.tipValue)||0)/100; if(payment.tipMode==="fixed") return Number(payment.tipValue)||0; return 0; }

    function lineDisplayNameWith(catalog,line){
      const item=catalog.itemMap[line.itemId]; if(!item) return "(eliminado)";
      const opts=line.opts||{};
      let name=item.name; const parts=[];
      if(opts.size) parts.push(opts.size==="chico"?"Chico":"Grande");
      // All known options in catalog order
      if(item.options){
        item.options.forEach(o=>{
          const val=opts[o.key];
          if(val===undefined||val===null) return;
          if(o.type==="single"){ if(val) parts.push(val); }
          else { if(Array.isArray(val)&&val.length) parts.push(val.join(", ")); }
        });
      }
      // Legacy keys from old saved orders (backwards compat)
      const knownOptKeys=new Set([...(item.options||[]).map(o=>o.key),"size","parentLid"]);
      Object.keys(opts).forEach(k=>{
        if(knownOptKeys.has(k)) return;
        const v=opts[k]; if(!v) return;
        if(k==="milk") parts.push(v==="entera"?"Leche entera":"Deslactosada");
        else if(Array.isArray(v)) parts.push(v.join(", "));
        else parts.push(String(v));
      });
      if(parts.length) name+=` (${parts.join(" · ")})`;
      return name;
    }

    /* Map flat lines into parent-children groups: child lines whose
       opts.parentLid points to a parent are nested under the parent
       in the visual summary. */
    function groupLinesForDisplay(lines){
      const byParent={}; const orphans=[]; const ordered=[];
      const parentLookup=new Map(lines.map(l=>[l.lid,l]));
      lines.forEach(l=>{
        const p=l.opts&&l.opts.parentLid;
        if(p&&parentLookup.has(p)){
          if(!byParent[p]) byParent[p]=[];
          byParent[p].push(l);
        }
      });
      lines.forEach(l=>{
        if(l.opts&&l.opts.parentLid&&parentLookup.has(l.opts.parentLid)) return;
        ordered.push({line:l, children: byParent[l.lid]||[]});
      });
      return ordered;
    }

    /* =========================================================
       CATALOG HELPERS
       ========================================================= */
    // Ensures every order coming from Firebase has the correct shape.
    // Firebase drops empty arrays and converts arrays to objects — this fixes that.
    function normalizeOrder(o){
      if(!o || typeof o !== "object") return o;
      return {
        ...o,
        lines: Array.isArray(o.lines) ? o.lines.map(l=>({...l, opts:l.opts||{}}))
             : o.lines && typeof o.lines === "object" ? Object.values(o.lines).map(l=>({...l, opts:l.opts||{}}))
             : [],
      };
    }
    function normalizeOrders(arr){
      if(!arr) return [];
      if(Array.isArray(arr)) return arr.map(normalizeOrder);
      if(typeof arr === "object") return Object.values(arr).map(normalizeOrder);
      return [];
    }

    function indexCatalog(cat){
      // Defensive: ensure cat has required shape
      const categories=cat?.categories||[];
      const items=cat?.items||[];
      const itemMap={}; const catMap={};
      categories.forEach(c=>catMap[c.id]=c);
      items.forEach(it=>itemMap[it.id]=it);
      const activeItems=items.filter(it=>!it.deleted);
      return {...cat, categories, items, itemMap, catMap, activeItems};
    }
    function filterFoodLines(catalog,order){
      return order.lines.filter(l=>{
        const it=catalog.itemMap[l.itemId]; if(!it) return false;
        const cat=catalog.catMap[it.catId];
        // Exclude if category is explicitly marked showInKitchen:false
        if(cat?.showInKitchen===false) return false;
        // Also exclude drink items whose category doesn't override to kitchen
        if(it.foodKind==="drink" && cat?.showInKitchen!==true) return false;
        return true;
      });
    }

    const PROFILES = {

    function AuthScreen({pins, firstRun, onAuthed}){
      const profiles=Object.values(PROFILES);
      const [selected,setSelected]=useState(null);
      const [pin,setPin]=useState("");
      const [error,setError]=useState("");

      // First-time setup: no init flag yet → drop straight into admin to configure.
      useEffect(()=>{ if(firstRun) onAuthed("admin"); },[firstRun,onAuthed]);

      // Physical keyboard support when a profile with PIN is selected
      useEffect(()=>{
        if(!selected||!pins?.[selected.id]) return;
        function onKey(e){
          if(e.key>="0"&&e.key<="9"){ const d=parseInt(e.key); if(pin.length<4){ const np=pin+String(d); setPin(np); setError(""); if(np.length===4) setTimeout(()=>tryUnlock(selected.id,np),120); } }
          else if(e.key==="Backspace") setPin(p=>p.slice(0,-1));
          else if(e.key==="Escape"){ setPin(""); setError(""); }
        }
        window.addEventListener("keydown",onKey);
        return ()=>window.removeEventListener("keydown",onKey);
      },[selected,pin,pins]);

      function tryUnlock(profileId, candidate){
        const stored=pins?.[profileId]||"";
        if(!stored){ onAuthed(profileId); return; } // unset PIN = open access for that profile
        if(candidate===stored){ onAuthed(profileId); return; }
        setError("PIN incorrecto"); setPin("");
      }

      if(!selected){
        return <div style={{minHeight:"100vh",background:C.dark,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{width:"100%",maxWidth:380}}>
            <div style={{textAlign:"center",marginBottom:28,color:"#fff"}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:8}}><LogoLight width={130} /></div>
              <div style={{fontSize:13,opacity:0.7,marginTop:6}}>Elige tu perfil</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {profiles.map(p=><button key={p.id} onClick={()=>{setSelected(p);setPin("");setError("");}} className="la-tap" style={{background:"#fff",border:"none",borderRadius:14,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left"}}>
                <div style={{width:46,height:46,borderRadius:"50%",background:p.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{p.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:17,fontWeight:"bold",color:C.dark}}>{p.label}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:1}}>{!pins?.[p.id]?"Sin PIN configurado":"Requiere PIN"}</div>
                </div>
                <div style={{fontSize:20,color:C.muted}}>›</div>
              </button>)}
            </div>
          </div>
        </div>;
      }

      const hasPin=!!pins?.[selected.id];
      return <div style={{minHeight:"100vh",background:C.dark,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:380,background:"#fff",borderRadius:18,padding:"22px 22px 18px",animation:"laPopIn 0.28s ease"}}>
          <button onClick={()=>{setSelected(null);setError("");}} className="la-tap" style={{background:"none",border:"none",color:C.dark,fontSize:13,fontWeight:"bold",cursor:"pointer",marginBottom:10,padding:0}}>‹ Cambiar perfil</button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
            <div style={{width:48,height:48,borderRadius:"50%",background:selected.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{selected.icon}</div>
            <div><div style={{fontSize:18,fontWeight:"bold",color:C.dark}}>{selected.label}</div><div style={{fontSize:12,color:C.muted}}>{hasPin?"Ingresa tu PIN":"Sin PIN configurado"}</div></div>
          </div>
          {hasPin?<>
            <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:18}}>{[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?selected.color:"#e5ddd5",transition:"background 0.2s"}} />)}</div>
            {error&&<div style={{textAlign:"center",fontSize:13,color:C.danger,marginBottom:10}}>{error}</div>}
            {(()=>{ const addDigit=n=>{ if(pin.length<4){ const np=pin+String(n); setPin(np); setError(""); if(np.length===4) setTimeout(()=>tryUnlock(selected.id,np),120); } }; return <PinPad size="lg" onDigit={addDigit} onClear={()=>setPin("")} onBack={()=>setPin(p=>p.slice(0,-1))} />; })()}
          </>:<button onClick={()=>onAuthed(selected.id)} className="la-tap" style={{width:"100%",background:selected.color,color:"#fff",border:"none",padding:"14px",borderRadius:12,fontSize:15,fontWeight:"bold",cursor:"pointer"}}>Entrar a {selected.label}</button>}
        </div>
      </div>;

        // Migration: ensure milk option exists on items that need it
        const milkIds=new Set(['fria-latte', 'fria-vainilla', 'fria-caramelo', 'fria-matcha', 'fria-taro', 'fria-chai', 'cal-latte', 'cal-vainilla', 'cal-caramelo', 'cal-matcha', 'cal-taro', 'cal-chai']);

        cat={...cat, items: cat.items.map(it=>{
          if(!milkIds.has(it.id)) return it;
          const hasMilk=(it.options||[]).some(o=>o.key==="milk");
          if(hasMilk) return it;
          changed=true;
          return {...it, options:[milkOpt(), ...(it.options||[])]};

      // Derived indexed catalog

      // pins, initialized, catalog: device-local only (no cross-device sync needed)
      useEffect(()=>saveState("la_pins",pins),[pins]);
      useEffect(()=>saveState("la_initialized",initialized),[initialized]);
      // catalogRaw synced via useFbKey (no extra effect needed)
      // orders, completed, dayRecords, soundOn: synced via useFbKey (no extra effect needed)

      // Close profile dropdown on outside click
      useEffect(()=>{
        if(!profileDropOpen) return;
        const handler=e=>{ setProfileDropOpen(false); };
        setTimeout(()=>document.addEventListener("click",handler),10);
        return ()=>document.removeEventListener("click",handler);
      },[profileDropOpen]);

      // Cross-tab listener: when kitchen marks ready, play ping in service/admin
      useBroadcast(msg=>{
        if(msg.type==="order-ready" && (profile==="admin"||profile==="servicio")){
          if(soundOn) playPing();
          setPrepFlash(c=>c+1);
        }
      });

      // Default tab per profile
      useEffect(()=>{
        if(!profile){ setTab(null); return; }
        const allowed = PROFILES[profile]?.tabs || [];
        if(!tab || !allowed.includes(tab)) setTab(allowed[0]);
      },[profile]); // eslint-disable-line

      // ============== ACTIONS ==============
      const showToast=useCallback((msg,undoFn)=>{
        if(toastTimer.current) clearTimeout(toastTimer.current);
        setToast({msg,undoFn,id:Date.now()});
        toastTimer.current=setTimeout(()=>setToast(null),4000);
      },[]);
      function doUndo(){ if(toast?.undoFn) toast.undoFn(); if(toastTimer.current) clearTimeout(toastTimer.current); setToast(null); }

      function createAccount(name,mesa){
        const o={id:newId("o"),seq:nextSeq(),name,mesa:mesa||null,type:"mesa",lines:[],createdAt:Date.now()};
        setOrders(p=>[o,...p]); setNewAccountModal(false); setActiveOrderId(o.id);
        if(isEggName(name)) setEggActive(true);
      }
      function createTakeout(name,pickup){
        const o={id:newId("o"),seq:nextSeq(),name,mesa:null,type:"llevar",pickup:pickup||null,lines:[],createdAt:Date.now()};
        setOrders(p=>[o,...p]); setTakeoutModal(false); setActiveOrderId(o.id);
        if(isEggName(name)) setEggActive(true);
      }
      function updateOrder(id,fn){ setOrders(p=>p.map(o=>o.id===id?fn(o):o)); }
      function deleteOrder(id){
        const s=orders.find(o=>o.id===id);
        setOrders(p=>p.filter(o=>o.id!==id));
        showToast("Cuenta eliminada",()=>setOrders(p=>[s,...p]));
      }
      function chargeOrder(id,payment){
        const o=orders.find(x=>x.id===id); if(!o) return;
        const folio=generateFolio(id);
        const comp={...o,completedAt:Date.now(),payment,folio};
        saveFolioRecord(o,folio);
        setCompleted(p=>[comp,...p]); setOrders(p=>p.filter(x=>x.id!==id)); setActiveOrderId(null);
        const tip=resolveTip(orderTotalWith(catalog,o),payment);
        showToast(`Cobrado ${fmt(orderTotalWith(catalog,o))}${tip>0?` (+ ${fmt(tip)} propina)`:""} · ${o.name}`,()=>{
          setCompleted(p=>p.filter(c=>c.id!==comp.id));
          setOrders(p=>[o,...p]);
        });
      }
      function closeOrderNoCharge(id){
        const s=orders.find(o=>o.id===id);
        setOrders(p=>p.filter(o=>o.id!==id)); setActiveOrderId(null);
        showToast("Cuenta cerrada sin cobrar",()=>setOrders(p=>[s,...p]));
      }
      function closeAllAccounts(){
        const s=orders;
        const comps=orders.map(o=>({...o,completedAt:Date.now(),payment:{method:"efectivo",tipMode:"none",tipValue:0}}));
        setCompleted(p=>[...comps,...p]); setOrders([]);
        showToast(`${s.length} cuentas cerradas`,()=>{ setOrders(s); setCompleted(p=>p.filter(c=>!comps.find(x=>x.id===c.id))); });
      }
      function deleteCompleted(id){
        const s=completed.find(c=>c.id===id);
        setCompleted(p=>p.filter(c=>c.id!==id));
        showToast("Orden eliminada",()=>setCompleted(p=>[s,...p]));
      }
      function updateCompleted(id,fn){ setCompleted(p=>p.map(c=>c.id===id?fn(c):c)); }
      function reopenCompleted(id){
        const c=completed.find(x=>x.id===id); if(!c) return;
        const {completedAt,payment,...rest}=c; const r={...rest,seq:nextSeq()};
        setCompleted(p=>p.filter(x=>x.id!==id));
        setOrders(p=>[r,...p]);
        showToast(`${c.name} regresó a cuentas abiertas`,()=>{ setOrders(p=>p.filter(o=>o.id!==r.id)); setCompleted(p=>[c,...p]); });
      }
      function terminarDia(){
        const all=[...orders.map(o=>({...o,completedAt:Date.now(),payment:{method:"efectivo",tipMode:"none",tipValue:0}})),...completed];
        if(all.length){
          const total=all.reduce((s,o)=>s+orderTotalWith(catalog,o),0);
          setDayRecords(p=>[...p,{key:dayKey(Date.now()),date:Date.now(),total,count:all.length,orders:all}]);
        }
        setOrders([]); setCompleted([]);
        showToast("Día terminado y archivado");
      }
      // Kitchen action
      // subIdx: which unit to toggle (0-based). If undefined, toggles all units.
      function setLinePrepared(orderId, lid, markDone, subIdx){
        setOrders(p=>p.map(o=>{
          if(o.id!==orderId) return o;
          const newLines=o.lines.map(l=>{
            if(l.lid===lid){
              let newCount;
              if(subIdx!==undefined){
                // Toggle a specific unit
                const cur=linePreparedCount(l);
                newCount=markDone ? Math.min(l.qty, cur+1) : Math.max(0, cur-1);
              } else {
                newCount=markDone?l.qty:0;
              }
              return {...l, preparedCount:newCount, prepared:newCount>=l.qty};
            }
            if(l.opts?.parentLid===lid){
              // Child follows parent: fully prepared when parent is fully prepared
              const parentCount=markDone?(subIdx!==undefined?1:l.qty):0;
              const childFull=subIdx===undefined&&markDone;
              return {...l, preparedCount:childFull?l.qty:0, prepared:childFull};
            }
            return l;
          });
          if(markDone){
            const foodLines=newLines.filter(l=>{ const it=catalog.itemMap[l.itemId]; return it&&it.foodKind==="food"; });
            const allReady=foodLines.length>0&&foodLines.every(l=>linePreparedFull(l));
            if(allReady){ broadcast("order-ready",{orderId}); if(soundOn) playPing(); }
          }
          return {...o, lines:newLines};
        }));
      }
      // Same as setLinePrepared but operates on completed orders (charged before kitchen finishes)
      function setLinePreparedCompleted(orderId, lid, markDone, subIdx){
        updateCompleted(orderId, o=>{
          const newLines=o.lines.map(l=>{
            if(l.lid===lid){
              let newCount;
              if(subIdx!==undefined){
                const cur=linePreparedCount(l);
                newCount=markDone ? Math.min(l.qty, cur+1) : Math.max(0, cur-1);
              } else {
                newCount=markDone?l.qty:0;
              }
              return {...l, preparedCount:newCount, prepared:newCount>=l.qty};
            }
            if(l.opts?.parentLid===lid){
              const childFull=subIdx===undefined&&markDone;
              return {...l, preparedCount:childFull?l.qty:0, prepared:childFull};
            }
            return l;
          });
          return {...o, lines:newLines};
        });
      }

      function markOrderAllPrepared(orderId){
        setOrders(p=>p.map(o=>{ if(o.id!==orderId) return o;
          return {...o, lines: o.lines.map(l=>{ const it=catalog.itemMap[l.itemId]; if(!it||it.foodKind!=="food") return l; return {...l, preparedCount:l.qty, prepared:true}; })};
        }));
        broadcast("order-ready",{orderId,bulk:true});
        if(soundOn) playPing();
      }

      // Toggle "preparing" state on an order (kitchen long-press to mark in progress)
      // Searches in both orders and completed (charged orders still visible in kitchen)
      function togglePreparing(orderId){
        let found=false;
        setOrders(p=>p.map(o=>{ if(o.id!==orderId) return o; found=true; return {...o, preparing: !o.preparing}; }));
        if(!found){
          setCompleted(p=>p.map(o=>{ if(o.id!==orderId) return o; return {...o, preparing: !o.preparing}; }));
        }
      }
      // Transfer items between open accounts
      // transfers: [{lid, qty}] — can be partial qty of a line
      function transferLines(fromId, toId, transfers){
        const fromOrder=orders.find(o=>o.id===fromId); const toOrder=orders.find(o=>o.id===toId);
        if(!fromOrder||!toOrder) return;
        const lidSet=new Set(transfers.map(t=>t.lid));
        const qtyMap=Object.fromEntries(transfers.map(t=>[t.lid,t.qty]));
        // Bring children whose parent is fully transferred
        fromOrder.lines.forEach(l=>{ if(l.opts?.parentLid&&lidSet.has(l.opts.parentLid)){
          const parentQty=qtyMap[l.opts.parentLid]; const parentLine=fromOrder.lines.find(x=>x.lid===l.opts.parentLid);
          if(parentLine&&parentQty>=parentLine.qty) lidSet.add(l.lid); // only bring child if transferring all of parent
        }});
        const idMap={};
        const finalMoved=fromOrder.lines.filter(l=>lidSet.has(l.lid)).map(l=>{
          const nl=newId("l"); idMap[l.lid]=nl;
          const tqty=qtyMap[l.lid]??l.qty;
          let opts=l.opts;
          if(opts?.parentLid&&!idMap[opts.parentLid]&&!lidSet.has(opts.parentLid)){const {parentLid,...rest}=opts;opts=rest;}
          return {...l,lid:nl,qty:tqty,opts};
        }).map(l=>l.opts?.parentLid&&idMap[l.opts.parentLid]?{...l,opts:{...l.opts,parentLid:idMap[l.opts.parentLid]}}:l);
        setOrders(p=>p.map(o=>{
          if(o.id===fromId) return {...o, lines:o.lines.map(l=>{
            if(!lidSet.has(l.lid)) return l;
            const tqty=qtyMap[l.lid]??l.qty; const remaining=l.qty-tqty;
            return remaining<=0?null:{...l,qty:remaining};
          }).filter(Boolean)};
          if(o.id===toId) return {...o, lines:[...o.lines,...finalMoved]};
          return o;
        }));
        showToast(`Transferido a ${toOrder.name}`,()=>{
          // undo: move back
          setOrders(p=>p.map(o=>{
            if(o.id===fromId) return {...o, lines:[...o.lines,...fromOrder.lines.filter(l=>lidSet.has(l.lid))]};
            if(o.id===toId) return {...o, lines:o.lines.filter(l=>!finalMoved.find(m=>m.lid===l.lid))};
            return o;
          }));
        });
      }

      // ============== DERIVED ==============
      const activeOrder=orders.find(o=>o.id===activeOrderId);
      const dayTotal=completed.reduce((s,o)=>s+orderTotalWith(catalog,o),0);
      const openTotal=orders.reduce((s,o)=>s+orderTotalWith(catalog,o),0);
      const catBreakdown=useMemo(()=>{ const m={}; completed.forEach(o=>(Array.isArray(o?.lines)?o.lines:[]).forEach(l=>{ const it=catalog.itemMap[l.itemId]; const c=it?catalog.catMap[it.catId]?.name||"—":"(eliminado)"; if(!m[c]) m[c]={cat:c,qty:0,total:0}; m[c].qty+=l.qty; m[c].total+=lineSubtotalWith(catalog,l); })); return Object.values(m).sort((a,b)=>b.total-a.total); },[completed,catalog]);
      const topItems=useMemo(()=>{ const m={}; completed.forEach(o=>(Array.isArray(o?.lines)?o.lines:[]).forEach(l=>{ const k=lineDisplayNameWith(catalog,l); const it=catalog.itemMap[l.itemId]; const c=it?catalog.catMap[it.catId]?.name||"—":"—"; if(!m[k]) m[k]={name:k,cat:c,qty:0,total:0}; m[k].qty+=l.qty; m[k].total+=lineSubtotalWith(catalog,l); })); return Object.values(m).sort((a,b)=>b.qty-a.qty); },[completed,catalog]);
      const payBreakdown=useMemo(()=>{
        let ef=0,ta=0,tr=0,pr=0,pe=0,pt=0,ptr=0;
        completed.forEach(o=>{ const t=orderTotalWith(catalog,o); const tip=resolveTip(t,o.payment); const m=o.payment?.method||"efectivo";
          if(m==="tarjeta"){ta+=t;pt+=tip;} else if(m==="transferencia"){tr+=t;ptr+=tip;} else {ef+=t;pe+=tip;}
          pr+=tip; });
        return {efectivo:ef,tarjeta:ta,transferencia:tr,propinas:pr,propEfectivo:pe,propTarjeta:pt,propTransferencia:ptr};
      },[completed,catalog]);
      const hourFlow=useMemo(()=>{
        const buckets=Array(24).fill(0).map((_,h)=>({h,count:0,total:0}));
        completed.forEach(o=>{ const h=hourBucket(o.completedAt||o.createdAt); buckets[h].count+=1; buckets[h].total+=orderTotalWith(catalog,o); });
        return buckets;
      },[completed,catalog]);
      const curWeekStart=weekStart(Date.now());
      const weekDays=dayRecords.filter(r=>weekStart(r.date)===curWeekStart).sort((a,b)=>a.date-b.date);
      const weekTotal=weekDays.reduce((s,d)=>s+d.total,0);
      const weekCount=weekDays.reduce((s,d)=>s+d.count,0);
      const now2=new Date(); const curMonth=now2.getMonth(),curYear=now2.getFullYear();
      const monthDays=dayRecords.filter(r=>{ const d=new Date(r.date); return d.getMonth()===curMonth&&d.getFullYear()===curYear; });
      const monthWeeks=useMemo(()=>{ const m={}; monthDays.forEach(r=>{ const ws=weekStart(r.date); if(!m[ws]) m[ws]={ws,days:[],total:0,count:0}; m[ws].days.push(r); m[ws].total+=r.total; m[ws].count+=r.count; }); return Object.values(m).sort((a,b)=>a.ws-b.ws); },[dayRecords]);
      const monthTotal=monthDays.reduce((s,d)=>s+d.total,0);
      const monthCount=monthDays.reduce((s,d)=>s+d.count,0);

      // ============== AUTH GUARD ==============
      if(!profile) return <AuthScreen pins={pins} firstRun={!initialized} onAuthed={p=>{ setProfile(p); if(!initialized) setInitialized(true); }} />;
      const prof=PROFILES[profile]; const allowedTabs=prof?.tabs||[];
      const visibleTabs=TABS_DEF.filter(t=>allowedTabs.includes(t.k));

      // ============== RENDER ==============
      return <div className="la-app" style={{fontFamily:"Georgia,'Times New Roman',serif",background:C.bg,color:C.text,width:"100%",height:"100vh",overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
        <style>{GLOBAL_CSS}</style>
        <div className="la-header">
          {/* LEFT — logo + hamburger (Admin only, both viewports) */}
          <div className="la-header-left" style={{display:"flex",alignItems:"center",gap:10}}>
            <LogoLight width={88} />
            {profile==="admin"&&<button className="la-hamburger la-tap" onClick={()=>{setHamburgerOpen(o=>!o);setProfileDropOpen(false);}} style={{background:"none",border:"none",cursor:"pointer",padding:6,display:"flex",flexDirection:"column",gap:4.5,alignItems:"center",justifyContent:"center"}}>
              <span style={{display:"block",width:18,height:2,background:"#fff",borderRadius:2,transition:"all 0.2s ease",transform:hamburgerOpen?"rotate(45deg) translate(4.5px,4.5px)":"none"}} />
              <span style={{display:"block",width:18,height:2,background:"#fff",borderRadius:2,opacity:hamburgerOpen?0:1,transition:"opacity 0.15s ease"}} />
              <span style={{display:"block",width:18,height:2,background:"#fff",borderRadius:2,transition:"all 0.2s ease",transform:hamburgerOpen?"rotate(-45deg) translate(4.5px,-4.5px)":"none"}} />
            </button>}
          </div>
          {/* CENTER — nav tabs (desktop only, no catálogo/ajustes) */}
          <div className="la-header-logo">
            <div className="la-header-tabs">
              {visibleTabs.filter(t=>!["catalogo","ajustes"].includes(t.k)).map(t=><button key={t.k} onClick={()=>setTab(t.k)} className="la-tap" style={{border:"none",background:tab===t.k?C.pink:"transparent",padding:"8px 14px",borderRadius:10,cursor:"pointer",color:tab===t.k?C.dark:"rgba(255,255,255,0.75)",fontWeight:"bold",fontSize:13,display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:15}}>{t.icon}</span>{t.label}</button>)}
            </div>
          </div>
          {/* RIGHT — profile button */}
          <div className="la-header-right" style={{position:"relative"}}>
            <div style={{display:"none"}}>{/* desktop tabs moved to center */}</div>
            {/* Profile button */}
            {(()=>{
              const PIcon=PROFILE_ICON[profile]||IconAdmin;
              const hasPin=!!pins?.[profile];
              return <button onClick={()=>{setProfileDropOpen(o=>!o);setHamburgerOpen(false);}} className="la-tap" style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:20,padding:"5px 10px 5px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,color:"#fff"}}>
                <PIcon size={20} color="#fff" />
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-start",lineHeight:1.1}}>
                  <span style={{fontSize:11,fontWeight:"bold"}}>{PROFILE_SHORT[profile]}</span>
                  {hasPin&&<span style={{display:"flex",alignItems:"center",gap:2,opacity:0.75}}><IconLock size={9} color="#fff" /><span style={{fontSize:9}}>PIN</span></span>}
                </div>
                <IconChevron size={9} color="#fff" up={profileDropOpen} />
              </button>;
            })()}
            {/* Profile dropdown */}
            {profileDropOpen&&<div style={{position:"absolute",top:"calc(100% + 8px)",right:0,background:"#fff",borderRadius:12,padding:6,minWidth:180,boxShadow:"0 8px 28px rgba(30,58,52,0.2)",zIndex:30,animation:"laDropIn 0.18s ease"}}>
              {Object.values(PROFILES).map(p=>{
                const PIcon=PROFILE_ICON[p.id]||IconAdmin;
                const hasPin=!!pins?.[p.id];
                const isCurrent=p.id===profile;
                return <button key={p.id} onClick={()=>{
                  if(isCurrent){setProfileDropOpen(false);return;}
                  setProfileDropOpen(false);
                  // Admin can switch freely; others need PIN if target has one
                  if(profile==="admin"||!pins?.[p.id]){
                    setProfile(p.id);
                  } else {
                    setSwitchingTo(p.id);
                  }
                }} className="la-tap" style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 10px",borderRadius:8,border:"none",background:isCurrent?"#F5D0CC":"transparent",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:C.dark,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <PIcon size={18} color="#fff" />
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:"bold",color:C.dark}}>{p.label}</div>
                    <div style={{fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:3}}>
                      {hasPin?<><IconLock size={9} color={C.muted} /><span>Requiere PIN</span></>:<span>Sin PIN</span>}
                    </div>
                  </div>
                  {isCurrent&&<span style={{fontSize:11,color:C.pink,fontWeight:"bold"}}>✓</span>}
                </button>;
              })}
              <div style={{borderTop:"1px solid #f0e8e0",margin:"4px 0"}} />
              <button onClick={()=>{setProfileDropOpen(false);setProfile(null);}} className="la-tap" style={{width:"100%",padding:"9px 10px",borderRadius:8,border:"none",background:"transparent",cursor:"pointer",textAlign:"left",fontSize:13,color:C.danger,fontWeight:"bold"}}>
                Cerrar sesión
              </button>
            </div>}
            {/* Inline PIN prompt for profile switch */}
            {switchingTo&&<SwitchPinModal targetId={switchingTo} pins={pins} onSuccess={()=>{setProfile(switchingTo);setSwitchingTo(null);}} onCancel={()=>setSwitchingTo(null)} />}
          </div>
        </div>
        {/* Hamburger slide panel (mobile, admin only) */}
        {hamburgerOpen&&<>
          <div onClick={()=>setHamburgerOpen(false)} style={{position:"fixed",inset:0,zIndex:25,background:"rgba(30,58,52,0.4)"}} />
          <div style={{position:"fixed",top:0,left:0,bottom:0,width:240,background:C.dark,zIndex:26,paddingTop:86,paddingLeft:10,paddingRight:10,paddingBottom:12,display:"flex",flexDirection:"column",gap:4,animation:"laSlideIn 0.22s cubic-bezier(0.32,0.72,0,1)"}}>
            <div style={{fontSize:10,fontWeight:"bold",letterSpacing:1.5,color:"rgba(255,255,255,0.45)",textTransform:"uppercase",padding:"6px 8px 4px"}}>Admin</div>
            {[{k:"catalogo",label:"Catálogo",icon:"🍽️"},{k:"ajustes",label:"Ajustes",icon:"⚙️"}].map(t=><button key={t.k} onClick={()=>{setTab(t.k);setHamburgerOpen(false);}} className="la-tap" style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",borderRadius:10,border:"none",background:tab===t.k?"rgba(232,145,138,0.2)":"transparent",cursor:"pointer",textAlign:"left",color:"#fff",fontWeight:tab===t.k?"bold":"normal",fontSize:14}}><span style={{fontSize:18}}>{t.icon}</span>{t.label}</button>)}
            <button onClick={()=>{setFolioSearch(true);setHamburgerOpen(false);}} className="la-tap" style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",borderRadius:10,border:"none",background:"transparent",cursor:"pointer",textAlign:"left",color:"#fff",fontSize:14}}><span style={{fontSize:18}}>🧾</span>Tickets</button>
          </div>
        </>}

        <div className={"la-content-pad"+(newAccountModal||takeoutModal||activeOrderId||editingCompletedId||confirmModal||chargeModal||reportModal||weekDetail||dayDetail||transferModal||ticketOrder||hamburgerOpen?" la-content-blurred":"")} style={{flex:1,overflowY:"auto"}}>
          <div key={tab} className="la-tab-content la-content-wrap">
            {tab==="activos"&&<TabActivos catalog={catalog} orders={orders} profile={profile} canDelete={profile==="admin"||profile==="servicio"}
              onNew={()=>setNewAccountModal(true)} onTakeout={()=>setTakeoutModal(true)} onOpen={id=>setActiveOrderId(id)}
              onDelete={o=>setConfirmModal({title:"Eliminar cuenta",desc:`¿Eliminar la cuenta de ${o.name}?`,confirmLabel:"Eliminar",danger:true,onConfirm:()=>{deleteOrder(o.id);setConfirmModal(null);}})} />}
            {tab==="cocina"&&<TabCocina catalog={catalog} orders={orders} completed={completed} soundOn={soundOn} setSoundOn={setSoundOn} onMarkLine={setLinePrepared} onMarkAll={markOrderAllPrepared} onMarkLineCompleted={setLinePreparedCompleted} onTogglePreparing={togglePreparing} />}
            {tab==="dia"&&<TabDia catalog={catalog} completed={completed} dayTotal={dayTotal} openTotal={openTotal} openCount={orders.length} catBreakdown={catBreakdown} topItems={topItems} payBreakdown={payBreakdown} hourFlow={hourFlow}
              onEditCompleted={c=>setEditingCompletedId(c.id)} onTicket={c=>setTicketOrder(c)}
              onReopenCompleted={c=>setConfirmModal({title:"Regresar a cuentas abiertas",desc:`${c.name} volverá a Pedidos como cuenta abierta.`,confirmLabel:"Regresar a abiertas",onConfirm:()=>{reopenCompleted(c.id);setConfirmModal(null);}})}
              onCloseAll={()=>setConfirmModal({title:"Cerrar todas las cuentas",desc:`Se cerrarán ${orders.length} cuentas. Estas cuentas no llevarán propina.`,confirmLabel:"Confirmar",countdown:5,onConfirm:()=>{closeAllAccounts();setConfirmModal(null);}})}
              onDeleteCompleted={c=>setConfirmModal({title:"Eliminar orden",desc:`¿Eliminar la orden de ${c.name}?`,confirmLabel:"Eliminar",danger:true,countdown:3,onConfirm:()=>{deleteCompleted(c.id);setConfirmModal(null);}})}
              onReport={()=>setReportModal("day")}
              onTerminar={()=>setConfirmModal({title:"Terminar día",desc:"Esta acción es irreversible. Se reiniciará el día y los datos se archivarán.",confirmLabel:"Terminar día",danger:true,countdown:5,onConfirm:()=>{terminarDia();setConfirmModal(null);}})} />}
            {tab==="semana"&&<TabSemana catalog={catalog} weekDays={weekDays} weekTotal={weekTotal} weekCount={weekCount} curWeekStart={curWeekStart} onReport={()=>setReportModal("week")} onDayDetail={d=>setDayDetail(d)} />}
            {tab==="mes"&&<TabMes catalog={catalog} monthWeeks={monthWeeks} monthTotal={monthTotal} monthCount={monthCount} curMonth={curMonth} curYear={curYear} onReport={()=>setReportModal("month")} onWeekDetail={w=>setWeekDetail(w)} />}
