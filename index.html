    /* =========================================================
       TAB · ACTIVOS
       ========================================================= */
    function TabActivos({catalog, orders, profile, onNew, onTakeout, onOpen, onDelete, canDelete}){
      const byRecent=(a,b)=>(b.seq||b.createdAt)-(a.seq||a.createdAt);
      const isServicio=profile==="servicio";

      // For servicio: split orders into ready vs in-progress
      function isOrderReady(o){
        const foodLines=filterFoodLines(catalog,o);
        return foodLines.length>0 && foodLines.every(l=>linePreparedFull(l));
      }

      const allOrders=orders.sort(byRecent);

      // Servicio: bucket into ready / active / sin alimentos
      const readyOrders   = isServicio ? allOrders.filter(o=>isOrderReady(o)) : [];
      const activeOrders  = isServicio ? allOrders.filter(o=>!isOrderReady(o)) : allOrders;

      const activeMesas  = activeOrders.filter(o=>o.type==="mesa");
      const activeLlevar = activeOrders.filter(o=>o.type==="llevar");
      const readyMesas   = readyOrders.filter(o=>o.type==="mesa");
      const readyLlevar  = readyOrders.filter(o=>o.type==="llevar");

      return <div className="la-tabpad">
        {!isServicio&&<div className="la-actions-row">
          <button onClick={onNew} className="la-tap" style={{width:"100%",background:C.dark,color:"#fff",border:"none",padding:"16px",borderRadius:12,fontSize:16,fontWeight:"bold",cursor:"pointer",marginBottom:10}}>+ Abrir Nueva Cuenta</button>
          <button onClick={onTakeout} className="la-tap" style={{width:"100%",background:C.card,color:C.dark,border:`1.5px solid ${C.dark}`,padding:"14px",borderRadius:12,fontSize:15,fontWeight:"bold",cursor:"pointer",marginBottom:10}}>+ Pedido Para Llevar</button>
        </div>}
        {isServicio&&<div className="la-actions-row" style={{marginBottom:10,gap:8}}>
          <button onClick={onNew} className="la-tap" style={{width:"100%",background:C.dark,color:"#fff",border:"none",padding:"14px",borderRadius:12,fontSize:15,fontWeight:"bold",cursor:"pointer"}}>+ Abrir Nueva Cuenta</button>
          <button onClick={onTakeout} className="la-tap" style={{width:"100%",background:C.card,color:C.dark,border:`1.5px solid ${C.dark}`,padding:"13px",borderRadius:12,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>+ Para Llevar</button>
        </div>}
        <div style={{height:4}} />
        {orders.length===0&&<div className="la-empty" style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:18,fontWeight:600,marginBottom:6}}>No hay cuentas abiertas</div><div style={{fontSize:14}}>Toca los botones para empezar</div></div>}

        {/* SERVICIO: listos para llevar primero, destacados */}
        {isServicio&&(readyMesas.length>0||readyLlevar.length>0)&&<>
          <div style={{display:"flex",alignItems:"center",gap:8,margin:"6px 0 10px"}}>
            <div style={{flex:1,height:1,background:C.success,opacity:0.3}} />
            <div style={{fontSize:12,fontWeight:"bold",color:C.success,textTransform:"uppercase",letterSpacing:0.8,display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:C.success,display:"inline-block"}} />
              Listos para servir · {readyOrders.length}
            </div>
            <div style={{flex:1,height:1,background:C.success,opacity:0.3}} />
          </div>
          <div className="la-grid-cards">
            {readyMesas.map((o,i)=><OrderCard key={o.id} catalog={catalog} order={o} index={i} onOpen={()=>onOpen(o.id)} onDelete={()=>onDelete(o)} canDelete={canDelete} />)}
            {readyLlevar.map((o,i)=><OrderCard key={o.id} catalog={catalog} order={o} index={i} takeout onOpen={()=>onOpen(o.id)} onDelete={()=>onDelete(o)} canDelete={canDelete} />)}
          </div>
          {(activeMesas.length>0||activeLlevar.length>0)&&<div style={{display:"flex",alignItems:"center",gap:8,margin:"14px 0 10px"}}>
            <div style={{flex:1,height:1,background:"#e5ddd5"}} />
            <div style={{fontSize:12,fontWeight:"bold",color:C.muted,textTransform:"uppercase",letterSpacing:0.8}}>En proceso · {activeOrders.length}</div>
            <div style={{flex:1,height:1,background:"#e5ddd5"}} />
          </div>}
        </>}

        {/* Active orders */}
        {!isServicio&&activeMesas.length>0&&<><SectionLabel>Cuentas Abiertas</SectionLabel></>}
        {activeMesas.length>0&&<div className="la-grid-cards">{activeMesas.map((o,i)=><OrderCard key={o.id} catalog={catalog} order={o} index={i} onOpen={()=>onOpen(o.id)} onDelete={()=>onDelete(o)} canDelete={canDelete} />)}</div>}
        {!isServicio&&activeLlevar.length>0&&<><SectionLabel>Pedidos Para Llevar</SectionLabel></>}
        {activeLlevar.length>0&&<div className="la-grid-cards">{activeLlevar.map((o,i)=><OrderCard key={o.id} catalog={catalog} order={o} index={i} takeout onOpen={()=>onOpen(o.id)} onDelete={()=>onDelete(o)} canDelete={canDelete} />)}</div>}

        {/* Admin: show normal labels when no servicio split */}
        {!isServicio&&orders.length>0&&activeMesas.length===0&&activeLlevar.length===0&&null}
      </div>;
    }

    /* =========================================================
       TAB · COCINA (read-only, food only, mark prepared)
       ========================================================= */
    /* =========================================================
       COCINA CARD — wraps each kitchen order with long-press handling
       Long-press anywhere on the card (not on buttons) for 600ms to
       toggle "preparing" state. Shows a fill bar during the press.
       ========================================================= */
    const LONG_PRESS_MS = 600;
    function CocinaCard({order, cardBg, cardBorder, canTogglePreparing, onTogglePreparing, children}){
      const [pressProgress, setPressProgress] = useState(0); // 0..1
      const timerRef = useRef(null);
      const rafRef = useRef(null);
      const startRef = useRef(0);
      const firedRef = useRef(false);

      function clearPress(){
        if(timerRef.current){ clearTimeout(timerRef.current); timerRef.current=null; }
        if(rafRef.current){ cancelAnimationFrame(rafRef.current); rafRef.current=null; }
        setPressProgress(0);
      }

      function startPress(e){
        if(!canTogglePreparing) return;
        // Ignore presses originating on buttons/inputs (checkbox interactions)
        const t=e.target;
        if(t.closest("button,input,a,[role='button']")) return;
        firedRef.current=false;
        startRef.current=Date.now();
        // Animate the progress bar via RAF
        const tick=()=>{
          const elapsed=Date.now()-startRef.current;
          const pct=Math.min(1, elapsed/LONG_PRESS_MS);
          setPressProgress(pct);
          if(pct<1) rafRef.current=requestAnimationFrame(tick);
        };
        rafRef.current=requestAnimationFrame(tick);
        timerRef.current=setTimeout(()=>{
          firedRef.current=true;
          onTogglePreparing(order.id);
          clearPress();
          // Haptic on mobile
          try{ navigator.vibrate?.(30); }catch{}
        }, LONG_PRESS_MS);
      }

      function endPress(){ clearPress(); }

      useEffect(()=>()=>clearPress(), []);

      const progressOverlay = pressProgress>0 && <div style={{
        position:"absolute", left:0, top:0, bottom:0,
        width:`${pressProgress*100}%`,
        background:"rgba(229,184,58,0.18)",
        pointerEvents:"none",
        transition:"none",
        borderRadius:"12px 0 0 12px",
      }} />;

      return <div className="la-row" style={{position:"relative",background:cardBg,borderRadius:12,padding:"12px 14px",marginBottom:10,border:cardBorder,transition:"background 0.3s ease",overflow:"hidden",userSelect:pressProgress>0?"none":"auto",cursor:canTogglePreparing?"pointer":"default"}}
        onMouseDown={startPress} onMouseUp={endPress} onMouseLeave={endPress}
        onTouchStart={startPress} onTouchEnd={endPress} onTouchCancel={endPress}>
        {progressOverlay}
        <div style={{position:"relative"}}>{children}</div>
      </div>;
    }

    function TabCocina({catalog, orders, completed, soundOn, setSoundOn, onMarkLine, onMarkAll, onMarkLineCompleted, onTogglePreparing}){
      // Include recently-charged orders that still have unprepared food items
      // so kitchen sees them until everything is marked ready
      const chargedPending=(completed||[])
        .map(o=>({...o, lines: filterFoodLines(catalog,o), _charged:true}))
        .filter(o=>o.lines.length>0 && !o.lines.every(l=>linePreparedFull(l)));
      const allKitchen=[...orders
        .map(o=>({...o, lines: filterFoodLines(catalog,o)}))
        .filter(o=>o.lines.length>0),
        ...chargedPending]
        .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
      const pendingOrders=allKitchen.filter(o=>!o.lines.every(l=>linePreparedFull(l)));
      const doneOrders   =allKitchen.filter(o=>o.lines.every(l=>linePreparedFull(l)));
      function renderOrder(o){
        // Expand root lines with qty>1 into individual visual items for cocina
        // Each sub-item reads prepared state from the original line
        // and uses the original lid to toggle (for now: all sub-items share state)
        const lineLookup=Object.fromEntries(o.lines.map(l=>[l.lid,l]));
        const expandedLines=[];
        o.lines.forEach(l=>{
          if(!l.opts?.parentLid && l.qty>1){
            for(let i=0;i<l.qty;i++){
              expandedLines.push({...l, _subIdx:i, _subOf:l.lid, _label:`(${i+1}/${l.qty})`, qty:1, lid:l.lid+"__"+i});
            }
          } else {
            expandedLines.push(l);
          }
        });
        // groupLinesForDisplay with fake lids — children still link via parentLid to real lid
        // so we need a custom group here
        const rootExpanded=expandedLines.filter(l=>!l.opts?.parentLid);
        const childrenByReal={};
        o.lines.forEach(l=>{ if(l.opts?.parentLid){ if(!childrenByReal[l.opts.parentLid]) childrenByReal[l.opts.parentLid]=[]; childrenByReal[l.opts.parentLid].push(l); } });
        const grouped=rootExpanded.map(l=>({line:l, children: l._subIdx>0?[]:(childrenByReal[l._subOf||l.lid]||[])}));
        const allReady=o.lines.every(l=>l.prepared);
        const anyPrepared=o.lines.some(l=>linePreparedCount(l)>0);
        const minutesAgo=Math.floor((Date.now()-o.createdAt)/60000);
        // Visual states: ready (green) > preparing (yellow) > default
        const cardBg=allReady?"#f0faf4":(o.preparing?"#FFF6D6":C.card);
        const cardBorder=allReady?`1.5px solid rgba(46,139,87,0.4)`:(o.preparing?"1.5px solid #E5B83A":"1.5px solid #e5ddd5");
        // Long-press only allows toggling OFF if no items have been prepared yet
        const canTogglePreparing=!allReady && (!o.preparing || !anyPrepared);
        return <CocinaCard key={o.id} order={o} cardBg={cardBg} cardBorder={cardBorder} canTogglePreparing={canTogglePreparing} onTogglePreparing={onTogglePreparing}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>

                    {allReady&&<span style={{background:C.success,color:"#fff",fontSize:10.5,fontWeight:"bold",padding:"2px 7px",borderRadius:18}}>✓ Todo listo</span>}

              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {grouped.map(({line:l,children})=><div key={l.lid}>
                  <button onClick={()=>{ const realLid=l._subOf||l.lid; const realLine=o.lines.find(x=>x.lid===realLid); const curCount=realLine?linePreparedCount(realLine):0; const markDone=l._subOf?curCount<=l._subIdx:!linePreparedFull(realLine||l); (o._charged?onMarkLineCompleted:onMarkLine)(o.id,realLid,markDone,l._subIdx); }} className="la-tap" style={{width:"100%",display:"flex",alignItems:"flex-start",gap:10,background:(()=>{ if(l._subOf){ const rl=o.lines.find(x=>x.lid===l._subOf); return rl&&l._subIdx<linePreparedCount(rl)?"rgba(46,139,87,0.1)":C.bg; } return linePreparedFull(l)?"rgba(46,139,87,0.1)":C.bg; })(),border:(()=>{ if(l._subOf){ const rl=o.lines.find(x=>x.lid===l._subOf); return rl&&l._subIdx<linePreparedCount(rl)?`1.5px solid ${C.success}`:"1px solid #ece4dc"; } return linePreparedFull(l)?`1.5px solid ${C.success}`:"1px solid #ece4dc"; })(),borderRadius:9,padding:"9px 11px",cursor:"pointer",textAlign:"left"}}>
                    {(()=>{ const isDone=l._subOf?(()=>{ const rl=o.lines.find(x=>x.lid===l._subOf); return rl&&l._subIdx<linePreparedCount(rl); })():linePreparedFull(l); return <div style={{width:22,height:22,borderRadius:6,background:isDone?C.success:"transparent",border:isDone?"none":`1.5px solid ${C.muted}`,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:"bold",flexShrink:0,marginTop:1}}>{isDone?"✓":""}</div>; })()}
                    <div style={{flex:1}}>
                      {(()=>{ const isDone=l._subOf?(()=>{ const rl=o.lines.find(x=>x.lid===l._subOf); return rl&&l._subIdx<linePreparedCount(rl); })():linePreparedFull(l); return <div style={{fontSize:14,fontWeight:"bold",textDecoration:isDone?"line-through":"none",opacity:isDone?0.6:1}}>{lineDisplayNameWith(catalog,l)}{l._label&&<span style={{fontSize:11,fontWeight:"normal",opacity:0.6,marginLeft:4}}>{l._label}</span>}</div>; })()}
                      {l.note&&!l._subIdx&&<div style={{fontSize:11.5,color:C.danger,fontStyle:"italic",marginTop:2}}>📝 {l.note}</div>}
                    </div>
                  </button>
                  {children.map(ch=><div key={ch.lid} style={{width:"calc(100% - 22px)",marginLeft:22,marginTop:4,display:"flex",alignItems:"flex-start",gap:8,background:linePreparedFull(ch)?"rgba(46,139,87,0.08)":"#F9E2DF",borderLeft:`3px solid ${C.pink}`,borderRadius:7,padding:"7px 10px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12.5,fontWeight:"bold",textDecoration:linePreparedFull(ch)?"line-through":"none",opacity:linePreparedFull(ch)?0.65:1,color:linePreparedFull(ch)?C.success:C.dark}}>+ {ch.qty}× {lineDisplayNameWith(catalog,ch)}</div>
                      {ch.note&&<div style={{fontSize:11,color:C.danger,fontStyle:"italic",marginTop:2}}>📝 {ch.note}</div>}
                    </div>
                  </div>)}
                </div>)}
              </div>
            </CocinaCard>;
        }
      return <div className="la-tabpad">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:13,color:C.muted}}>Vista de cocina</div>

    /* =========================================================
       SHARED · HOUR BAR CHART (used in Día + reports)
       ========================================================= */
    function HourBarChart({buckets, accent=true}){
      // Only render the range with activity (6am–11pm if no data falls outside).
      const active=buckets.filter(b=>b.count>0);
      let from=8, to=18;
      if(active.length){
        from=Math.min(from,Math.min(...active.map(b=>b.h)));
        to=Math.max(to,Math.max(...active.map(b=>b.h)));
      }
      const range=buckets.filter(b=>b.h>=from&&b.h<=to);
      const maxC=Math.max(1, ...range.map(b=>b.count));
      const BAR_H=80;
      return <div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:BAR_H+10}}>
          {range.map(b=>{
            const pct=b.count===0?0:Math.max(4,Math.round((Math.sqrt(b.count)/Math.sqrt(maxC))*BAR_H));
            const isPeak=b.count===maxC&&b.count>0;
            return <div key={b.h} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center"}} title={`${fmtHour(b.h)} · ${b.count} cuenta(s) · ${fmt(b.total)}`}>
              {isPeak&&<div style={{fontSize:8,color:C.pink,fontWeight:"bold",marginBottom:2}}>{b.count}</div>}
              <div style={{width:"100%",height:pct,background:isPeak?(accent?C.pink:C.dark):(accent?"#e8b4bc":"#ece4dc"),borderRadius:"3px 3px 0 0",transition:"height 0.3s ease"}} />
            </div>;
          })}
        </div>
        <div style={{display:"flex",gap:3,marginTop:4}}>
          {range.map(b=><div key={b.h} style={{flex:1,fontSize:9,color:C.muted,textAlign:"center"}}>{b.h%3===0?fmtHour(b.h).replace(" ",""):"·"}</div>)}
        </div>
      </div>;
    }

          {peak.count>0&&<div style={{background:C.card,border:"1px solid #e5ddd5",borderRadius:12,padding:"14px 16px",marginTop:12,marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>

          <div style={{display:"flex",justifyContent:"center",marginTop:24}}><button onClick={onReport} className="la-tap" style={{background:C.pink,color:C.dark,border:"none",padding:"13px 32px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>📸 Generar Reporte Semanal</button></div>
