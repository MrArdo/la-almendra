        {(()=>{ const bottomTabs=visibleTabs.filter(t=>!["catalogo","ajustes"].includes(t.k)); return bottomTabs.length>1&&<div className="la-bottom-nav">
          {bottomTabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} className="la-tap" style={{border:"none",background:tab===t.k?C.pinkPill:"transparent",padding:"8px 16px",borderRadius:22,cursor:"pointer",color:tab===t.k?C.dark:C.muted,fontWeight:tab===t.k?"bold":"normal",fontSize:11,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:16}}>{t.icon}</span>{t.label}</button>)}
        </div>; })()}

        {newAccountModal&&<NewAccountModal onClose={()=>setNewAccountModal(false)} onSubmit={createAccount} />}
        {takeoutModal&&<TakeoutModal onClose={()=>setTakeoutModal(false)} onSubmit={createTakeout} />}
        {activeOrder&&<OrderModal catalog={catalog} order={activeOrder} otherOrders={orders.filter(o=>o.id!==activeOrder.id)}
          onClose={()=>setActiveOrderId(null)} onUpdate={fn=>updateOrder(activeOrder.id,fn)}
          onSaveExit={()=>setActiveOrderId(null)}
          onCloseNoCharge={()=>setConfirmModal({title:"Cerrar cuenta",desc:`¿Cerrar la cuenta de ${activeOrder.name} sin cobrar?`,confirmLabel:"Cerrar sin cobrar",danger:true,onConfirm:()=>{closeOrderNoCharge(activeOrder.id);setConfirmModal(null);}})}
          onCharge={()=>setChargeModal(activeOrder)}
          onTransfer={()=>setTransferModal({fromOrderId:activeOrder.id})}
        />}
        {confirmModal&&<ConfirmModal {...confirmModal} onCancel={()=>setConfirmModal(null)} />}
        {chargeModal&&<ChargeModal catalog={catalog} order={chargeModal} onCancel={()=>setChargeModal(null)} onConfirm={payment=>{chargeOrder(chargeModal.id,payment);setChargeModal(null);}} />}
        {editingCompletedId&&(()=>{ const ec=completed.find(c=>c.id===editingCompletedId); if(!ec) return null; return <EditCompletedModal catalog={catalog} order={ec} onClose={()=>setEditingCompletedId(null)} onUpdate={fn=>updateCompleted(ec.id,fn)} />; })()}
        {reportModal==="day"&&<DayReport catalog={catalog} completed={completed} hourFlow={hourFlow} onClose={()=>setReportModal(null)} />}
        {reportModal==="week"&&<WeekReport catalog={catalog} weekDays={weekDays} curWeekStart={curWeekStart} onClose={()=>setReportModal(null)} />}
        {reportModal==="month"&&<MonthReport catalog={catalog} monthWeeks={monthWeeks} curMonth={curMonth} curYear={curYear} onClose={()=>setReportModal(null)} />}
        {weekDetail&&<WeekDetailModal catalog={catalog} week={weekDetail} onClose={()=>setWeekDetail(null)} />}
        {dayDetail&&<DayDetailModal catalog={catalog} day={dayDetail} onClose={()=>setDayDetail(null)} />}
        {transferModal&&<TransferModal orders={orders} catalog={catalog} fromOrderId={transferModal.fromOrderId} onClose={()=>setTransferModal(null)} onConfirm={(toId,transfers)=>{ transferLines(transferModal.fromOrderId,toId,transfers); setTransferModal(null); }} />}
        {ticketOrder&&<TicketModal catalog={catalog} order={ticketOrder} onClose={()=>setTicketOrder(null)} />
        }{folioSearch&&<FolioSearchModal completed={completed} dayRecords={dayRecords} catalog={catalog} onClose={()=>setFolioSearch(false)} onOpenTicket={o=>{setFolioSearch(false);setTicketOrder(o);}} />}

        {toast&&<div key={toast.id} style={{position:"fixed",bottom:92,left:16,right:16,maxWidth:528,margin:"0 auto",background:C.dark,color:"#fff",borderRadius:12,zIndex:50,fontSize:14,boxShadow:"0 4px 16px rgba(0,0,0,0.25)",overflow:"hidden",animation:"laToastUp 0.3s ease"}}>
          {toast.undoFn&&<div style={{position:"absolute",top:0,left:0,bottom:0,background:"rgba(232,145,138,0.32)",animation:"laProgress 4s linear forwards"}} />}
          <div style={{position:"relative",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>{toast.msg}</span>
            {toast.undoFn&&<button onClick={doUndo} className="la-tap" style={{background:"rgba(255,255,255,0.12)",border:"none",color:C.pink,fontWeight:"bold",cursor:"pointer",fontSize:14,marginLeft:12,padding:"6px 14px",borderRadius:8}}>Deshacer</button>}
          </div>
        </div>}
        {eggActive&&<EasterEgg onDone={()=>setEggActive(false)} />}
      </div>;
    }

    /* =========================================================
       EASTER EGG (kept from prior build)
       ========================================================= */
    function EasterEgg({onDone}){
      useEffect(()=>{ const t=setTimeout(onDone,2800); return ()=>clearTimeout(t); },[onDone]);
      const emojis=useMemo(()=>{ const arr=[]; for(let i=0;i<36;i++) arr.push({id:i,left:Math.random()*100,delay:Math.random()*0.6,duration:3.6+Math.random()*1.8,size:34+Math.random()*48,drift:(Math.random()-0.5)*120,rot:(Math.random()-0.5)*80}); return arr; },[]);
      return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",overflow:"hidden",animation:"laEggFade 2.8s ease forwards"}}>
        {emojis.map(e=><span key={e.id} style={{position:"absolute",left:`${e.left}%`,bottom:-80,fontSize:e.size,animation:`laEggRise ${e.duration}s cubic-bezier(0.22,0.61,0.36,1) ${e.delay}s forwards`,"--drift":`${e.drift}px`,"--rot":`${e.rot}deg`}}>🖕</span>)}
      </div>;
    }

    /* =========================================================
       UI ATOMS
       ========================================================= */
    const plusBtnStyle={width:34,height:34,borderRadius:"50%",background:C.dark,color:"#fff",border:"none",fontSize:20,fontWeight:"bold",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1};
    function QtyControl({qty,onMinus,onPlus,disabled}){
      const btn={width:28,height:28,borderRadius:"50%",background:disabled?"#d8cfc6":C.dark,color:"#fff",border:"none",fontSize:16,fontWeight:"bold",cursor:disabled?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1};
      return <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <button onClick={disabled?undefined:onMinus} className="la-circle-btn" style={btn}>–</button>
        <span key={qty} style={{fontSize:15,fontWeight:"bold",minWidth:16,textAlign:"center",display:"inline-block",animation:"laBadgePop 0.22s ease"}}>{qty}</span>
        <button onClick={disabled?undefined:onPlus} className="la-circle-btn" style={btn}>+</button>
      </div>;
    }
    function SectionLabel({children}){ return <div style={{fontSize:12,fontWeight:"bold",color:C.muted,textTransform:"uppercase",letterSpacing:0.6,margin:"16px 0 8px"}}>{children}</div>; }
    function StatCard({label,value,pink,index=0,warn}){ const bg=warn?C.warn:pink?C.pinkPill:C.dark; const fg=warn?"#fff":pink?C.dark:"#fff"; return <div className="la-stat" style={{background:bg,borderRadius:12,padding:"14px 12px",flex:1,textAlign:"center",animationDelay:`${index*0.06}s`}}><div style={{fontSize:11,fontWeight:"bold",letterSpacing:0.4,textTransform:"uppercase",color:fg,opacity:0.8}}>{label}</div><div style={{fontSize:30,fontWeight:"bold",color:fg,marginTop:4}}>{value}</div></div>; }
    const sectionH={fontSize:17,fontWeight:"bold",color:C.dark,margin:"20px 0 10px"};
    function DataTable({headers,rows,aligns,small}){ return <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #e5ddd5"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:small?12:13}}><thead><tr style={{background:C.dark}}>{headers.map((h,i)=><th key={i} style={{color:"#fff",textAlign:aligns[i],padding:"8px 10px",fontSize:10.5,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5}}>{h}</th>)}</tr></thead><tbody>{rows.map((r,ri)=><tr key={ri} style={{background:"#fff",borderTop:"1px solid #f0e8e0"}}>{r.map((cell,ci)=><td key={ci} style={{textAlign:aligns[ci],padding:"8px 10px",color:C.dark,fontWeight:aligns[ci]==="right"?"bold":"normal"}}>{cell}</td>)}</tr>)}</tbody></table></div>; }

    function ModalShell({children,onClose,title}){ return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:40,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:16,width:"100%",maxWidth:380,maxHeight:"92vh",overflow:"auto",animation:"laPopIn 0.24s ease"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`,position:"sticky",top:0,background:C.bg,zIndex:1}}><span style={{fontSize:19,fontWeight:"bold"}}>{title}</span><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button></div>{children}</div></div>; }
    function fieldLabel(t){ return <div style={{fontSize:11,fontWeight:"bold",color:C.dark,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>{t}</div>; }
    const inputStyle={width:"100%",padding:"11px 12px",borderRadius:10,border:"1.5px solid #d8cfc6",fontSize:15,background:"#fff",color:C.dark,fontFamily:"Georgia,serif"};

    function NewAccountModal({onClose,onSubmit}){ const [name,setName]=useState(""); const [mesa,setMesa]=useState(""); return <ModalShell onClose={onClose} title="Abrir nueva cuenta"><div style={{padding:18}}>{fieldLabel("Nombre del cliente")}<input style={{...inputStyle,borderColor:C.pink,marginBottom:14}} value={name} onChange={e=>setName(e.target.value)} placeholder="Ej. María" autoFocus />{fieldLabel("Mesa")}<input style={{...inputStyle,marginBottom:18}} value={mesa} onChange={e=>setMesa(e.target.value)} placeholder="Ej. 3" /><button disabled={!name.trim()} onClick={()=>onSubmit(name.trim(),mesa.trim())} className="la-tap" style={{width:"100%",background:name.trim()?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:name.trim()?"pointer":"default"}}>Abrir Cuenta</button></div></ModalShell>; }

    function TakeoutModal({onClose,onSubmit}){ const [name,setName]=useState(""); const [pickup,setPickup]=useState(""); return <ModalShell onClose={onClose} title="Pedido para llevar"><div style={{padding:18}}>{fieldLabel("Nombre del cliente")}<input style={{...inputStyle,borderColor:C.pink,marginBottom:14}} value={name} onChange={e=>setName(e.target.value)} placeholder="Ej. Carlos" autoFocus />{fieldLabel("Hora de recogida")}<input type="time" style={{...inputStyle,marginBottom:18}} value={pickup} onChange={e=>setPickup(e.target.value)} /><button disabled={!name.trim()} onClick={()=>{ let p=""; if(pickup){ const [h,m]=pickup.split(":"); let hh=parseInt(h); const ap=hh>=12?"pm":"am"; hh=hh%12; if(!hh)hh=12; p=`${hh}:${m} ${ap}`; } onSubmit(name.trim(),p); }} className="la-tap" style={{width:"100%",background:name.trim()?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:name.trim()?"pointer":"default"}}>Abrir Pedido</button></div></ModalShell>; }

    function ConfirmModal({title,desc,confirmLabel,danger,countdown,onConfirm,onCancel}){
      const [count,setCount]=useState(countdown||0);
      useEffect(()=>{ if(!countdown||count<=0) return; const t=setTimeout(()=>setCount(c=>c-1),1000); return ()=>clearTimeout(t); },[count,countdown]);
      const blocked=countdown&&count>0;
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onCancel}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:340,padding:"20px 20px 18px",animation:"laPopIn 0.24s ease"}}>
          <div style={{fontSize:18,fontWeight:"bold",marginBottom:8,color:C.dark}}>{title}</div>
          <div style={{fontSize:14,color:"#555",lineHeight:1.5,marginBottom:18}}>{desc}</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={onCancel} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Cancelar</button>
            <button onClick={onConfirm} disabled={blocked} className="la-tap" style={{flex:1.3,background:blocked?"#d8cfc6":danger?C.danger:C.pink,color:danger||!blocked?"#fff":C.dark,border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:blocked?"default":"pointer"}}>{blocked?`${confirmLabel} (${count})`:confirmLabel}</button>
          </div>
        </div>
      </div>;
    }

    /* =========================================================
       MENU LINES (renders catalog categories in order)
       ========================================================= */
    function MenuLines({catalog,lines,onChangeQty,onPlus}){
      const categoriesOrdered=[...(catalog.categories||[])].sort((a,b)=>(a.order||0)-(b.order||0));
      return categoriesOrdered.map(group=>{
        const groupItems=(catalog.activeItems||[]).filter(it=>it.catId===group.id);
        if(groupItems.length===0) return null;
        return <div key={group.id} style={{marginBottom:8}}>
          <div style={{background:C.dark,color:"#fff",padding:"8px 12px",borderRadius:8,fontSize:13,fontWeight:"bold",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{group.name}</div>
          {groupItems.map(item=>{
            // Hide "extras" linked to a parent — they are added via the parent line, not from the menu directly.
            if(item.linkableTo) return null;
            const itemLines=lines.filter(l=>l.itemId===item.id && !l.opts?.parentLid);
            const hasOpts=(item.options&&item.options.length)||item.sizes;
            const simpleLine=!hasOpts?itemLines[0]:null;
            const priceLabel=item.sizes?`${fmt(item.sizes.chico)} / ${fmt(item.sizes.grande)}`:fmt(item.price||0);
            if(hasOpts&&itemLines.length>0){
              const tq=itemLines.reduce((s,l)=>s+l.qty,0);
              return <div key={item.id} style={{marginBottom:6}}>
                <div className="la-menu-row" style={{background:C.selBg,borderRadius:8,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{fontSize:14,fontWeight:"bold"}}>{item.name} <span className="la-badge" style={{background:C.dark,color:"#fff",fontSize:10,fontWeight:"bold",padding:"2px 6px",borderRadius:10}}>x{tq}</span></div>
                  <button onClick={()=>onPlus(item)} className="la-circle-btn" style={plusBtnStyle}>+</button>
                </div>
                {itemLines.map(l=><div key={l.lid} className="la-row" style={{background:"#F9E2DF",borderRadius:8,padding:"8px 10px 8px 18px",margin:"5px 0 0 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{fontSize:12.5,flex:1,paddingRight:8}}>
                    <div style={{fontWeight:"bold"}}>{lineDisplayNameWith(catalog,l)}</div>
                    <div style={{color:C.muted,fontSize:11}}>{fmt(linePriceWith(catalog,l))} c/u · {fmt(lineSubtotalWith(catalog,l))}</div>
                  </div>
                  <QtyControl qty={l.qty} onMinus={()=>onChangeQty(l.lid,-1)} onPlus={()=>onChangeQty(l.lid,1)} />
                </div>)}
              </div>;
            }
            if(simpleLine){
              return <div key={item.id} className="la-menu-row" style={{background:C.selBg,borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:"bold"}}>{item.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>{fmt(linePriceWith(catalog,simpleLine))} · subtotal {fmt(lineSubtotalWith(catalog,simpleLine))}</div>
                </div>
                <QtyControl qty={simpleLine.qty} onMinus={()=>onChangeQty(simpleLine.lid,-1)} onPlus={()=>onChangeQty(simpleLine.lid,1)} />
              </div>;
            }
            return <div key={item.id} className="la-menu-row" style={{background:C.card,borderRadius:8,padding:"10px 12px",marginBottom:6,border:"1px solid #ece4dc",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div><div style={{fontSize:14,fontWeight:"bold"}}>{item.name}</div><div style={{fontSize:11,color:C.muted}}>{priceLabel}</div></div>
              <button onClick={()=>onPlus(item)} className="la-circle-btn" style={plusBtnStyle}>+</button>
            </div>;
          })}
        </div>;
      });
    }

    /* =========================================================
       OPTIONS MODAL (with parent line picker for linked extras)
       ========================================================= */
    /* OptionsModal — includes note + linked extras inline.
       onAdd(opts, qty, note, extras)
         extras: [{item, opts, qty, note}] — linked extra lines to add as children */
    function OptionsModal({catalog, item, onClose, onAdd, parentChoices}){
      const [sel,setSel]=useState({});
      const [qty,setQty]=useState(1);
      const [size,setSize]=useState(item.sizes?"chico":null);
      const [parentLid,setParentLid]=useState(parentChoices&&parentChoices.length===1?parentChoices[0].lid:null);
      const [limitHit,setLimitHit]=useState(false);
      const [note,setNote]=useState("");

      // Inline extras state: [{extraItem, sel, qty, size, milk, note}]
      const availableExtras=useMemo(()=>(catalog.activeItems||[]).filter(ex=>ex.linkableTo===item.id),[catalog,item]);
      const [extraRows,setExtraRows]=useState([]);

      function addExtraRow(ex){
        setExtraRows(r=>[...r,{id:newId("er"),extraItem:ex,sel:{},qty:1,size:ex.sizes?"chico":null,milk:ex.milk?"entera":null,note:""}]);
      }
      function removeExtraRow(id){ setExtraRows(r=>r.filter(e=>e.id!==id)); }
      function updateExtraRow(id,patch){ setExtraRows(r=>r.map(e=>e.id===id?{...e,...patch}:e)); }
      function toggleExtraChoice(id,k,ch,type,max){
        setExtraRows(r=>r.map(e=>{
          if(e.id!==id) return e;
          const cur=e.sel[k]||[];
          if(type==="single") return {...e,sel:{...e.sel,[k]:ch}};
          if(cur.includes(ch)) return {...e,sel:{...e.sel,[k]:cur.filter(c=>c!==ch)}};
          if(max&&cur.length>=max) return e;
          return {...e,sel:{...e.sel,[k]:[...cur,ch]}};
        }));
      }

      const opts=item.options||[];
      function toggleChoice(k,ch,type,max){
        setSel(prev=>{
          if(type==="single") return {...prev,[k]:ch};
          const cur=prev[k]||[];
          if(cur.includes(ch)){setLimitHit(false);return {...prev,[k]:cur.filter(c=>c!==ch)};}
          if(max&&cur.length>=max){setLimitHit(true);return prev;}
          return {...prev,[k]:[...cur,ch]};
        });
      }

      const mainValid = opts.every(o=>{ if(!o.required) return true; const v=sel[o.key]; if(o.type==="single") return !!v; return v&&v.length>0; })
                        && (!parentChoices || parentLid);
      const extrasValid = extraRows.every(e=>{
        const exOpts=e.extraItem.options||[];
        return exOpts.every(o=>{ if(!o.required) return true; const v=e.sel[o.key]; if(o.type==="single") return !!v; return v&&v.length>0; });
      });
      const valid = mainValid && extrasValid;

      function submit(){
        const f={};
        if(size) f.size=size;
        opts.forEach(o=>{ if(sel[o.key]!==undefined){ if(o.type==="multi"){if(sel[o.key].length>0) f[o.key]=sel[o.key];}else f[o.key]=sel[o.key]; } });
        if(parentLid) f.parentLid=parentLid;
        const extras=extraRows.map(e=>{
          const ef={};
          if(e.size) ef.size=e.size;
          if(e.milk) ef.milk=e.milk;
          (e.extraItem.options||[]).forEach(o=>{ if(e.sel[o.key]!==undefined){ if(o.type==="multi"){if(e.sel[o.key].length>0) ef[o.key]=e.sel[o.key];}else ef[o.key]=e.sel[o.key]; } });
          return {item:e.extraItem, opts:ef, qty:e.qty, note:e.note};
        });
        onAdd(f, qty, note, extras);
      }

      const chip=active=>({padding:"8px 14px",borderRadius:20,fontSize:13,fontWeight:"bold",cursor:"pointer",border:active?`1.5px solid ${C.pink}`:"1.5px solid #d8cfc6",background:active?C.pink:"#fff",color:C.dark});
      const chipCls=active=>"la-chip"+(active?" la-chip-active":"");

      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onClose}>
        <div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:16,width:"100%",maxWidth:380,maxHeight:"92vh",overflowY:"auto",animation:"laPopIn 0.24s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`,position:"sticky",top:0,background:C.bg,zIndex:1}}>
            <span style={{fontSize:18,fontWeight:"bold"}}>{item.name}</span>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button>
          </div>
          <div style={{padding:18}}>

            {/* Parent picker (when adding an extra from a parent context) */}
            {parentChoices&&<div style={{marginBottom:16}}>
              <div style={{fontSize:13,marginBottom:8}}>¿A qué platillo va este extra?</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {parentChoices.map(pc=><button key={pc.lid} onClick={()=>setParentLid(pc.lid)} className={chipCls(parentLid===pc.lid)} style={chip(parentLid===pc.lid)}>{pc.label}</button>)}
              </div>
            </div>}

            {/* Size */}
            {item.sizes&&<div style={{marginBottom:16}}>
              <div style={{fontSize:13,marginBottom:8}}>Tamaño:</div>
              <div style={{display:"flex",gap:8}}>
                {["chico","grande"].map(s=><button key={s} onClick={()=>setSize(s)} className={chipCls(size===s)} style={chip(size===s)}>{s==="chico"?"Chico":"Grande"} · {fmt(item.sizes[s])}</button>)}
              </div>
            </div>}

            {/* Options */}
            {opts.map(o=>{ const v=sel[o.key]; return <div key={o.key} style={{marginBottom:16}}>
              <div style={{fontSize:13,marginBottom:8}}>{o.label}:</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {o.choices.map((ch,ci)=>{ const lbl=choiceLabel(ch); const px=choicePrice(ch); const active=o.type==="single"?v===lbl:(v||[]).includes(lbl); return <button key={ci} onClick={()=>toggleChoice(o.key,lbl,o.type,o.max)} className={chipCls(active)} style={chip(active)}>{lbl}{px>0&&<span style={{fontSize:11,opacity:0.85,marginLeft:3}}>+{fmt(px)}</span>}</button>; })}
              </div>
              {o.max&&limitHit&&<div style={{fontSize:11,color:C.danger,marginTop:6}}>Máximo {o.max} opciones</div>}
            </div>; })}

            {/* Quantity */}
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <span style={{fontSize:13}}>Cantidad:</span>
              <QtyControl qty={qty} onMinus={()=>setQty(q=>Math.max(1,q-1))} onPlus={()=>setQty(q=>q+1)} />
            </div>

            {/* Note for this item */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,marginBottom:6,color:C.dark}}>Nota para este platillo <span style={{color:C.muted,fontStyle:"italic"}}>(opcional)</span></div>
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Ej. Sin cebolla, término medio…" rows={2} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:"1px solid #d8cfc6",fontSize:13,background:"#fff",color:C.dark,fontFamily:"Georgia,serif",resize:"none"}} />
            </div>

            {/* Linked extras */}
            {availableExtras.length>0&&<div style={{borderTop:"1px solid #ece4dc",paddingTop:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:"bold",marginBottom:10}}>Extras disponibles</div>
              {extraRows.map(e=>{
                const exOpts=e.extraItem.options||[];
                return <div key={e.id} className="la-row" style={{background:"#F9E2DF",borderRadius:10,padding:"10px 12px",marginBottom:8,borderLeft:`3px solid ${C.pink}`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:13,fontWeight:"bold"}}>+ {e.extraItem.name}</span>
                    <button onClick={()=>removeExtraRow(e.id)} className="la-tap" style={{background:"transparent",border:"none",color:C.danger,fontSize:16,cursor:"pointer",padding:"2px 4px"}}>✕</button>
                  </div>
                  {e.extraItem.sizes&&<div style={{display:"flex",gap:6,marginBottom:8}}>
                    {["chico","grande"].map(s=><button key={s} onClick={()=>updateExtraRow(e.id,{size:s})} className={chipCls(e.size===s)} style={{...chip(e.size===s),fontSize:12,padding:"6px 10px"}}>{s==="chico"?"Chico":"Grande"} · {fmt(e.extraItem.sizes[s])}</button>)}
                  </div>}

                  {exOpts.map(o=>{ const v=e.sel[o.key]; return <div key={o.key} style={{marginBottom:8}}>
                    <div style={{fontSize:12,marginBottom:6}}>{o.label}:</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {o.choices.map((ch,ci)=>{ const lbl=choiceLabel(ch); const px=choicePrice(ch); const active=o.type==="single"?v===lbl:(v||[]).includes(lbl); return <button key={ci} onClick={()=>toggleExtraChoice(e.id,o.key,lbl,o.type,o.max)} className={chipCls(active)} style={{...chip(active),fontSize:12,padding:"6px 10px"}}>{lbl}{px>0&&<span style={{fontSize:10,opacity:0.85,marginLeft:3}}>+{fmt(px)}</span>}</button>; })}
                    </div>
                  </div>; })}
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                    <span style={{fontSize:12}}>Cantidad:</span>
                    <QtyControl qty={e.qty} onMinus={()=>updateExtraRow(e.id,{qty:Math.max(1,e.qty-1)})} onPlus={()=>updateExtraRow(e.id,{qty:e.qty+1})} />
                  </div>
                  <textarea value={e.note} onChange={ev=>updateExtraRow(e.id,{note:ev.target.value})} placeholder="Nota para este extra…" rows={1} style={{width:"100%",padding:"6px 9px",borderRadius:7,border:"1px solid #e5ddd5",fontSize:12,background:"#fff",color:C.dark,fontFamily:"Georgia,serif",resize:"none"}} />
                </div>;
              })}
              {availableExtras.map(ex=><button key={ex.id} onClick={()=>addExtraRow(ex)} className="la-tap" style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",background:"#fff",border:`1px dashed ${C.pink}`,borderRadius:9,padding:"9px 12px",cursor:"pointer",marginBottom:6,textAlign:"left"}}>
                <span style={{fontSize:13,fontWeight:"bold",color:C.dark}}>+ {ex.name}</span>
                <span style={{fontSize:12,color:C.muted}}>{ex.sizes?`${fmt(ex.sizes.chico)} / ${fmt(ex.sizes.grande)}`:fmt(ex.price||0)}</span>
              </button>)}
            </div>}

            <button disabled={!valid} onClick={submit} className="la-tap" style={{width:"100%",background:valid?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:valid?"pointer":"default"}}>Agregar al pedido</button>
          </div>
        </div>
      </div>;
    }

    /* =========================================================
       ORDER MODAL (with per-line notes, extras, transfer)
       ========================================================= */
    function OrderModal({catalog, order, otherOrders, onClose, onUpdate, onSaveExit, onCloseNoCharge, onCharge, onTransfer}){
      const [optionsItem,setOptionsItem]=useState(null);
      const [optionsParentChoices,setOptionsParentChoices]=useState(null);
      const [showExtraPickerFor,setShowExtraPickerFor]=useState(null); // parent lid

      const total=orderTotalWith(catalog,order);

      function addSimple(item, parentLid){
        onUpdate(o=>{
          const opts = parentLid?{parentLid}:{};
          // Same item, no opts and same parent → bump qty
          const idx=o.lines.findIndex(l=>l.itemId===item.id && Object.keys(l.opts||{}).length===Object.keys(opts).length && JSON.stringify(l.opts||{})===JSON.stringify(opts));
          if(idx>=0){ const lines=[...o.lines]; lines[idx]={...lines[idx],qty:lines[idx].qty+1}; return {...o,lines}; }
          return {...o,lines:[...o.lines,{lid:newId("l"),itemId:item.id,qty:1,opts,note:""}]};
        });
      }
      function addConfigured(item, opts, qty, note="", extras=[]){
        onUpdate(o=>{
          const key=JSON.stringify(opts);
          const idx=o.lines.findIndex(l=>l.itemId===item.id && JSON.stringify(l.opts||{})===key);
          let lines=[...o.lines];
          let parentLid;
          if(idx>=0){
            lines[idx]={...lines[idx], qty:lines[idx].qty+qty};
            parentLid=lines[idx].lid;
          } else {
            parentLid=newId("l");
            lines=[...lines, {lid:parentLid, itemId:item.id, qty, opts, note}];
          }
          // Add extras as child lines linked to the parent
          extras.forEach(ex=>{
            const childOpts={...ex.opts, parentLid};
            lines=[...lines, {lid:newId("l"), itemId:ex.item.id, qty:ex.qty, opts:childOpts, note:ex.note||""}];
          });
          return {...o, lines};
        });
      }
      function changeQty(lid,delta){
        onUpdate(o=>{
          const newLines=o.lines.map(l=>l.lid===lid?{...l,qty:l.qty+delta}:l).filter(l=>l.qty>0);
          // Drop children whose parent disappeared
          const surviving=new Set(newLines.map(l=>l.lid));
          const finalLines=newLines.filter(l=>!l.opts?.parentLid || surviving.has(l.opts.parentLid));
          return {...o, lines: finalLines};
        });
      }
      function setLineNote(lid,note){
        onUpdate(o=>({...o,lines:o.lines.map(l=>l.lid===lid?{...l,note}:l)}));
      }
      function handlePlus(item){
        const hasOpts=(item.options&&item.options.length)||item.sizes;
        if(hasOpts){ setOptionsParentChoices(null); setOptionsItem(item); } else { addSimple(item); }
      }

      // Find extras that can attach to a given parent item
      function extrasForItem(itemId){
        return catalog.items.filter(it=>it.linkableTo===itemId);
      }
      function startAddExtra(parentLid){
        const parentLine=order.lines.find(l=>l.lid===parentLid); if(!parentLine) return;
        const candidates=extrasForItem(parentLine.itemId);
        if(candidates.length===0) return;
        if(candidates.length===1){
          const extra=candidates[0];
          const hasOpts=(extra.options&&extra.options.length)||extra.sizes||extra.milk;
          if(hasOpts){ setOptionsParentChoices([{lid:parentLid,label:lineDisplayNameWith(catalog,parentLine)}]); setOptionsItem(extra); }
          else { addSimple(extra,parentLid); }
        } else {
          setShowExtraPickerFor({parentLid, candidates, parentLabel:lineDisplayNameWith(catalog,parentLine)});
        }
      }

      const grouped=groupLinesForDisplay(order.lines);
      const hasOtherOpen=otherOrders&&otherOrders.length>0;

      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:40,display:"flex",flexDirection:"column",animation:"laModalIn 0.2s ease"}}>
        <div style={{flex:1}} onClick={onClose} />
        <div style={{background:C.bg,borderRadius:"18px 18px 0 0",maxWidth:560,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",maxHeight:"94vh",animation:"laSheetUp 0.32s cubic-bezier(0.32,0.72,0,1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"16px 16px 12px",borderBottom:`1px solid ${C.pink}`}}>
            <div><div style={{fontSize:20,fontWeight:"bold"}}>{order.name}</div><div style={{fontSize:12,opacity:0.6,marginTop:2}}>{order.type==="llevar"?`🛍️ Para llevar${order.pickup?` · Recoge ${order.pickup}`:""}`:order.mesa?`Mesa ${order.mesa}`:"Sin mesa"}</div></div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:C.dark}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 14px 16px"}}>
            <MenuLines catalog={catalog} lines={order.lines} onChangeQty={changeQty} onPlus={handlePlus} />
            {order.lines.length>0&&<div className="la-row" style={{border:`1.5px solid ${C.dark}`,borderRadius:12,padding:"12px 14px",marginTop:14,background:C.card}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:15,fontWeight:"bold"}}>Resumen del pedido</div>
                {hasOtherOpen&&<button onClick={()=>onTransfer()} className="la-tap" style={{background:"transparent",border:`1.5px solid ${C.dark}`,borderRadius:8,padding:"5px 11px",fontSize:11.5,fontWeight:"bold",color:C.dark,cursor:"pointer"}}>↔ Transferir</button>}
              </div>
              {grouped.map(({line:l, children},i)=><div key={l.lid} className="la-row" style={{padding:"7px 0",borderBottom:"1px solid #f0e8e0",animationDelay:`${i*0.04}s`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>

                  <div style={{flex:1,paddingRight:8}}>
                    <div style={{fontSize:13,fontWeight:"bold"}}>{lineDisplayNameWith(catalog,l)}</div>
                    <div style={{fontSize:11,color:C.muted}}>{fmt(linePriceWith(catalog,l))} c/u · {fmt(lineSubtotalWith(catalog,l))}</div>
                  </div>
                  <QtyControl qty={l.qty} onMinus={()=>changeQty(l.lid,-1)} onPlus={()=>changeQty(l.lid,1)} />
                </div>
                <input value={l.note||""} onChange={e=>setLineNote(l.lid,e.target.value)} placeholder="Nota para este platillo (opcional)…" style={{width:"100%",padding:"6px 9px",borderRadius:7,border:"1px solid #ece4dc",fontSize:12,background:C.bg,color:C.dark,marginTop:6,fontFamily:"Georgia,serif"}} />
                {/* Children (linked extras) */}
                {children.map(ch=><div key={ch.lid} className="la-row" style={{marginTop:6,marginLeft:22,padding:"6px 9px",background:"#F9E2DF",borderRadius:7,borderLeft:`3px solid ${C.pink}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>

                    <div style={{flex:1,paddingRight:8}}>
                      <div style={{fontSize:12,fontWeight:"bold"}}>+ {lineDisplayNameWith(catalog,ch)}</div>
                      <div style={{fontSize:10.5,color:C.muted}}>{fmt(linePriceWith(catalog,ch))} c/u · {fmt(lineSubtotalWith(catalog,ch))}</div>
                    </div>
                    <QtyControl qty={ch.qty} onMinus={()=>changeQty(ch.lid,-1)} onPlus={()=>changeQty(ch.lid,1)} />
                  </div>
                  <input value={ch.note||""} onChange={e=>setLineNote(ch.lid,e.target.value)} placeholder="Nota…" style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #ece4dc",fontSize:11.5,background:"#fff",color:C.dark,marginTop:5,fontFamily:"Georgia,serif"}} />
                </div>)}
                {/* "Add extra" button for parents that have linkable extras */}
                {extrasForItem(l.itemId).length>0 && <button onClick={()=>startAddExtra(l.lid)} className="la-tap" style={{marginTop:6,marginLeft:22,background:"transparent",border:`1px dashed ${C.pink}`,color:C.dark,borderRadius:7,padding:"5px 10px",fontSize:11.5,fontWeight:"bold",cursor:"pointer"}}>+ Agregar extra para este platillo</button>}
              </div>)}

            </div>}
          </div>
          <div style={{borderTop:"1px solid #e5ddd5",background:C.bg,padding:"12px 14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}><span style={{fontSize:14,opacity:0.6}}>Total</span><span style={{fontSize:26,fontWeight:"bold"}}>{fmt(total)}</span></div>
            <button onClick={onSaveExit} className="la-tap" style={{width:"100%",background:C.card,color:C.dark,border:`1.5px solid ${C.dark}`,padding:"11px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer",marginBottom:8}}>Guardar y Salir</button>
            <div style={{display:"flex",gap:8}}>
              <button onClick={onCloseNoCharge} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Cerrar</button>
              <button onClick={onCharge} disabled={order.lines.length===0} className="la-tap" style={{flex:1.4,background:order.lines.length?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:order.lines.length?"pointer":"default"}}>Cobrar y Cerrar</button>
            </div>
          </div>
        </div>
        {optionsItem&&<OptionsModal catalog={catalog} item={optionsItem} parentChoices={optionsParentChoices} onClose={()=>{setOptionsItem(null);setOptionsParentChoices(null);}} onAdd={(opts,qty,note,extras)=>{addConfigured(optionsItem,opts,qty,note,extras);setOptionsItem(null);setOptionsParentChoices(null);}} />}
        {showExtraPickerFor&&<ModalShell title="Elige el extra" onClose={()=>setShowExtraPickerFor(null)}><div style={{padding:18}}>
          <div style={{fontSize:13,color:C.muted,marginBottom:10}}>Para: {showExtraPickerFor.parentLabel}</div>
          {showExtraPickerFor.candidates.map(ex=><button key={ex.id} className="la-tap" onClick={()=>{
            const hasOpts=(ex.options&&ex.options.length)||ex.sizes||ex.milk;
            if(hasOpts){ setOptionsParentChoices([{lid:showExtraPickerFor.parentLid,label:showExtraPickerFor.parentLabel}]); setOptionsItem(ex); }
            else { addSimple(ex,showExtraPickerFor.parentLid); }
            setShowExtraPickerFor(null);
          }} style={{display:"block",width:"100%",background:C.card,border:"1px solid #d8cfc6",borderRadius:10,padding:"11px 13px",marginBottom:8,cursor:"pointer",textAlign:"left"}}>
            <div style={{fontWeight:"bold",fontSize:14}}>{ex.name}</div>
            <div style={{fontSize:12,color:C.muted}}>{fmt(ex.price||0)}</div>
          </button>)}
        </div></ModalShell>}
      </div>;
    }

    /* =========================================================
       CHARGE MODAL — adds 'transferencia' as a method
       ========================================================= */
    function ChargeModal({catalog, order, onCancel, onConfirm}){
      const total=orderTotalWith(catalog,order);
      const [method,setMethod]=useState(null);
      const [tipChoice,setTipChoice]=useState(null);
      const [otherMode,setOtherMode]=useState("percent");
      const [otherValue,setOtherValue]=useState("");
      let tipMode="none",tipValue=0;
      if(tipChoice===0){tipMode="none";tipValue=0;}
      else if(typeof tipChoice==="number"){tipMode="percent";tipValue=tipChoice;}
      else if(tipChoice==="otro"){tipMode=otherMode;tipValue=Number(otherValue)||0;}
      const tipAmount=resolveTip(total,{tipMode,tipValue});
      const grandTotal=total+tipAmount;
      const canConfirm=!!method&&tipChoice!==null&&!(tipChoice==="otro"&&!otherValue);
      const chip=active=>({padding:"9px 0",borderRadius:10,fontSize:13,fontWeight:"bold",cursor:"pointer",border:active?`1.5px solid ${C.pink}`:"1.5px solid #d8cfc6",background:active?C.pink:"#fff",color:C.dark,flex:1});
      const chipCls=active=>"la-chip"+(active?" la-chip-active":"");
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"laModalIn 0.2s ease"}} onClick={onCancel}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:380,overflow:"hidden",animation:"laPopIn 0.24s ease",maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`}}><span style={{fontSize:18,fontWeight:"bold"}}>Cobrar y cerrar</span><button onClick={onCancel} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button></div>
          <div style={{padding:18,overflowY:"auto"}}>
            <div style={{fontSize:13,color:"#555",marginBottom:16}}>{order.name}{order.mesa?` · Mesa ${order.mesa}`:order.type==="llevar"?" · Para llevar":""}</div>
            <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Método de pago</div>
            <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
              <button className={chipCls(method==="efectivo")} style={{...chip(method==="efectivo"),flex:"1 1 30%",minWidth:90}} onClick={()=>setMethod("efectivo")}>💵 Efectivo</button>
              <button className={chipCls(method==="tarjeta")} style={{...chip(method==="tarjeta"),flex:"1 1 30%",minWidth:90}} onClick={()=>setMethod("tarjeta")}>💳 Tarjeta</button>
              <button className={chipCls(method==="transferencia")} style={{...chip(method==="transferencia"),flex:"1 1 30%",minWidth:90}} onClick={()=>setMethod("transferencia")}>🏦 Transfer.</button>
            </div>
            <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Propina</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>{[0,5,10,15,20].map(p=><button key={p} className={chipCls(tipChoice===p)} style={chip(tipChoice===p)} onClick={()=>setTipChoice(p)}>{p===0?"Sin":`${p}%`}</button>)}</div>
            <button className={chipCls(tipChoice==="otro")} style={{...chip(tipChoice==="otro"),width:"100%",flex:"none",marginBottom:8}} onClick={()=>setTipChoice("otro")}>Otro</button>
            {tipChoice==="otro"&&<div className="la-row" style={{background:C.bg,borderRadius:10,padding:"12px",marginBottom:8}}><div style={{display:"flex",gap:8,marginBottom:10}}><button className={chipCls(otherMode==="percent")} style={chip(otherMode==="percent")} onClick={()=>setOtherMode("percent")}>Porcentaje %</button><button className={chipCls(otherMode==="fixed")} style={chip(otherMode==="fixed")} onClick={()=>setOtherMode("fixed")}>Monto fijo $</button></div><input type="number" inputMode="decimal" autoFocus value={otherValue} onChange={e=>setOtherValue(e.target.value)} placeholder={otherMode==="percent"?"Ej. 12 (%)":"Ej. 30 ($)"} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #d8cfc6",fontSize:15,fontFamily:"Georgia,serif",color:C.dark}} /></div>}
            <div style={{background:C.dark,borderRadius:12,padding:"14px 16px",marginTop:14,color:"#fff"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{opacity:0.8}}>Total cuenta</span><span style={{fontWeight:"bold"}}>{fmt(total)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}><span style={{opacity:0.8}}>Propina</span><span style={{fontWeight:"bold",color:C.pink}}>{fmt(tipAmount)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",borderTop:"1px solid rgba(255,255,255,0.2)",paddingTop:8}}><span style={{fontSize:13,opacity:0.9}}>A cobrar</span><span style={{fontSize:24,fontWeight:"bold"}}>{fmt(grandTotal)}</span></div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,padding:"12px 18px 18px",borderTop:"1px solid #f0e8e0"}}>
            <button onClick={onCancel} className="la-tap" style={{flex:1,background:"transparent",color:C.dark,border:"1.5px solid #d8cfc6",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Cancelar</button>
            <button disabled={!canConfirm} className="la-tap" onClick={()=>onConfirm({method,tipMode,tipValue,tipAmount})} style={{flex:1.4,background:canConfirm?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"12px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:canConfirm?"pointer":"default"}}>Cobrar {fmt(grandTotal)}</button>
          </div>
        </div>
      </div>;
    }

    /* =========================================================
       EDIT COMPLETED MODAL — same UX, line-notes aware, 3 methods
       ========================================================= */
    function EditCompletedModal({catalog, order, onClose, onUpdate}){
      const [optionsItem,setOptionsItem]=useState(null);
      const total=orderTotalWith(catalog,order);
      const payment=order.payment||{method:"efectivo",tipMode:"none",tipValue:0};
      function addSimple(item){
        onUpdate(o=>{
          const idx=o.lines.findIndex(l=>l.itemId===item.id&&Object.keys(l.opts||{}).length===0);
          if(idx>=0){const lines=[...o.lines];lines[idx]={...lines[idx],qty:lines[idx].qty+1};return {...o,lines};}
          return {...o,lines:[...o.lines,{lid:newId("l"),itemId:item.id,qty:1,opts:{},note:""}]};
        });
      }
      function addConfigured(item, opts, qty, note="", extras=[]){
        onUpdate(o=>{
          const key=JSON.stringify(opts);
          const idx=o.lines.findIndex(l=>l.itemId===item.id&&JSON.stringify(l.opts||{})===key);
          let lines=[...o.lines];
          let parentLid;
          if(idx>=0){ lines[idx]={...lines[idx],qty:lines[idx].qty+qty}; parentLid=lines[idx].lid; }
          else { parentLid=newId("l"); lines=[...lines,{lid:parentLid,itemId:item.id,qty,opts,note}]; }
          extras.forEach(ex=>{ const childOpts={...ex.opts,parentLid}; lines=[...lines,{lid:newId("l"),itemId:ex.item.id,qty:ex.qty,opts:childOpts,note:ex.note||""}]; });
          return {...o,lines};
        });
      }
      function changeQty(lid,delta){ onUpdate(o=>({...o,lines:o.lines.map(l=>l.lid===lid?{...l,qty:l.qty+delta}:l).filter(l=>l.qty>0)})); }
      function setLineNote(lid,note){ onUpdate(o=>({...o,lines:o.lines.map(l=>l.lid===lid?{...l,note}:l)})); }
      function handlePlus(item){ const hasOpts=(item.options&&item.options.length)||item.sizes; if(hasOpts) setOptionsItem(item); else addSimple(item); }
      function setMethod(method){ onUpdate(o=>({...o,payment:{...(o.payment||{}),method}})); }
      function setTip(tipMode,tipValue){ onUpdate(o=>{ const t=orderTotalWith(catalog,o); const tipAmount=resolveTip(t,{tipMode,tipValue}); return {...o,payment:{...(o.payment||{}),tipMode,tipValue,tipAmount}}; }); }
      const tipAmount=resolveTip(total,payment);
      const [otherMode,setOtherMode]=useState(payment.tipMode==="fixed"?"fixed":"percent");
      const [otherValue,setOtherValue]=useState("");
      const stdTips=[0,5,10,15,20];
      const isStdTip=payment.tipMode==="none"?0:(payment.tipMode==="percent"&&stdTips.includes(Number(payment.tipValue))?Number(payment.tipValue):"otro");
      const chip=active=>({padding:"8px 0",borderRadius:9,fontSize:13,fontWeight:"bold",cursor:"pointer",border:active?`1.5px solid ${C.pink}`:"1.5px solid #d8cfc6",background:active?C.pink:"#fff",color:C.dark,flex:1});
      const chipCls=active=>"la-chip"+(active?" la-chip-active":"");
      const grouped=groupLinesForDisplay(order.lines);

              {grouped.map(({line:l,children},i)=><div key={l.lid} className="la-row" style={{padding:"7px 0",borderBottom:"1px solid #f0e8e0",animationDelay:`${i*0.04}s`}}>

                  <QtyControl qty={l.qty} onMinus={()=>changeQty(l.lid,-1)} onPlus={()=>changeQty(l.lid,1)} />
                </div>
                <input value={l.note||""} onChange={e=>setLineNote(l.lid,e.target.value)} placeholder="Nota para este platillo…" style={{width:"100%",padding:"6px 9px",borderRadius:7,border:"1px solid #ece4dc",fontSize:12,background:C.bg,color:C.dark,marginTop:6,fontFamily:"Georgia,serif"}} />
                {children.map(ch=><div key={ch.lid} className="la-row" style={{marginTop:6,marginLeft:18,padding:"6px 9px",background:"#F9E2DF",borderRadius:7,borderLeft:`3px solid ${C.pink}`}}>
                  <div style={{display:"flex",alignItems:"center"}}><div style={{flex:1}}><div style={{fontSize:12,fontWeight:"bold"}}>+ {lineDisplayNameWith(catalog,ch)}</div><div style={{fontSize:10.5,color:C.muted}}>{fmt(linePriceWith(catalog,ch))} c/u · {fmt(lineSubtotalWith(catalog,ch))}</div></div><QtyControl qty={ch.qty} onMinus={()=>changeQty(ch.lid,-1)} onPlus={()=>changeQty(ch.lid,1)} /></div>
                  <input value={ch.note||""} onChange={e=>setLineNote(ch.lid,e.target.value)} placeholder="Nota…" style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #ece4dc",fontSize:11.5,background:"#fff",color:C.dark,marginTop:5,fontFamily:"Georgia,serif"}} />
                </div>)}
              </div>)}

            <div style={{border:`1.5px solid ${C.dark}`,borderRadius:12,padding:"12px 14px",marginTop:12,background:C.card}}>

              <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>

                <button className={chipCls(payment.method==="transferencia")} style={{...chip(payment.method==="transferencia"),flex:"1 1 30%",minWidth:90}} onClick={()=>setMethod("transferencia")}>🏦 Transfer.</button>

              <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,opacity:0.7}}>Propina</div>
              <div style={{display:"flex",gap:6,marginBottom:8}}>{stdTips.map(p=><button key={p} className={chipCls(isStdTip===p)} style={chip(isStdTip===p)} onClick={()=>p===0?setTip("none",0):setTip("percent",p)}>{p===0?"Sin":`${p}%`}</button>)}</div>
              <button className={chipCls(isStdTip==="otro")} style={{...chip(isStdTip==="otro"),width:"100%",flex:"none",marginBottom:8}} onClick={()=>setTip(otherMode,Number(otherValue)||0)}>Otro</button>
              {isStdTip==="otro"&&<div className="la-row" style={{background:C.bg,borderRadius:10,padding:"12px",marginBottom:8}}><div style={{display:"flex",gap:8,marginBottom:10}}><button className={chipCls(otherMode==="percent")} style={chip(otherMode==="percent")} onClick={()=>{setOtherMode("percent");setTip("percent",Number(otherValue)||0);}}>Porcentaje %</button><button className={chipCls(otherMode==="fixed")} style={chip(otherMode==="fixed")} onClick={()=>{setOtherMode("fixed");setTip("fixed",Number(otherValue)||0);}}>Monto fijo $</button></div><input type="number" inputMode="decimal" value={otherValue} onChange={e=>{setOtherValue(e.target.value);setTip(otherMode,Number(e.target.value)||0);}} placeholder={otherMode==="percent"?"Ej. 12 (%)":"Ej. 30 ($)"} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #d8cfc6",fontSize:15,fontFamily:"Georgia,serif",color:C.dark}} /></div>}
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,paddingTop:8,borderTop:"1px solid #f0e8e0",marginTop:4}}><span style={{opacity:0.7}}>Propina actual</span><span style={{fontWeight:"bold",color:C.pink}}>{fmt(tipAmount)}</span></div>
            </div>
          </div>
          <div style={{borderTop:"1px solid #e5ddd5",background:C.bg,padding:"12px 14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}><span style={{fontSize:14,opacity:0.6}}>Total cuenta</span><span style={{fontSize:26,fontWeight:"bold"}}>{fmt(total)}</span></div>

            <button onClick={onClose} className="la-tap" style={{width:"100%",background:C.pink,color:C.dark,border:"none",padding:"13px",borderRadius:10,fontSize:15,fontWeight:"bold",cursor:"pointer"}}>Guardar cambios</button>
          </div>
        </div>
        {optionsItem&&<OptionsModal catalog={catalog} item={optionsItem} onClose={()=>setOptionsItem(null)} onAdd={(opts,qty,note,extras)=>{addConfigured(optionsItem,opts,qty,note,extras);setOptionsItem(null);}} />}
      </div>;
    }

    /* =========================================================
       TRANSFER MODAL — step 1: pick items + qty, step 2: pick account
       ========================================================= */
    function TransferModal({orders, fromOrderId, catalog, onClose, onConfirm}){
      const fromOrder=orders.find(o=>o.id===fromOrderId);
      const candidates=orders.filter(o=>o.id!==fromOrderId);
      const grouped=useMemo(()=>groupLinesForDisplay(fromOrder?.lines||[]),[fromOrder]);

      // transfers: {[lid]: qty} — 0 means not selected
      const [transfers,setTransfers]=useState({});
      const [destId,setDestId]=useState(null);

      function setQty(lid,delta,maxQty){
        setTransfers(p=>{ const cur=p[lid]||0; const next=Math.max(0,Math.min(maxQty,cur+delta)); return {...p,[lid]:next}; });
      }
      function toggleLine(lid,maxQty){
        setTransfers(p=>{ const cur=p[lid]||0; return {...p,[lid]:cur>0?0:maxQty}; });
      }

      const selected=Object.entries(transfers).filter(([,q])=>q>0);
      const canConfirm=selected.length>0&&destId;

      function doConfirm(){
        const transferArr=selected.map(([lid,qty])=>({lid,qty}));
        onConfirm(destId, transferArr);
      }

      if(!fromOrder) return null;

      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:70,display:"flex",flexDirection:"column",animation:"laModalIn 0.2s ease"}} onClick={onClose}>
        <div style={{flex:1}} onClick={onClose} />
        <div onClick={e=>e.stopPropagation()} style={{background:C.bg,borderRadius:"18px 18px 0 0",maxWidth:560,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",maxHeight:"90vh",animation:"laSheetUp 0.3s cubic-bezier(0.32,0.72,0,1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`,position:"sticky",top:0,background:C.bg}}>
            <div style={{fontSize:18,fontWeight:"bold"}}>Transferir items</div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>

            {/* STEP 1 — select items + qty */}
            <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.8,color:C.muted,marginBottom:10}}>1 · Elige qué transferir</div>
            {grouped.map(({line:l,children})=>{
              const sel=transfers[l.lid]||0;
              const isSel=sel>0;
              return <div key={l.lid} style={{marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:10,background:isSel?C.selBg:C.card,border:isSel?`1.5px solid ${C.pink}`:"1.5px solid #e5ddd5",borderRadius:10,padding:"10px 12px",transition:"all 0.15s"}}>
                  <button onClick={()=>toggleLine(l.lid,l.qty)} className="la-tap" style={{width:22,height:22,borderRadius:6,background:isSel?C.pink:"transparent",border:isSel?"none":`1.5px solid #d8cfc6`,flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {isSel&&<span style={{color:"#fff",fontSize:13,fontWeight:"bold"}}>✓</span>}
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13.5,fontWeight:"bold"}}>{lineDisplayNameWith(catalog,l)}</div>
                    <div style={{fontSize:11,color:C.muted}}>{fmt(linePriceWith(catalog,l))} c/u</div>
                  </div>
                  {l.qty>1&&<div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    <button onClick={()=>setQty(l.lid,-1,l.qty)} className="la-circle-btn" style={{width:24,height:24,borderRadius:"50%",background:C.dark,color:"#fff",border:"none",fontSize:14,fontWeight:"bold",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>–</button>
                    <span style={{fontSize:13,fontWeight:"bold",minWidth:28,textAlign:"center"}}>{sel}/{l.qty}</span>
                    <button onClick={()=>setQty(l.lid,1,l.qty)} className="la-circle-btn" style={{width:24,height:24,borderRadius:"50%",background:C.dark,color:"#fff",border:"none",fontSize:14,fontWeight:"bold",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>}
                </div>
                {children.map(ch=><div key={ch.lid} style={{marginLeft:22,marginTop:4,padding:"8px 12px",background:isSel?"#F9E2DF":"#fafafa",borderLeft:`3px solid ${C.pink}`,borderRadius:"0 8px 8px 0",fontSize:12.5,color:C.muted}}>
                  + {lineDisplayNameWith(catalog,ch)} · {fmt(linePriceWith(catalog,ch))}
                </div>)}
              </div>;
            })}

            {/* STEP 2 — select destination */}
            {candidates.length>0&&<div style={{marginTop:18}}>
              <div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.8,color:C.muted,marginBottom:10}}>2 · ¿A qué cuenta?</div>
              {candidates.map(o=><button key={o.id} onClick={()=>setDestId(o.id)} className="la-tap" style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:destId===o.id?C.selBg:C.card,border:destId===o.id?`1.5px solid ${C.pink}`:"1.5px solid #e5ddd5",borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                <div style={{width:18,height:18,borderRadius:"50%",border:destId===o.id?`5px solid ${C.pink}`:"2px solid #d8cfc6",flexShrink:0,transition:"all 0.15s"}} />
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:"bold"}}>{o.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>{o.type==="llevar"?"🛍️ Para llevar":o.mesa?`Mesa ${o.mesa}`:"Sin mesa"} · {fmt(orderTotalWith(catalog,o))}</div>
                </div>
              </button>)}
            </div>}
            {candidates.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:13}}>No hay otras cuentas abiertas.</div>}
          </div>

          {/* CTA */}
          <div style={{padding:"12px 16px 20px",borderTop:"1px solid #e5ddd5",background:C.bg}}>
            <button onClick={doConfirm} disabled={!canConfirm} className="la-tap" style={{width:"100%",background:canConfirm?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"14px",borderRadius:11,fontSize:15,fontWeight:"bold",cursor:canConfirm?"pointer":"default"}}>
              {canConfirm?`Transferir ${selected.reduce((s,[,q])=>s+q,0)} item(s) a ${candidates.find(o=>o.id===destId)?.name}`:"Selecciona items y cuenta destino"}
            </button>
          </div>
        </div>
      </div>;
    }

    /* =========================================================
       FOLIO SEARCH MODAL
       ========================================================= */
    function FolioSearchModal({completed, dayRecords, catalog, onClose, onOpenTicket}){
      const [query,setQuery]=useState("");
      const [openDays,setOpenDays]=useState({}); // {dayKey: bool}

      // Build day buckets: today's session + persisted past days (max 7 days)
      const dayBuckets=useMemo(()=>{
        const buckets={}; // {dk: {label, date, tickets:[{...record, order?}]}}
        const sevenDaysAgo=Date.now()-7*24*60*60*1000;
        // Today's completed orders (in-session)
        const todayDk=dayKey(Date.now());
        completed.forEach(o=>{
          if((o.completedAt||0)<sevenDaysAgo) return;
          const dk=dayKey(o.completedAt||Date.now());
          if(!buckets[dk]) buckets[dk]={label:dk===todayDk?"Hoy":fmtShortDate(o.completedAt),date:o.completedAt||Date.now(),tickets:[]};
          buckets[dk].tickets.push({folio:o.folio||"S/F",orderId:o.id,name:o.name,mesa:o.mesa,type:o.type,completedAt:o.completedAt,order:o});
        });
        // Past days from dayRecords (synced via Firebase across all devices)
        (dayRecords||[]).forEach(record=>{
          if((record.date||0)<sevenDaysAgo) return;
          const dk=dayKey(record.date);
          if(buckets[dk]) return; // today (active session) already covered
          const tickets=(record.orders||[]).map(o=>({
            folio:o.folio||"S/F",
            orderId:o.id,
            name:o.name,
            mesa:o.mesa,
            type:o.type,
            completedAt:o.completedAt||record.date,
            order:o
          }));
          if(tickets.length) buckets[dk]={label:fmtShortDate(record.date),date:record.date,tickets};
        });
        // Legacy: also pull from old localStorage ticket store (for tickets created before Firebase migration)
        const pastDays=loadAllTicketDays();
        pastDays.forEach(day=>{
          if((day.date||0)<sevenDaysAgo) return;
          const dk=dayKey(day.date);
          if(buckets[dk]) return; // already covered by session or dayRecords
          buckets[dk]={label:fmtShortDate(day.date),date:day.date,tickets:day.tickets.map(t=>({...t,order:null}))};
        });
        return Object.values(buckets).sort((a,b)=>b.date-a.date);
      },[completed,dayRecords]);

      // Filter by query
      const q=query.trim().toUpperCase();
      const filtered=dayBuckets.map(day=>({
        ...day,
        tickets: q ? day.tickets.filter(t=>t.folio.toUpperCase().includes(q)||t.name.toUpperCase().includes(q)) : day.tickets
      })).filter(day=>day.tickets.length>0);

      const totalTickets=dayBuckets.reduce((s,d)=>s+d.tickets.length,0);

      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.55)",zIndex:40,display:"flex",flexDirection:"column",animation:"laModalIn 0.2s ease"}}>
        <div style={{flex:1}} onClick={onClose} />
        <div style={{background:C.bg,borderRadius:"18px 18px 0 0",maxWidth:560,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",maxHeight:"88vh",animation:"laSheetUp 0.3s cubic-bezier(0.32,0.72,0,1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 12px",borderBottom:`1px solid ${C.pink}`}}>
            <div>
              <div style={{fontSize:19,fontWeight:"bold"}}>Tickets</div>
              <div style={{fontSize:11,color:C.muted,marginTop:1}}>{totalTickets} ticket{totalTickets!==1?"s":""} · últimos 7 días</div>
            </div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.dark}}>✕</button>
          </div>
          {/* Search */}
          <div style={{padding:"12px 16px 8px"}}>
            <input value={query} onChange={e=>setQuery(e.target.value)}
              placeholder="Buscar por folio o nombre…"
              style={{...inputStyle,fontSize:14}} />
          </div>
          {/* Day buckets */}
          <div style={{flex:1,overflowY:"auto",padding:"4px 16px 16px"}}>
            {filtered.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:C.muted,fontSize:13}}>{q?`Sin resultados para "${query}"`:"No hay tickets en los últimos 7 días"}</div>}
            {filtered.map(day=>{
              const dk=dayKey(day.date);
              const isOpen=openDays[dk]!==false; // default open
              return <div key={dk} style={{marginBottom:10}}>
                <button onClick={()=>setOpenDays(p=>({...p,[dk]:!isOpen}))} className="la-tap" style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",background:"none",border:"none",cursor:"pointer",padding:"8px 0",textAlign:"left"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13,fontWeight:"bold",color:C.dark}}>{day.label}</span>
                    <span style={{fontSize:11,background:C.pinkPill,color:C.dark,borderRadius:10,padding:"1px 7px"}}>{day.tickets.length}</span>
                  </div>
                  <span style={{fontSize:12,color:C.muted,display:"inline-block",transition:"transform 0.2s",transform:isOpen?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
                </button>
                {isOpen&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {day.tickets.map((t,i)=>{
                    const canOpen=!!t.order;
                    return <div key={t.orderId||i} style={{background:C.card,border:"1px solid #e5ddd5",borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,fontWeight:"bold",color:C.dark}}>{t.name}</div>
                        <div style={{fontSize:11,color:C.muted,marginTop:2,display:"flex",gap:8,flexWrap:"wrap"}}>
                          <span style={{fontFamily:"'Courier New',monospace",background:C.bg,padding:"1px 6px",borderRadius:5,fontSize:11.5,color:C.dark,fontWeight:"bold"}}>#{t.folio}</span>
                          <span>{t.mesa?`Mesa ${t.mesa}`:t.type==="llevar"?"Para llevar":"Sin mesa"}</span>
                          <span>{fmtTime(t.completedAt)}</span>
                        </div>
                      </div>
                      {canOpen&&<button onClick={()=>onOpenTicket(t.order)} className="la-tap" style={{background:C.pink,border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:"bold",color:C.dark,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>Ver ticket</button>}
                    </div>;
                  })}
                </div>}
              </div>;
            })}
          </div>
        </div>
      </div>;
    }

        /* =========================================================
       TICKET MODAL — receipt-style print of a completed order
       ========================================================= */
    function TicketModal({catalog, order, onClose}){
      const [exporting,setExporting]=useState(false);
      const total=orderTotalWith(catalog,order);
      const tip=resolveTip(total,order.payment);
      const grand=total+tip;
      const grouped=groupLinesForDisplay(order.lines);
      const methodLabel = order.payment?.method==="tarjeta"?"Tarjeta":order.payment?.method==="transferencia"?"Transferencia":"Efectivo";
      const ticketId=order.folio||"S/F";
      async function downloadPNG(){
        const el=document.getElementById("la-ticket");
        if(!el||!window.domtoimage){console.error("Missing dom-to-image");return;}
        setExporting(true);
        try{
          const dataUrl=await window.domtoimage.toPng(el,{scale:2,bgcolor:"#FFFFFF"});
          const link=document.createElement("a");
          link.download=`ticket-${ticketId}.png`;
          link.href=dataUrl;
          document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }catch(e){console.error(e);}
        setExporting(false);
      }
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.6)",zIndex:65,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"16px",overflowY:"auto",animation:"laModalIn 0.2s ease"}}>

    /* =========================================================
       ORDER CARD (open accounts)
       ========================================================= */
    function OrderCard({catalog, order, takeout, index=0, onOpen, onDelete, canDelete}){
      const total=orderTotalWith(catalog,order);
      const count=orderRootItemCount(order);
      const [expanded,setExpanded]=useState(false);
      const grouped=groupLinesForDisplay(order.lines);
      const prepStats=(()=>{
        const foodLines=filterFoodLines(catalog,order);
        // preparedFull = count of lines where ALL units are ready
        // preparedAny  = count of lines where at least one unit is ready
        const preparedFull=foodLines.filter(l=>linePreparedFull(l)).length;
        const preparedAny=foodLines.filter(l=>linePreparedAny(l)).length;
        return {total:foodLines.length, prepared:preparedFull, any:preparedAny};
      })();
      const cardBg = prepStats.total>0 && prepStats.prepared===prepStats.total ? "#f0faf4"
                   : prepStats.total>0 && prepStats.any>0 ? "#fffbf0"
                   : order.preparing ? "#FFF6D6"
                   : C.card;
      const cardBorder = prepStats.total>0 && prepStats.prepared===prepStats.total
                   ? `1.5px solid rgba(46,139,87,0.35)`
                   : prepStats.total>0 && prepStats.any>0
                   ? `1.5px solid rgba(212,162,76,0.35)`
                   : order.preparing ? "1.5px solid #E5B83A"
                   : takeout ? `1.5px dashed ${C.dark}` : "1.5px solid #e5ddd5";
      return <div className="la-card-tap la-row" style={{background:cardBg,borderRadius:12,padding:"12px 14px",marginBottom:10,border:cardBorder,position:"relative",animationDelay:`${index*0.05}s`,transition:"background 0.3s ease,border-color 0.3s ease"}}>
        <div onClick={onOpen} style={{cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            {takeout?<span style={{background:C.pinkPill,color:C.dark,fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20}}>🛍️ Para llevar</span>:order.mesa?<span style={{background:C.pinkPill,color:C.dark,fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20}}>Mesa {order.mesa}</span>:null}
            {prepStats.total>0 && prepStats.prepared===prepStats.total && <span style={{background:C.success,color:"#fff",fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20}}>✓ Todo listo</span>}

            {order.preparing && !(prepStats.total>0 && prepStats.prepared>0) && <span style={{background:"#E5B83A",color:"#fff",fontSize:11,fontWeight:"bold",padding:"3px 8px",borderRadius:20}}>⏳ Preparando</span>}
            {canDelete && <button onClick={e=>{e.stopPropagation();onDelete();}} className="la-tap" style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.muted,padding:2}}>🗑️</button>}
          </div>
          <div style={{fontSize:20,fontWeight:"bold"}}>{order.name}</div>
          <div style={{fontSize:12,color:C.muted,margin:"3px 0",display:"flex",flexWrap:"wrap",gap:"2px 10px"}}><span>🕐 {fmtTime(order.createdAt)}</span>{takeout&&(order.pickup?<span style={{color:C.dark,fontWeight:"bold"}}>📦 Recoge: {order.pickup}</span>:<span>sin hora de recogida</span>)}</div>
          <div style={{fontSize:28,fontWeight:"bold",marginTop:2}}>{fmt(total)}</div>

        {prepStats.total>0&&prepStats.any>0&&prepStats.prepared<prepStats.total&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #f0e8e0"}}>

          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {groupLinesForDisplay(filterFoodLines(catalog,order)).map(({line:l,children})=><div key={l.lid}>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}>
                <div style={{width:14,height:14,borderRadius:3,background:linePreparedFull(l)?C.success:linePreparedAny(l)?C.warn:"transparent",border:linePreparedFull(l)||linePreparedAny(l)?"none":"1.5px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{linePreparedFull(l)?<span style={{color:"#fff",fontSize:9,fontWeight:"bold"}}>✓</span>:linePreparedAny(l)?<span style={{color:"#fff",fontSize:9,fontWeight:"bold"}}>{linePreparedCount(l)}</span>:null}</div>
                <span style={{color:linePreparedFull(l)?C.success:linePreparedAny(l)?C.warn:C.muted,textDecoration:linePreparedFull(l)?"line-through":"none",fontSize:12}}>{l.qty>1?`${l.qty}× `:"1× "}{lineDisplayNameWith(catalog,l)}{l.qty>1&&linePreparedAny(l)&&!linePreparedFull(l)?` (${linePreparedCount(l)}/${l.qty})`:""}</span>
              </div>
              {children.map(ch=><div key={ch.lid} style={{display:"flex",alignItems:"center",gap:6,paddingLeft:20,marginTop:2}}>
                <div style={{width:12,height:12,borderRadius:3,background:linePreparedFull(ch)?C.success:"transparent",border:linePreparedFull(ch)?"none":"1.5px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{linePreparedFull(ch)&&<span style={{color:"#fff",fontSize:8,fontWeight:"bold"}}>✓</span>}</div>
                <span style={{color:linePreparedFull(ch)?C.success:C.muted,textDecoration:linePreparedFull(ch)?"line-through":"none",fontSize:11.5}}>+ {ch.qty}× {lineDisplayNameWith(catalog,ch)}</span>
              </div>)}
            </div>)}
          </div>
        </div>}
        {count>0?<>
          <div onClick={()=>setExpanded(e=>!e)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"1px solid #f0e8e0",cursor:"pointer"}}>
            <span style={{fontSize:13,fontWeight:"bold",opacity:0.7}}>{count} item{count!==1?"s":""}</span>
            <span style={{fontSize:12,color:C.muted,display:"inline-flex",alignItems:"center",gap:4}}>{expanded?"Ocultar":"Ver pedido"}<span style={{display:"inline-block",transition:"transform 0.22s ease",transform:expanded?"rotate(180deg)":"rotate(0deg)"}}>▾</span></span>
          </div>
          {expanded&&<div className="la-row" style={{marginTop:8,display:"flex",flexDirection:"column",gap:5}}>
            {grouped.map(({line:l,children})=><div key={l.lid}>
              <div style={{display:"flex",justifyContent:"space-between",gap:10,fontSize:12.5,background:C.bg,borderRadius:7,padding:"6px 9px"}}>
                <span style={{flex:1}}><strong>{l.qty}×</strong> {lineDisplayNameWith(catalog,l)}{linePreparedFull(l)&&<span style={{color:C.success,marginLeft:6}}>✓</span>}</span>
                <span style={{opacity:0.65,whiteSpace:"nowrap"}}>{fmt(lineSubtotalWith(catalog,l))}</span>
              </div>
              {l.note&&<div style={{fontSize:11,color:C.muted,fontStyle:"italic",padding:"2px 9px 2px 13px"}}>nota: {l.note}</div>}
              {children.map(ch=><div key={ch.lid}>
                <div style={{display:"flex",justifyContent:"space-between",gap:10,fontSize:11.5,padding:"4px 9px 4px 22px",borderLeft:`3px solid ${C.pink}`,marginLeft:9,background:"#F9E2DF",borderRadius:"0 6px 6px 0",marginTop:3}}>
                  <span style={{flex:1}}>+ <strong>{ch.qty}×</strong> {lineDisplayNameWith(catalog,ch)}{linePreparedFull(ch)&&<span style={{color:C.success,marginLeft:6}}>✓</span>}</span>
                  <span style={{opacity:0.65,whiteSpace:"nowrap"}}>{fmt(lineSubtotalWith(catalog,ch))}</span>
                </div>
                {ch.note&&<div style={{fontSize:10.5,color:C.muted,fontStyle:"italic",padding:"2px 9px 2px 30px"}}>nota: {ch.note}</div>}
