    function TabActivos({orders,onNew,onTakeout,onOpen,onDelete}){
      const byRecent=(a,b)=>(b.seq||b.createdAt)-(a.seq||a.createdAt);
      const mesas=orders.filter(o=>o.type==="mesa").sort(byRecent);
      const llevar=orders.filter(o=>o.type==="llevar").sort(byRecent);
      return <div className="la-tabpad">
        <div className="la-actions-row">
          <button onClick={onNew} className="la-tap" style={{width:"100%",background:C.dark,color:"#fff",border:"none",padding:"16px",borderRadius:12,fontSize:16,fontWeight:"bold",cursor:"pointer",marginBottom:10}}>+ Abrir Nueva Cuenta</button>
          <button onClick={onTakeout} className="la-tap" style={{width:"100%",background:C.card,color:C.dark,border:`1.5px solid ${C.dark}`,padding:"14px",borderRadius:12,fontSize:15,fontWeight:"bold",cursor:"pointer",marginBottom:10}}>+ Pedido Para Llevar</button>
        </div>
        <div style={{height:8}} />
        {orders.length===0&&<div className="la-empty" style={{textAlign:"center",padding:"60px 20px",color:C.muted}}><div style={{fontSize:18,fontWeight:600,marginBottom:6}}>No hay cuentas abiertas</div><div style={{fontSize:14}}>Toca los botones para empezar</div></div>}
        {mesas.length>0&&<><SectionLabel>Cuentas Abiertas</SectionLabel><div className="la-grid-cards">{mesas.map((o,i)=><OrderCard key={o.id} order={o} index={i} onOpen={()=>onOpen(o.id)} onDelete={()=>onDelete(o)} />)}</div></>}
        {llevar.length>0&&<><SectionLabel>Pedidos Para Llevar</SectionLabel><div className="la-grid-cards">{llevar.map((o,i)=><OrderCard key={o.id} order={o} index={i} takeout onOpen={()=>onOpen(o.id)} onDelete={()=>onDelete(o)} />)}</div></>}
      </div>;
    }

    function TabDia({completed,dayTotal,openTotal,openCount,catBreakdown,topItems,payBreakdown,onCloseAll,onDeleteCompleted,onEditCompleted,onReopenCompleted,onReport,onTerminar}){
      const [showAll,setShowAll]=useState(false);
      const shown=showAll?completed:completed.slice(0,3);
      const hasData=completed.length>0;
      return <div className="la-tabpad">
        <div style={{display:"flex",gap:10,marginBottom:10}}><StatCard label="Total vendido" value={fmt(dayTotal)} index={0} /><StatCard label="Cuentas cerradas" value={completed.length} index={1} /></div>
        <div style={{display:"flex",gap:10,marginBottom:16}}><StatCard label="En cuentas abiertas" value={fmt(openTotal)} pink index={2} /><StatCard label="Cuentas abiertas" value={openCount} pink index={3} /></div>
        {hasData&&<div className="la-pay-grid" style={{marginBottom:16}}>
          <div className="la-row" style={{background:C.card,border:"1px solid #e5ddd5",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.5,marginBottom:12,opacity:0.7}}>Desglose de pagos</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}><span style={{fontSize:14}}>💵 Efectivo</span><span style={{fontSize:16,fontWeight:"bold"}}>{fmt(payBreakdown.efectivo)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}><span style={{fontSize:14}}>💳 Tarjeta</span><span style={{fontSize:16,fontWeight:"bold"}}>{fmt(payBreakdown.tarjeta)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid #f0e8e0",paddingTop:9,marginTop:3}}><span style={{fontSize:13.5}}>Ganancias netas (sin propina)</span><span style={{fontSize:16,fontWeight:"bold"}}>{fmt(payBreakdown.efectivo+payBreakdown.tarjeta)}</span></div>
          </div>
          <div className="la-row" style={{background:C.dark,borderRadius:12,padding:"16px",display:"flex",flexDirection:"column",justifyContent:"center",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:11,fontWeight:"bold",textTransform:"uppercase",letterSpacing:0.6,color:"rgba(255,255,255,0.7)"}}>🪙 Propinas totales del día</div><div style={{fontSize:10.5,color:"rgba(255,255,255,0.55)",marginTop:3,fontStyle:"italic"}}>No se cuenta dentro de tus ganancias netas</div></div>
              <div style={{fontSize:28,fontWeight:"bold",color:C.pink}}>{fmt(payBreakdown.propinas)}</div>
            </div>
            {payBreakdown.propinas>0&&<div style={{display:"flex",gap:16,marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.15)"}}><div style={{fontSize:12,color:"rgba(255,255,255,0.85)"}}>💵 Efectivo: <strong>{fmt(payBreakdown.propEfectivo)}</strong></div><div style={{fontSize:12,color:"rgba(255,255,255,0.85)"}}>💳 Tarjeta: <strong>{fmt(payBreakdown.propTarjeta)}</strong></div></div>}
          </div>
        </div>}
        <button onClick={onCloseAll} disabled={openCount===0} className="la-tap" style={{width:"100%",background:openCount?C.card:"#efe8e0",color:C.dark,border:`1.5px solid ${openCount?C.dark:"#d8cfc6"}`,padding:"11px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:openCount?"pointer":"default",marginBottom:6}}>🔒 Cerrar todas las cuentas abiertas</button>
        {openCount>0?<div style={{fontSize:11.5,color:C.muted,fontStyle:"italic",marginBottom:22,textAlign:"center"}}>Estas cuentas no llevarán propina</div>:<div style={{marginBottom:22}} />}
        <div className="la-grid-2">
          {catBreakdown.length>0&&<div><h3 style={{...sectionH,marginTop:0}}>Desglose por categoría</h3><DataTable headers={["Categoría","Cant.","Total"]} rows={catBreakdown.map(c=>[c.cat,c.qty,fmt(c.total)])} aligns={["left","center","right"]} /></div>}
          {topItems.length>0&&<div><h3 style={{...sectionH,marginTop:0}}>Items más pedidos</h3><DataTable headers={["Item","Categoría","Vend.","Total"]} rows={topItems.map(i=>[i.name,i.cat,i.qty,fmt(i.total)])} aligns={["left","left","center","right"]} small /></div>}
          {hasData&&<div className="la-span-2">
            <h3 style={sectionH}>Órdenes completadas</h3>
            <div className="la-completed-grid">{shown.map((c,i)=><CompletedCard key={c.id} order={c} index={i} onDelete={()=>onDeleteCompleted(c)} onEdit={()=>onEditCompleted(c)} onReopen={()=>onReopenCompleted(c)} />)}</div>
            {completed.length>3&&<button onClick={()=>setShowAll(s=>!s)} className="la-tap" style={{width:"100%",background:"none",border:"none",color:C.dark,fontWeight:"bold",fontSize:13,cursor:"pointer",padding:"8px",textDecoration:"underline"}}>{showAll?"Mostrar menos":`Mostrar más (${completed.length-3})`}</button>}
          </div>}
        </div>
        {!hasData&&openCount===0&&<div className="la-empty" style={{textAlign:"center",padding:"30px 20px",color:C.muted,fontSize:14}}>Aún no hay ventas registradas hoy</div>}
        <div style={{display:"flex",justifyContent:"center",marginTop:24}}><button onClick={onReport} disabled={!hasData} className="la-tap" style={{background:hasData?C.pink:"#e8c5c2",color:C.dark,border:"none",padding:"13px 32px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:hasData?"pointer":"default"}}>📸 Generar Reporte Diario</button></div>
        <div style={{display:"flex",justifyContent:"center",marginTop:18}}>
          <div style={{border:`2px dashed ${C.danger}`,borderRadius:12,padding:"16px 22px",textAlign:"center",maxWidth:420}}>
            <div style={{fontSize:15,fontWeight:"bold",color:C.danger,marginBottom:4}}>⚠️ Terminar Día</div>
            <div style={{fontSize:12.5,color:"#777",marginBottom:12,lineHeight:1.4}}>Cierra todas las cuentas, reinicia el día y archiva los datos en el resumen semanal. No se puede deshacer.</div>
            <button onClick={onTerminar} className="la-tap" style={{background:C.danger,color:"#fff",border:"none",padding:"11px 28px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>Terminar Día</button>
          </div>
        </div>
      </div>;
    }

    function reportAggregates(orders){
      const total=orders.reduce((s,o)=>s+orderTotal(o),0); const count=orders.length; const itemCount=orders.reduce((s,o)=>s+orderItemCount(o),0); const avg=count?total/count:0;
      let ef=0,ta=0,pr=0; orders.forEach(o=>{ const t=orderTotal(o); const tip=resolveTip(t,o.payment); if((o.payment?.method||"efectivo")==="tarjeta") ta+=t; else ef+=t; pr+=tip; });
      const im={},cm={};
      orders.forEach(o=>o.lines.forEach(l=>{ const k=lineDisplayName(l); if(!im[k]) im[k]={name:k,qty:0,total:0}; im[k].qty+=l.qty; im[k].total+=lineSubtotal(l); const c=CAT_OF[l.itemId]; if(!cm[c]) cm[c]={cat:c,qty:0,total:0}; cm[c].qty+=l.qty; cm[c].total+=lineSubtotal(l); }));
      return {total,count,itemCount,avg,efectivo:ef,tarjeta:ta,propinas:pr,items:Object.values(im).sort((a,b)=>b.qty-a.qty),cats:Object.values(cm).sort((a,b)=>b.total-a.total)};
    }

    function ReportShell({header,sections,onClose,fileName}){
      const [exporting,setExporting]=useState(false);
      async function downloadPNG(){
        const el=document.getElementById("la-report-card");
        if(!el){console.error("Card element not found"); return;}
        if(!window.domtoimage){console.error("domtoimage not loaded"); return;}
        setExporting(true);
        try{
          const dataUrl=await window.domtoimage.toPng(el,{
            scale:2,
            bgcolor:"#FAF3EE",
            style:{borderRadius:"0px"}
          });
          const link=document.createElement("a");
          link.download=fileName+".png";
          link.href=dataUrl;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }catch(e){console.error("Export error:",e);}
        setExporting(false);
      }
      return <div style={{position:"fixed",inset:0,background:"rgba(30,58,52,0.6)",zIndex:65,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"16px",overflowY:"auto",animation:"laModalIn 0.2s ease"}}>
        <button onClick={onClose} className="la-tap" style={{alignSelf:"flex-end",background:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:14,fontWeight:"bold",cursor:"pointer",marginBottom:10,flexShrink:0}}>✕ Cerrar</button>
        <div id="la-report-card" style={{background:"#FAF3EE",borderRadius:18,width:"100%",maxWidth:360,padding:"22px 20px",position:"relative",overflow:"hidden",animation:"laPopIn 0.28s ease",flexShrink:0}}>
          <div style={{position:"absolute",top:-30,right:-30,width:110,height:110,background:"#F4C0C0",borderRadius:"50%",opacity:0.5}} />
          <div style={{position:"absolute",bottom:-40,left:-30,width:120,height:120,background:"#F4C0C0",borderRadius:"50%",opacity:0.35}} />
          <div style={{position:"relative"}}>{header}{sections.map((s,i)=><div key={i}>{s}</div>)}</div>
        </div>
        <button onClick={downloadPNG} disabled={exporting} className="la-tap" style={{marginTop:14,marginBottom:8,background:exporting?"#e8c5c2":"#E8918A",color:"#1E3A34",border:"none",borderRadius:10,padding:"13px 32px",fontSize:14,fontWeight:"bold",cursor:exporting?"default":"pointer",width:"100%",maxWidth:360,flexShrink:0}}>{exporting?"Generando imagen…":"⬇ Descargar reporte (PNG)"}</button>
      </div>;
    }

    function ReportHeader({subtitle,dateLine}){ return <div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:11,fontWeight:"bold",letterSpacing:3,color:"#888"}}>LA ALMENDRA</div><div style={{fontSize:22,fontWeight:"bold",fontStyle:"italic",margin:"2px 0"}}>{subtitle}</div><div style={{fontSize:12,color:"#888"}}>{dateLine}</div></div>; }
    function BigTotalBlock({total,subline}){ return <div style={{background:"#1E3A34",borderRadius:14,padding:"16px",textAlign:"center",marginBottom:16}}><div style={{fontSize:11,fontWeight:"bold",letterSpacing:1,color:"rgba(255,255,255,0.7)"}}>TOTAL VENDIDO</div><div style={{fontSize:36,fontWeight:"bold",color:"#fff",margin:"2px 0"}}>{total}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>{subline}</div></div>; }
    function RankBlock({title,rows}){ return <div style={{paddingBottom:16}}><div style={{fontSize:11,fontWeight:"bold",letterSpacing:1,color:"#888",textTransform:"uppercase",marginBottom:8}}>{title}</div>{rows.map((r,i)=><div key={i} style={{marginBottom:7}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:2}}><span style={{fontWeight:"bold"}}>{r.label}</span><span style={{fontWeight:"bold"}}>{r.right}</span></div><div style={{height:5,background:"#ece4dc",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(8,r.bar*100)}%`,background:"#E8918A"}} /></div></div>)}</div>; }
    function NumberedBlock({title,rows}){ return <div style={{paddingBottom:8}}><div style={{fontSize:11,fontWeight:"bold",letterSpacing:1,color:"#888",textTransform:"uppercase",marginBottom:8}}>{title}</div>{rows.map((r,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #ece4dc"}}><div style={{width:22,height:22,borderRadius:"50%",background:"#E8918A",color:"#1E3A34",fontSize:12,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div><div style={{flex:1,fontSize:13,fontWeight:"bold"}}>{r.name}</div><div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:"bold"}}>×{r.qty}</div><div style={{fontSize:11,color:"#888"}}>{fmt(r.total)}</div></div></div>)}</div>; }
    function PaymentBlock({agg}){ return <div style={{paddingBottom:16}}><div style={{fontSize:9,fontWeight:"bold",letterSpacing:1.5,color:"#888",textTransform:"uppercase",marginBottom:8}}>Pagos y propinas</div><div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"4px 0"}}><span>💵 Efectivo</span><span style={{fontWeight:"bold"}}>{fmt(agg.efectivo)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"4px 0"}}><span>💳 Tarjeta</span><span style={{fontWeight:"bold"}}>{fmt(agg.tarjeta)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"5px 0",borderTop:"1px solid #ece4dc",marginTop:2}}><span style={{fontStyle:"italic"}}>🪙 Propinas totales</span><span style={{fontWeight:"bold"}}>{fmt(agg.propinas)}</span></div></div>; }

    function DayReport({completed,onClose}){ const agg=reportAggregates(completed); const now=Date.now(); const header=<><ReportHeader subtitle="Resumen del día" dateLine={fmtFullDate(now)} /><BigTotalBlock total={fmt(agg.total)} subline={`${agg.count} cuentas · ${agg.itemCount} items · Prom ${fmt(agg.avg)}`} /></>; const sections=[<RankBlock title="Por categoría" rows={agg.cats.map(c=>({label:c.cat,right:`${fmt(c.total)} ·${c.qty}`,bar:c.total/(agg.cats[0]?.total||1)}))} />,<PaymentBlock agg={agg} />,<NumberedBlock title={`Top ${Math.min(5,agg.items.length)} más pedidos`} rows={agg.items.slice(0,5).map(i=>({name:i.name,qty:i.qty,total:i.total}))} />,<div style={{textAlign:"center",fontSize:11,color:"#888",marginTop:6}}>{fmtFullDate(now).toLowerCase()} · {fmtTime(now)}</div>]; return <ReportShell header={header} sections={sections} onClose={onClose} fileName={`la-almendra-dia-${new Date().toISOString().slice(0,10)}`} />; }

    function weekRangeLabel(ws){ const s=new Date(ws); const e=new Date(ws); e.setDate(e.getDate()+6); return `${DAYS_SHORT[s.getDay()]} ${s.getDate()} – ${DAYS_SHORT[e.getDay()]} ${e.getDate()} de ${MONTHS[e.getMonth()]} de ${e.getFullYear()}`; }

    function TabSemana({weekDays,weekTotal,weekCount,curWeekStart,onReport,onDayDetail}){ return <div className="la-tabpad"><div style={{fontSize:13,color:C.muted,marginBottom:4}}>Semana actual</div><div style={{fontSize:15,fontWeight:"bold",marginBottom:14}}>{weekRangeLabel(curWeekStart)}</div><div style={{display:"flex",gap:10,marginBottom:18}}><StatCard label="Total vendido" value={fmt(weekTotal)} /><StatCard label="Cuentas cerradas" value={weekCount} /></div>{weekDays.length===0&&<div className="la-empty" style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:14}}>No hay días archivados esta semana.<br/><span style={{fontSize:12.5}}>Usa "Terminar Día" en el Resumen del Día para archivar.</span></div>}<div className="la-grid-cards">{weekDays.map(d=><div key={d.key} onClick={()=>onDayDetail(d)} className="la-card-tap" style={{background:C.card,borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid #e5ddd5",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:15,fontWeight:"bold"}}>{DAYS_FULL[new Date(d.date).getDay()]}</div><div style={{fontSize:12,color:C.muted}}>{fmtShortDate(d.date)} · {d.count} cuentas</div></div><div style={{fontSize:18,fontWeight:"bold"}}>{fmt(d.total)}</div></div>)}</div>{weekDays.length>0&&<div style={{display:"flex",justifyContent:"center",marginTop:8}}><button onClick={onReport} className="la-tap" style={{background:C.pink,color:C.dark,border:"none",padding:"13px 32px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>📸 Generar Reporte Semanal</button></div>}</div>; }

    function WeekReport({weekDays,curWeekStart,onClose}){ const agg=reportAggregates(weekDays.flatMap(d=>d.orders)); const bestDay=[...weekDays].sort((a,b)=>b.total-a.total)[0]; const header=<><ReportHeader subtitle="Resumen semanal" dateLine={weekRangeLabel(curWeekStart)} /><BigTotalBlock total={fmt(agg.total)} subline={`${agg.count} cuentas · Prom ${fmt(agg.avg)}`} /></>; const sections=[<div><div style={{fontSize:11,fontWeight:"bold",letterSpacing:1,color:"#888",textTransform:"uppercase",marginBottom:8}}>Por día</div><table style={{width:"100%",fontSize:13,borderCollapse:"collapse"}}><thead><tr style={{color:"#888",fontSize:11}}><th style={{textAlign:"left",padding:"3px 0"}}>DÍA</th><th style={{textAlign:"center"}}>CUENTAS</th><th style={{textAlign:"right"}}>TOTAL</th></tr></thead><tbody>{weekDays.map(d=><tr key={d.key} style={{borderTop:"1px solid #ece4dc",background:bestDay&&d.key===bestDay.key?"#F9E2DF":"transparent"}}><td style={{padding:"6px 0",fontWeight:"bold"}}>{DAYS_SHORT[new Date(d.date).getDay()]} {new Date(d.date).getDate()}</td><td style={{textAlign:"center"}}>{d.count}</td><td style={{textAlign:"right",fontWeight:"bold"}}>{fmt(d.total)}</td></tr>)}</tbody></table></div>,<PaymentBlock agg={agg} />,<NumberedBlock title={`Top ${Math.min(5,agg.items.length)} de la semana`} rows={agg.items.slice(0,5).map(i=>({name:i.name,qty:i.qty,total:i.total}))} />,bestDay?<div style={{background:"#F4C0C0",borderRadius:10,padding:"10px 12px",fontSize:12.5}}><span style={{fontWeight:"bold"}}>🏆 Mejor día:</span> {DAYS_FULL[new Date(bestDay.date).getDay()]} con {fmt(bestDay.total)}</div>:<div />]; return <ReportShell header={header} sections={sections} onClose={onClose} fileName={`la-almendra-semana-${new Date(curWeekStart).toISOString().slice(0,10)}`} />; }

    function DayDetailModal({day,onClose}){ const agg=reportAggregates(day.orders); return <ModalShell onClose={onClose} title={DAYS_FULL[new Date(day.date).getDay()]}><div style={{padding:18}}><div style={{fontSize:12,color:C.muted,marginBottom:12}}>{fmtFullDate(day.date)}</div><div style={{display:"flex",gap:10,marginBottom:16}}><StatCard label="Total" value={fmt(agg.total)} /><StatCard label="Cuentas" value={agg.count} /></div><div style={{fontSize:12.5,color:C.muted,marginBottom:10}}>Ticket promedio: {fmt(agg.avg)}</div><PaymentBlock agg={agg} /><NumberedBlock title="Items más pedidos" rows={agg.items.slice(0,5).map(i=>({name:i.name,qty:i.qty,total:i.total}))} /></div></ModalShell>; }

    function monthWeekLabel(week){ const days=week.days.map(d=>d.date).sort((a,b)=>a-b); const f=new Date(days[0]); const l=new Date(days[days.length-1]); return `${DAYS_SHORT[f.getDay()]} ${f.getDate()} – ${DAYS_SHORT[l.getDay()]} ${l.getDate()} de ${MONTHS[l.getMonth()]}`; }

    function TabMes({monthWeeks,monthTotal,monthCount,curMonth,curYear,onReport,onWeekDetail}){ return <div className="la-tabpad"><div style={{fontSize:13,color:C.muted,marginBottom:4}}>Mes actual</div><div style={{fontSize:17,fontWeight:"bold",marginBottom:14,textTransform:"capitalize"}}>{MONTHS[curMonth]} {curYear}</div><div style={{display:"flex",gap:10,marginBottom:18}}><StatCard label="Total vendido" value={fmt(monthTotal)} /><StatCard label="Cuentas cerradas" value={monthCount} /></div>{monthWeeks.length===0&&<div className="la-empty" style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:14}}>No hay semanas archivadas este mes.</div>}<div className="la-grid-cards">{monthWeeks.map(w=><div key={w.ws} onClick={()=>onWeekDetail(w)} className="la-card-tap" style={{background:C.card,borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid #e5ddd5",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:14,fontWeight:"bold"}}>{monthWeekLabel(w)}</div><div style={{fontSize:12,color:C.muted}}>{w.count} cuentas · {w.days.length} días</div></div><div style={{fontSize:18,fontWeight:"bold"}}>{fmt(w.total)}</div></div>)}</div>{monthWeeks.length>0&&<div style={{display:"flex",justifyContent:"center",marginTop:8}}><button onClick={onReport} className="la-tap" style={{background:C.pink,color:C.dark,border:"none",padding:"13px 32px",borderRadius:10,fontSize:14,fontWeight:"bold",cursor:"pointer"}}>📸 Generar Reporte Mensual</button></div>}</div>; }

    function MonthReport({monthWeeks,curMonth,curYear,onClose}){ const allOrders=monthWeeks.flatMap(w=>w.days.flatMap(d=>d.orders)); const agg=reportAggregates(allOrders); const bestWeek=[...monthWeeks].sort((a,b)=>b.total-a.total)[0]; const allDays=monthWeeks.flatMap(w=>w.days); const bestDay=[...allDays].sort((a,b)=>b.total-a.total)[0]; const header=<><ReportHeader subtitle="Resumen mensual" dateLine={`${MONTHS[curMonth][0].toUpperCase()+MONTHS[curMonth].slice(1)} ${curYear}`} /><BigTotalBlock total={fmt(agg.total)} subline={`${agg.count} cuentas · Prom ${fmt(agg.avg)}`} /></>; const sections=[<div><div style={{fontSize:11,fontWeight:"bold",letterSpacing:1,color:"#888",textTransform:"uppercase",marginBottom:8}}>Por semana</div><table style={{width:"100%",fontSize:12.5,borderCollapse:"collapse"}}><thead><tr style={{color:"#888",fontSize:10.5}}><th style={{textAlign:"left",padding:"3px 0"}}>SEMANA</th><th style={{textAlign:"center"}}>CUENTAS</th><th style={{textAlign:"right"}}>TOTAL</th></tr></thead><tbody>{monthWeeks.map(w=><tr key={w.ws} style={{borderTop:"1px solid #ece4dc",background:bestWeek&&w.ws===bestWeek.ws?"#F9E2DF":"transparent"}}><td style={{padding:"6px 0",fontWeight:"bold"}}>{monthWeekLabel(w)}</td><td style={{textAlign:"center"}}>{w.count}</td><td style={{textAlign:"right",fontWeight:"bold"}}>{fmt(w.total)}</td></tr>)}</tbody></table></div>,<PaymentBlock agg={agg} />,<NumberedBlock title={`Top ${Math.min(5,agg.items.length)} del mes`} rows={agg.items.slice(0,5).map(i=>({name:i.name,qty:i.qty,total:i.total}))} />,<div>{bestWeek&&<div style={{background:"#F4C0C0",borderRadius:10,padding:"9px 12px",fontSize:12,marginBottom:6}}><span style={{fontWeight:"bold"}}>🏆 Mejor semana:</span> {monthWeekLabel(bestWeek)} · {fmt(bestWeek.total)}</div>}{bestDay&&<div style={{background:"#F4C0C0",borderRadius:10,padding:"9px 12px",fontSize:12}}><span style={{fontWeight:"bold"}}>⭐ Mejor día:</span> {fmtShortDate(bestDay.date)} · {fmt(bestDay.total)}</div>}</div>]; return <ReportShell header={header} sections={sections} onClose={onClose} fileName={`la-almendra-mes-${curYear}-${String(curMonth+1).padStart(2,"0")}`} />; }

    function WeekDetailModal({week,onClose}){ const agg=reportAggregates(week.days.flatMap(d=>d.orders)); const bestDay=[...week.days].sort((a,b)=>b.total-a.total)[0]; return <ModalShell onClose={onClose} title="Detalle de semana"><div style={{padding:18}}><div style={{fontSize:13,fontWeight:"bold",marginBottom:12}}>{monthWeekLabel(week)}</div><div style={{display:"flex",gap:10,marginBottom:16}}><StatCard label="Total" value={fmt(agg.total)} /><StatCard label="Cuentas" value={agg.count} /></div><div style={{fontSize:12.5,color:C.muted,marginBottom:12}}>Ticket promedio: {fmt(agg.avg)}</div><div style={{fontSize:11,fontWeight:"bold",letterSpacing:1,color:C.muted,textTransform:"uppercase",marginBottom:8}}>Por día</div>{[...week.days].sort((a,b)=>a.date-b.date).map(d=><div key={d.key} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #ece4dc",fontSize:13,background:bestDay&&d.key===bestDay.key?"#F9E2DF":"transparent"}}><span style={{fontWeight:"bold"}}>{DAYS_FULL[new Date(d.date).getDay()]} {new Date(d.date).getDate()}</span><span>{d.count} cuentas</span><span style={{fontWeight:"bold"}}>{fmt(d.total)}</span></div>)}<PaymentBlock agg={agg} /><NumberedBlock title="Top items" rows={agg.items.slice(0,5).map(i=>({name:i.name,qty:i.qty,total:i.total}))} /></div></ModalShell>; }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
